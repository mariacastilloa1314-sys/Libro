, transparent 50%), linear-gradient(180deg,#b0a888 0%,#9e9678 100%)\">Tomé el microchip, lo examiné minuciosamente otra vez. Entonces ocurrió: fui consciente de que estaba frente a un espejo y vi la imagen cruda de mi anatomía: Una mezcla de tejidos rojizos, vasos sanguíneos azulados y nervios blanquecinos en mi cara. Mi cerebro arrugado y gris se movía como gelatina. Eso me impresionó haciendo que mi cuerpo retrocediera y que el microchip se me cayera de la mano. Rápidamente intenté rearmar mi cabeza, pero mis manos temblaban y uno de mis dedos rompió un diminuto hilo que pendía cerca de mis ojos. Inmediatamente sentí que mi ojo derecho se llenó de sangre. Lo había arruinado.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(160,10,10,.45) 0%, transparent 48%), linear-gradient(180deg,#a09880 0%,#8a8268 100%)\">Me levanté fastidiada, le di la vuelta a la mesa y me paré frente al espejo. Mi ojo estaba lleno de líquido rojo, mis manos seguían temblando y mi pecho se elevaba al compás de una respiración agitada que se intensificaba con cada segundo.</p>\n<p class=\"pd\">—¡A la mierda con esto! Me largo —dije, mientras me quitaba la sangrienta red de la cara, arrojándola a un lado.</p>\n<p class=\"pb\">Iba a salir, pero en la puerta estaba la mujer que trajo la bandeja.</p>\n<p class=\"pd\">—¡NO! ¿Qué estás haciendo? —gritó, mientras levantaba la mano derecha. Se veía preocupada.</p>\n<p class=\"pb\">Los otros dos hombres corrieron hacia la puerta también, me miraban horrorizados.</p>\n<p class=\"pd\">—No puedes irte así —continuó la mujer—. La gente…</p>\n<p class=\"pd\">—¿A mí qué me importa lo que piensen? —la interrumpí con un tono cortante.</p>\n<p class=\"pb\">Sus ojos se llenaron de lágrimas, dio unos pasos mirándome directamente, mientras caía una línea de líquido de su ojo derecho. Cuando estuvo cerca de mí, bajó la cabeza y cruzó los brazos.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 60%, rgba(5,5,20,.45) 0%, transparent 58%), linear-gradient(180deg,#787060 0%,#3a3228 100%)\">— ¿Alguna vez terminarás lo que empiezas? —sollozó, sin levantar la mirada. — Si esta es tu manera, termina … termínalo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,5,20,.55) 0%, transparent 62%), linear-gradient(180deg,#504840 0%,#201810 100%)\">Pero yo, inmune al dolor, solo sentía un espantoso vacío, un hastío profundo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,5,20,.62) 0%, transparent 65%), linear-gradient(180deg,#302820 0%,#100808 100%)\">Lágrimas empezaron a caer solas. Estaba llorando, pero no sentía nada.\nCaminé hacia la puerta. Nadie se atrevió a detenerme esta vez.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_07\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 07</p>\n<h2 class=\"pt\">Mi Miss Hyde</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(190,170,130,.22) 0%, transparent 50%), linear-gradient(180deg,#f0e8d5 0%,#e8e0cc 100%)\">Al llegar a casa, un lugar que me era ajeno pero que en ese momento reconocí como propio, lo primero que hice fue buscar la ducha. Me quité la ropa con rapidez; necesitaba desesperadamente que el agua se llevara algo consigo. Esa sensación de suciedad que no es física, que se siente dentro, en lo más profundo del alma.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(200,190,160,.25) 0%, transparent 52%), linear-gradient(180deg,#ece4d0 0%,#e5dcc8 100%)\">Con los ojos cerrados, dejé que el agua me recorriera. Era mi ritual silencioso, mi purificación, mi manera. Cuando abrí los ojos, su imagen me golpeó: una mujer diminuta, de joroba prominente, estaba a mi lado. Retrocedí de la impresión, me asusté, pero no fue tanto como para salir huyendo... o tal vez mi curiosidad fue más grande que el miedo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(100,80,50,.30) 0%, transparent 55%), linear-gradient(180deg,#d8cfb8 0%,#c5bc9e 100%)\">Vestía de negro de pies a cabeza. Su rostro lleno de arrugas mostraba una gran costra negra en el lado derecho de la frente y algunas pústulas en las mejillas. Su nariz, pequeña y puntiaguda, dejaba ver sus vellos sobresalientes. Le faltaban varios dientes, lo que hizo que su inquietante sonrisa me causara ternura. Sus manitas arrugadas se entrelazaban, como si buscara calor. Su cabello blanco, reseco, sucio y maltratado, completaba aquel estilo desalineado.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(220,220,210,.25) 0%, transparent 55%), linear-gradient(180deg,#e8e4d5 0%,#ddd8c5 100%)\">Solo pude observarla. En algún momento mis pensamientos borraron por completo su figura y solo había una habitación blanca. Zzzzzi. Un zumbido me devolvió a la realidad, al sonido del agua cayendo.</p>\n<p class=\"pb\">La anciana seguía ahí, no hacía nada, solo existía. Le salpiqué un poco de agua en la cara con los dedos. Movió la cabeza y sus ojos brillaron con una extraña alegría. Le devolví la sonrisa, pero algo peleaba en mi interior. Me había inundado de sentimientos. Melancolía. Compasión. O algo que tal vez, aún no tiene nombre. Era una sensación compleja, un tirón en el estómago que no podría describir con palabras.</p>\n<p class=\"pb\">No lo sentía por ella, lo sentía por mí.</p>\n<p class=\"pb\">Su presencia me había llenado de una angustia incomprensible.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(60,40,20,.35) 0%, transparent 52%), linear-gradient(180deg,#c0b898 0%,#a8a080 100%)\">Continué mi rutina de baño sin prisa con ella siguiéndome a todas partes, como mi sombra. Cuando fui a vestirme frente al espejo, nuestros reflejos se encontraron: mis ojos vacíos y ella mirándome con sus manitas entrelazadas. Esperando … esperando.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 60%, rgba(5,5,20,.50) 0%, transparent 58%), radial-gradient(ellipse at 50% 10%, rgba(200,190,160,.20) 0%, transparent 45%), linear-gradient(180deg,#908870 0%,#302820 100%)\">Entonces, supe lo que tenía que hacer. Con suavidad tomé su cabeza con mis manos y, levantándola lentamente, la metí en mi pierna derecha. Ese era el lugar al que pertenecía.</p>\n<p class=\"pb\">Ahora, la habitación solo era el espejo y yo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,5,5,.60) 0%, transparent 60%), linear-gradient(180deg,#201818 0%,#080404 100%)\">Despertamos.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_08\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 08</p>\n<h2 class=\"pt\">No quiero ser bella</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 40% 30%, rgba(160,180,200,.18) 0%, transparent 50%), linear-gradient(180deg,#f2edd8 0%,#ede5c8 100%)\">Recibí la llamada de Lea1, parecía un poco molesta, se le notaba, aunque me hablaba a susurros. Hablamos aproximadamente 2 minutos, en realidad solo habló ella, yo estuve tratando de procesar lo que me estaba diciendo.</p>\n<p class=\"pb\">Lea me contó que su padre escondió su teléfono y la mantiene encerrada en su habitación desde hace tres semanas.</p>\n<p class=\"pb\">Volví a la última vez que vi a su padre. Me dijo que Lea seguía en la ciudad, que él regresó porque no se acostumbra a ese ritmo de vida. Recordé que tenía ojeras muy pronunciadas, también la manera en la que se le oscureció el rostro cuando le dije que su hija no me contesta ni mensajes, ni llamadas.</p>\n<p class=\"pd\">— Perdió su teléfono en la vida nocturna, nunca estuve de acuerdo, pero una noche me convencieron y salió.</p>\n<p class=\"pb\">Normalmente el Señor salía a las 10:00 am a trabajar, así que pensé salir a esa hora. Lea me pidió que vaya sola, que no le avise a nadie.</p>\n<p class=\"pd\">— Confío en que harás lo que te pido, entre las dos no debe haber secretos.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(120,120,80,.22) 0%, transparent 50%), linear-gradient(180deg,#e8e0c5 0%,#dfd5b0 100%)\">Miré el reloj de mi cuarto: 10:10 am. No lo dudé, bebí un vaso de agua y salí. El corazón me latía a mil, sentí mi boca reseca en todo el camino. Para llegar a su casa había que cruzar un pequeño puente, normalmente siempre lo cruzaba sin siquiera inmutarme, pero esta vez fue diferente: Tuve miedo.  Las dudas me invadieron. Paré en el inicio del puente. El sonido del agua, de las aves, del viento golpeando los árboles; podía escucharlos tan cerca. Tuve una sensación de escalofríos.</p>\n<p class=\"pb\">Cuando llegué hasta su puerta rogué por un segundo que las llaves no estuvieran debajo de aquella maceta azul. Mis manos empezaron a temblar. Levanté la maceta   lentamente, reparé en detalles como nunca lo había hecho; su forma de cono, en su color ya desgastado por la lluvia, la tierra húmeda, la hermosa azalea a la que contenía. Busqué con la mirada las llaves: sí estaban.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(80,60,30,.28) 0%, transparent 52%), linear-gradient(180deg,#dfd5b0 0%,#d0c898 100%)\">Cerré los ojos por unos segundos. Respiré fuerte y profundo, como si eso me ayudara a recobrar valentía. Al abrirlos vi una rata correr al lado de la maceta. Di un salto hacia atrás de la impresión, la cual se incrementó al notar que aquella rata estaba a pocos metros de mí, mirándome fijamente. Dios, estaba alucinando.</p>\n<p class=\"pb\">Me concentré en entrar a la casa, pero ni siquiera podía hacer coincidir las llaves con el agujero de la puerta. Las manos me temblaban demasiado.</p>\n<p class=\"pd\">—Uno, dos, tres. Inhala. Exhala. Ya estás aquí. Es tu mejor amiga. Hazlo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(30,20,5,.32) 0%, transparent 50%), linear-gradient(180deg,#cec48c 0%,#bab07a 100%)\">La casa se veía ordenada, todo parecía ordenado, pero muy oscuro. Caí en cuenta de que todas las ventanas estaban tapadas con madera. Algo no andaba bien.</p>\n<p class=\"pb\">Caminé lentamente hacia el cuarto de mi amiga.</p>\n<p class=\"pd\">—¿Lea? \n—¿Marie? ¡Marie! Viniste.</p>\n<p class=\"pd\">— ¿Qué pasó? ¿estás bien?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(5,5,30,.30) 0%, transparent 50%), linear-gradient(180deg,#b0a870 0%,#9a9060 100%)\">Se abrió la puerta. Al verla sentí un gran golpe de aire en la cabeza que me hizo ir un poco hacia adelante.  Tenía el cabello súper lacio en tonos de gris claros y oscuros y los ojos verdes, muy verdes. Se veía delgada y el rojo de sus labios la hacía ver muy pálida. Era muy extraño verla así, se veía linda sí, pero de una manera diferente. Linda de una manera tenebrosa. Su sonrisa, su gran sonrisa me paralizó. Sentí que en cualquier momento se iba a convertir en algo. Traté de sonreírle, pero no sentía mi cara.</p>\n<p class=\"pb\">Automáticamente me llegó a la cabeza la última vez que la vi: su cabello negro, las ondas que descansaban en sus hombros, sus ojos marrones, su piel bronceada y su sonrisa que no era nada parecida a esta.</p>\n<p class=\"pd\">—Te, te …  te pintaste el cabello— le dije tartamudeando.</p>\n<p class=\"pb\">Se abalanzó contra mí para abrazarme —Sabía que vendrías.</p>\n<p class=\"pb\">Tenía que hacerlo — la separé de mi lentamente, para no ofenderla. Aun no estaba segura si de verdad era ella.</p>\n<p class=\"pb\">Dio la vuelta, miró hacia el espejo y otra vez hacia mí.</p>\n<p class=\"pd\">—¿Cómo me veo?</p>\n<p class=\"pb\">Me senté en su cama.</p>\n<p class=\"pd\">— Eh…</p>\n<p class=\"pb\">Ni siquiera me dejó responderle, lo que me tranquilizó un poco. Empezó a mirar al techo mientras hablaba y yo ya no sabía si hablaba conmigo o había alguien pegado arriba, así que decidí mirarlo también.</p>\n<p class=\"pd\">— A mi papá no le gusta. ¿Has escuchado eso de que la belleza duele? ¿Cuesta? ¿O algo así?  No vas a creer lo que pasó.</p>\n<p class=\"pb\">Empezó a reírse de una forma inusual: esa risa maquiavélica, esa carcajada de triunfo. Eso hizo que mi mirada vuelva a ella.</p>\n<p class=\"pb\">Se sentó frente a mí.</p>\n<p class=\"pd\">— ¿Quieres verte espectacular?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(180,60,20,.35) 0%, transparent 48%), linear-gradient(180deg,#a09050 0%,#806830 100%)\">Me quedé tiesa, su tono de voz cambió radicalmente. Era espantosamente sexy.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(200,40,10,.42) 0%, transparent 45%), linear-gradient(180deg,#90782 8 0%,#605010 100%)\">Soltó un suspiro y sin que yo pudiera reaccionar puso sus manos en mi cara y empezó a besarme. Cuando caí en cuenta de lo que estaba pasando, sentí algo extraño. La empujé, metí los dedos en mi boca y saqué dos pedazos pequeños de carne y ¡¿Sangre?! Al levantar la mirada el horror se apoderó de mi cuando vi que ella sonreía mientras miraba mi mano. No sé cuántos segundos pasaron en los que yo miraba a Lea y a mi mano una y otra vez, tratando de entender lo que estaba pasando.</p>\n<p class=\"pd\">— Lo que viene va a ser genial, Marie. ¡No te vayas! ¡Tienes que ayudarme!</p>\n<p class=\"pb\">…</p>\n<p class=\"pb\">Cerré la puerta principal y como pude le puse seguro, no se oían sus gritos hasta ahí. Ahora entendía lo de las ventanas.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(160,120,5,.45) 0%, transparent 50%), radial-gradient(ellipse at 30% 30%, rgba(5,3,20,.30) 0%, transparent 45%), linear-gradient(180deg,#705820 0%,#403010 100%)\">Caminé hacia el puente, mientras me tocaba la boca asqueada. Al mirar la saliva entre mis dedos pude ver como dentro de la piel, en mi mano, había unos gusanos blancos muy pequeños y empecé a sentir como se retorcían ahí. El ambiente se puso muy caliente, tenía ganas de vomitar. Intenté matar los gusanos: uno, dos, tres, cuatro, mierda ¿qué es esto? cinco.</p>\n<p class=\"pb\">¿Qué carajo acaba de pasar? Vi que los gusanos ya no se movían, tenía que sacarlos, pero primero pensé en alejarme de ese lugar. Al cruzar el puente sentí mareos que se intensificaron cuando me encontré al padre de Lea en el otro lado.</p>\n<p class=\"pb\">Pude notar su cara de preocupación.</p>\n<p class=\"pd\">— ¿Qué haces aquí? — Su voz más que de molestia, sonaba como de derrota. Me agarró de los hombros sacudiéndome débilmente — No me digas que fuiste a ver a Lea.</p>\n<p class=\"pd\">— Sí, ella, ella me pidió …</p>\n<p class=\"pb\">Se alejó para mirarme de pies a cabeza. Apreté con fuerza el puño y me fui corriendo.</p>\n<p class=\"pb\">Me había contagiado de algo, maldita sea. ¿Algo que se contagiaba con la saliva? ¿Era eso posible?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,5,20,.55) 0%, transparent 58%), linear-gradient(180deg,#504030 0%,#181008 100%)\">Miré mi mano: no había gusanos. Solo mis dedos temblorosos y llenos de sudor.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_09\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 09</p>\n<h2 class=\"pt\">Adiós, Morfeo</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 80% 10%, rgba(40,30,80,.28) 0%, transparent 50%), linear-gradient(180deg,#ece3c8 0%,#e0d6b0 100%)\">El frío me despertó de golpe, al tiempo que la frazada se deslizaba de mi cuerpo. Paralizada por el miedo, distinguí una figura grotesca que se abalanzaba sobre mí. Luché contra sus manos, entreviendo a media luz un rostro marcado por cicatrices y facciones asimétricas.</p>\n<p class=\"pd\">—¿Qué demonios quieres? —grité, forcejeando mientras intentaba evitar que me tocara.</p>\n<p class=\"pd\">—¿Por qué eres tan horrible? ¿Qué eres? —Las palabras brotaron impulsadas por el miedo y la repulsión.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(50,35,90,.32) 0%, transparent 55%), linear-gradient(180deg,#d8cca8 0%,#c8be90 100%)\">De repente, me soltó y se tumbó a mi lado. El silencio estaba tan incómodo como nosotros. Mi corazón latía con fuerza, mi mirada estaba fija en el techo, pero consciente de su presencia. Sentí que lo que le dije lo había herido, se percibía la tristeza en el aire. ¿Por qué me importaba?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 60% 30%, rgba(80,50,110,.35) 0%, transparent 52%), linear-gradient(180deg,#c8bc88 0%,#b0a870 100%)\">No sé cuándo me venció el sueño de nuevo. Al despertar, estaba sentado de espaldas a mí, vestido con una camisa de seda blanca. Las marcas de su rostro parecían desvanecerse. Me observaba en silencio. Volví a cerrar los ojos y al abrirlos, caminaba hacia mí con una camisa negra. Su piel se veía más suave, las cicatrices menos pronunciadas.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(100,60,130,.38) 0%, transparent 50%), linear-gradient(180deg,#b8ae70 0%,#a09658 100%)\">Cada vez que despertaba, su apariencia cambiaba. Su cabello se volvió negro, sus labios rosados, sus ojos brillaban. Era extrañamente atractivo. La confusión me abrumaba, pero el sueño me vencía una y otra vez.</p>\n<p class=\"pb\">Al despertar nuevamente, vi que vestía un polo blanco.</p>\n<p class=\"pd\">—Te quiero mostrar algo —susurró.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 40%, rgba(5,5,20,.40) 0%, transparent 52%), radial-gradient(ellipse at 80% 60%, rgba(120,80,150,.30) 0%, transparent 48%), linear-gradient(180deg,#988d58 0%,#807848 100%)\">Observé cómo se quitaba la camiseta, revelando un tatuaje de tinta muy negra en su espalda: un mapa intrincado.</p>\n<p class=\"pd\">—¿Qué significa todo esto? ¿Qué hacemos? —pregunté, sintiendo una inexplicable melancolía, mientras tocaba suavemente el mapa con las yemas de los dedos.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(80,60,120,.42) 0%, transparent 52%), linear-gradient(180deg,#887848 0%,#686038 100%)\">—Yo tengo que viajar por todo el mundo —dijo, dándose vuelta y acariciando mi cabello—. Para mí son meses, incluso años. Para ti son minutos, horas. Te traigo regalos cada vez que regreso. Es mi forma de decirte que quiero volver a verte, que tu compañía me hace bien.</p>\n<p class=\"pb\">Sus palabras me sorprendieron. ¿Acaso este ser extraño encontraba consuelo en mi habitación?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(60,40,100,.45) 0%, transparent 55%), linear-gradient(180deg,#706030 0%,#504820 100%)\">Pasaba lo mismo una y otra vez. Lo veía llegar, cada vez más atractivo, dejándome regalos que se acumulaban en el suelo. Había bolsas y cajas elegantes, cada una era distinta y todas estaban cerradas.</p>\n<p class=\"pb\">Una noche, desperté sobresaltada. Busqué desesperadamente el celular. Vi la fecha: 21 de diciembre. Me había dormido la noche del 20.</p>\n<p class=\"pb\">Recordé cada encuentro, cada mirada suya, cada gesto que me hacía sentir como si lo conociera desde siempre. Sus cambios de estilo, su ropa distinta, me hacían sentir como si hubieran transcurrido días, semanas... cuando en realidad solo habían sido horas.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 10%, rgba(30,20,60,.50) 0%, transparent 55%), linear-gradient(180deg,#504820 0%,#302818 100%)\">Mientras miraba a todos lados, un detalle me sobresaltó: esa no era mi ventana. Mi ventana estaba a mi derecha, no de frente.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 0%, rgba(10,5,30,.58) 0%, transparent 52%), linear-gradient(180deg,#302818 0%,#100808 100%)\">Fue entonces cuando lo vi asomándose, intentando descender por la pared como una araña. Ver su entrada para nada romántica me asustó. Así que me levanté, tomé mi frazada y fui a dormir a la sala.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_10\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"music-player\" id=\"mp-floor\">\n  <div class=\"mp-wave\" id=\"mpw-floor\">\n    <span></span><span></span><span></span><span></span><span></span>\n  </div>\n  <span class=\"mp-icon\">♪</span>\n  <span class=\"mp-title\">Take Me on the Floor · The Veronicas</span>\n  <button class=\"mp-btn\" id=\"mpbtn-floor\" title=\"Play/Pause\">▶</button>\n  <input class=\"mp-vol\" id=\"mpvol-floor\" type=\"range\" min=\"0\" max=\"100\" value=\"70\" title=\"Volumen\">\n</div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 10</p>\n<h2 class=\"pt\">¿Hay algún zombi en la sala?</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(30,20,50,.28) 0%, transparent 50%), linear-gradient(180deg,#eee5c8 0%,#e5dab8 100%)\">Miré por la ventana y vi un cuerpo ensangrentado en el pasillo. Me agaché, quedándome sentada unos minutos, intentando procesar la escena macabra que había visto: Su estómago estaba totalmente destruido, como si un animal salvaje lo hubiera atacado. Tragué saliva, mientras observaba a mi alrededor.  El aula en la que estaba se veía vacía y completamente limpia, así que no logro entender por qué sentí la necesidad urgente de salir de allí.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 30%, rgba(40,25,65,.32) 0%, transparent 52%), linear-gradient(180deg,#e0d4a8 0%,#d5c898 100%)\">Un escalofrío me recorría la espalda mientras caminaba por el pasadizo, notando que estaba en una especie de universidad. Las paredes estaban manchadas de sangre y un líquido viscoso amarillo que no reconocía. Intenté no mirar el cuerpo que había visto antes, pero no pude, mis ojos fueron directamente a su estómago. No había más que vertebras dentro, le habían sacado todos los órganos. Cerré los ojos con fuerza y apreté los dientes por instinto, para evitar el dolor punzante de cabeza. Seguí avanzando lentamente, con el cuidado de no hacer ruido, pero había tanto silencio que se escuchaban mis pasos. De repente, un sonido metálico me hizo girar bruscamente.  Observé detenidamente, no había nada.</p>\n<p class=\"pb\">Mis manos, temblorosas, se habían aferrado a una puerta cercana, manchándose de un líquido rojo brillante y glutinoso. Mientras las observaba, levanté la cabeza y vi personas de aspecto extraño; sus prendas tenían manchas de sangre y ese líquido amarillo viscoso que había visto antes. Caminaban con una lentitud antinatural.</p>\n<p class=\"pb\">Sin pensarlo mucho y con asco, me restregué las manos en la cara, manchándome totalmente de aquel repugnante fluido que me había separado de lo inhumano. Junté el cuerpo contra las paredes, tratando de imitar sus movimientos erráticos con la esperanza de pasar desapercibida, pero un sonido chirriante, similar al de un micrófono defectuoso, empezó a sonar muy fuerte. Esto me hizo cerrar los ojos, conteniendo así el impulso de taparme los oídos para no ser descubierta. Cuando los abrí, me encontré en una sala llena de muertos vivientes que deambulaban sin rumbo. Sentía náuseas y un martilleo en el pecho mientras avanzaba a trompicones, tratando desesperadamente de evitar el contacto con sus cuerpos putrefactos.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(60,35,90,.35) 0%, transparent 52%), linear-gradient(180deg,#c8bc88 0%,#b8ac78 100%)\">Luché por regresar a la  puerta, con la poca fuerza de voluntad que me quedaba. Por un instante el deseo de tirarme en el piso  y rendirme, me abrumó.Pero entonces, empezó a sonar una melodía que yo reconocía: “Take Me on the Floor de The Veronicas. Una oleada de melancolía me invadió, seguida de un miedo paralizante: Lo zombis se estaban alineando para hacer una coreografía. Empecé a respirar con dificultad, pero traté de imitar sus macabros movimientos.</p>\n<p class=\"pb\" id=\"zombie-music-start\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(180,60,80,.32) 0%, transparent 50%), linear-gradient(180deg,#c0b478 0%,#aaa468 100%)\">“I was lonely now you make me feel alive\nWill you be mine tonight “</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 50%, rgba(60,35,90,.40) 0%, transparent 55%), linear-gradient(180deg,#b0a860 0%,#a09858 100%)\">Un paso a la derecha, un giro torpe… pisé algo blando. Miré hacia abajo. Era una mano cercenada. —¡Mierda! —solté. Levanté la mirada angustiada; el zombi frente a mí se acercaba, sin dejar de bailar. Yo tragaba saliva. —¿Eres... eres persona? —susurró sin mirarme. —Sí... sí lo soy —respondí, tratando de mover la cabeza al ritmo de la música y asegurándome de que nadie más nos estuviera mirando. —Yo también... yo también soy persona —susurró alguien detrás de mí.</p>\n<p class=\"pb\">Tuve muchas ganas de voltear, pero no lo hice. Un problema mayor se acercaba... No podía dejar de mirarlo. Iba a morir de la manera más violenta imaginable</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(180,50,70,.38) 0%, transparent 50%), linear-gradient(180deg,#a09858 0%,#908848 100%)\">“You take me higher with every breath I take\nWould it be wrong to stay.”</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(60,35,90,.42) 0%, transparent 55%), linear-gradient(180deg,#888040 0%,#706830 100%)\">La coreografía continuaba, pero yo había dejado de bailar, mi corazón latía cada vez más rápido. Un hombre alto y canoso se acercaba a nosotros con movimientos grotescos. Nos había descubierto. Mi cuerpo tiritaba incontrolablemente.</p>\n<p class=\"pb\">Cuando estuvo lo suficientemente cerca, dijo en voz baja: —¿Son... son personas? —su voz temblaba como la nuestra. Tenía los ojos llenos de lágrimas. Los míos también se llenaron, pero no se escapó ninguna. Otros supervivientes se acercaron, revelando su humanidad oculta. Pude ver cómo se acercaban entre sí, comportándose como personas. Me di cuenta de que, al igual que yo, estuvieron actuando  para evitar ser atacados por los zombis que habían dejado cuerpos muertos en los pasillos.</p>\n<p class=\"pb\">Retrocedí para tener una mejor vista de la escena. Todos los presentes eran desconocidos para mí, pero cada vez que hacía contacto visual con alguien, me dedicaban una sonrisa y un asentimiento. Yo correspondía de la misma manera. Al llegar al fondo de la sala, me encontré con mesas y sillas apiladas desordenadamente. Me subí a la mesa más cercana y traté de ver si había algún zombi en la sala. Todos estaban hablando y abrazándose entre lágrimas, todos se comportaban como personas.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(100,50,30,.40) 0%, transparent 52%), linear-gradient(180deg,#706830 0%,#504820 100%)\">Mientras los miraba, una pregunta surgió en mi mente: ¿dónde están los zombies?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 80%, rgba(200,30,10,.50) 0%, transparent 45%), radial-gradient(ellipse at 50% 20%, rgba(30,15,50,.45) 0%, transparent 52%), linear-gradient(180deg,#504820 0%,#201008 100%)\">Fue entonces cuando vi el patio.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(180,15,5,.58) 0%, transparent 48%), linear-gradient(180deg,#301808 0%,#100404 100%)\">El horror me golpeó como un puño en el estómago. Ahí era donde la verdadera pesadilla se desarrollaba: Zombis, sus cuerpos retorcidos y hambrientos, se abalanzaban sobre los vivos. No eran mordiscos, eran... desgarros. Una masacre. Cuerpos destrozados, extremidades esparcidas como muñecos rotos. Sangre, gritos, llanto.</p>\n<p class=\"pb\">Me quedé inmóvil.  Solo oía el retumbar de la música.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(160,10,5,.62) 0%, transparent 50%), linear-gradient(180deg,#200808 0%,#080202 100%)\">“I wanna kiss a (kiss a, kiss a, kiss a)\ndadada da dadadada\ndadada da dadadada\ndadada da dadadada</p>\n<p class=\"pb\">now everybody kiss.”</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_11\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 11</p>\n<h2 class=\"pt\">Luces, cámara, terror</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 40% 30%, rgba(180,140,60,.22) 0%, transparent 50%), linear-gradient(180deg,#f0e8d0 0%,#e8dec0 100%)\">Mientras ella se quejaba de su esposo, percibí la entrada de alguien más. Al voltear, me encontré con una sombra inusualmente grande. No parecía la sombra de un hombre, más bien era una silueta extraña que se movía de manera zigzagueante. Solo podía distinguir su boca, o una curva que simulaba ser una boca. Un recuerdo fugaz cruzó mi mente: lo había visto antes, en una pesadilla.</p>\n<p class=\"pb\">Cuando volví a mirar a mamá, ella estaba conversando con el camarero. Olvidé cómo respirar. Me quedé sin palabras; esa presencia estaba demasiado cerca. Se sentó junto a ella y, aunque no tenía ojos, podía sentir que me observaba con una sonrisa grotesca que se curvaba en la oscuridad de mi mente. Logré recuperar la capacidad de hablar y, apenas susurrando, pude decir:</p>\n<p class=\"pd\">—Mamá —dije, señalando con un dedo tembloroso. Ella siguió la dirección de mi dedo, luego me miró a los ojos y comentó que estaba pálida. Pidió un vaso con agua, casi a gritos, pues el camarero ya se había retirado. La situación parecía surrealista, como si todo ocurriera a cámara lenta</p>\n<p class=\"pb\">Eso permanecía frente a mí, junto a mi madre. El camarero regresó con el vaso de agua y me lo entregó. Intenté beberlo, pero mis manos temblaban tanto que lo dejé caer. El estruendo al chocar contra el suelo resonó en todo el lugar. En ese momento, esa presencia desapareció. Pero el techo... El techo estaba lleno de extrañas formas, como si algo estuviera corriendo y dejara tras de sí manchas grises por todas partes. Mi madre me miraba inmóvil. Me di cuenta de que mi comportamiento era errático: seguía las manchas con la mirada y respiraba agitadamente.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(140,100,40,.28) 0%, transparent 52%), linear-gradient(180deg,#dfd5b0 0%,#d0c898 100%)\">Fue entonces cuando, por primera vez, observé detenidamente el rostro del camarero, quien permanecía parado frente a mí sin moverse ni decir palabra: Era como si le hubieran arrancado los rasgos faciales, dejando solo carne al descubierto. Como si su rostro hubiera sido el escenario de una partida de michi. Quise gritar, pero todo se volvió negro y me desvanecí.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(180,180,168,.25) 0%, transparent 52%), linear-gradient(180deg,#d5d0b8 0%,#c8c2a0 100%)\">Cuando desperté, tenía una especie de tela en la cabeza que no me dejaba ver bien. Apenas podía moverme y abrir los ojos era un esfuerzo descomunal. Mi cuerpo temblaba incontrolablemente, y mi respiración no seguía el ritmo de mi cerebro. No tenía control sobre mis manos. Noté un pequeño agujero en la tela y traté de enfocar mi atención allí para poder ver algo. Lo que vi me dejó estupefacta: mi mamá reía con el mozo, que lucía exactamente igual que en el restaurante.</p>\n<p class=\"pb\">Me sentía completamente confundida, pero entonces comenzaron a llegarme flashbacks que me ayudaron a atar cabos y llegar a una conclusión aterradora: todo era un plan para volverme loca.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 30%, rgba(100,80,20,.28) 0%, transparent 50%), linear-gradient(180deg,#c5bc98 0%,#b8b080 100%)\">Recordé a uno de mis hermanos hablando con alguien y disimulando rápidamente al verme. No había nadie más allí, pero minutos después, al quedarme sola, sentí una presencia detrás de mí y una mano en mi hombro. Me giré de inmediato, pero no había nada. También recordé la cena con mi padre, cuando una silla se movió sola. Le pregunté si veía lo mismo, y aunque negó con la cabeza, sus ojos seguían el movimiento de la silla. Y luego estaba mi madre, que se esforzó para que no mirara al camarero hasta el momento preciso, en aquel restaurante donde solo estábamos nosotros tres.</p>\n<p class=\"pb\">Todo parecía estar perfectamente planeado, pero ¿por qué?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(160,50,20,.35) 0%, transparent 48%), linear-gradient(180deg,#b0a870 0%,#9a9058 100%)\">Mis ojos se llenaron de lágrimas al pensar que las personas a las que amaba, mi familia, me estaban torturando de la manera más aterradora y repugnante.</p>\n<p class=\"pb\">Mi madre miró su reloj y se acercó a mí. Se sentó a mi lado y con delicadeza me quitó lo que cubría mi cabeza. Abrí los ojos, fingiendo desorientación, aunque en realidad, y para mi horror, lo estaba. Me habló del desmayo y de que estábamos en una clínica. Sus palabras se desvanecían mientras una oleada de ira me inundaba.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(180,40,10,.40) 0%, transparent 45%), linear-gradient(180deg,#a09250 0%,#888238 100%)\">Al sentir que recuperaba el control de mi cuerpo, me lancé sobre ella, intentando estrangularla con todas mis fuerzas. La imagen de su lucha y su rostro enrojecido me devolvió a la realidad. Me detuve en seco, abrumada por la culpa. Era mi madre. ¿Por qué hice eso? ¿Por qué me hizo eso ella a mí? Un escalofrío de pánico me recorrió: me sentí observada.</p>\n<p class=\"pb\">Al mirar hacia la puerta, vi a un médico, una enfermera y un hombre con bata azul, pálido y demacrado. Y entonces, por un instante, la sombra que me atormentó en el restaurante se asomó. Entendí: eran personas disfrazadas. Muy realista, por cierto. Punto para quien diseñó el vestuario.</p>\n<p class=\"pd\">—¿Por qué? ¿Por qué hacen esto? ¡¿Qué carajos?! —pregunté.</p>\n<p class=\"pb\">Eran preguntas abiertas, dirigidas a cualquiera; me daba igual quién respondiera. Solo quería respuestas. Entre la gente reconocí caras que creí conocer toda mi vida. Mierda. ¿Había algo real en todo esto? Las lágrimas caían sin cesar de mis ojos. La comprensión me golpeó como un batazo: mi familia, lo que había vivido, todo había sido una despiadada y elaborada farsa.</p>\n<p class=\"pd\">—¿Quién soy yo? ¿Quiénes son ustedes? —pregunté desesperada. Sentía como si estuviera viviendo una versión de terror de \"El Show de Truman\". Las lágrimas nublaban mi visión mientras mi mente, hecha un caos, intentaba encontrarle sentido a lo imposible.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(200,30,10,.45) 0%, transparent 42%), radial-gradient(ellipse at 80% 80%, rgba(5,3,20,.35) 0%, transparent 50%), linear-gradient(180deg,#787048 0%,#484030 100%)\">—Eres la protagonista de la serie más exitosa de todos los tiempos —dijo mi padre con una sonrisa que ahora me parecía escalofriante.</p>\n<p class=\"pd\">—Hay buenos actores, sí, como todos nosotros —dijo mi madre—, pero ese miedo genuino, ese pánico en tus ojos... En cada escena lo das todo. Eres un éxito rotundo.</p>\n<p class=\"pd\">—Al público le encanta —intervino el horrible camarero.</p>\n<p class=\"pd\">—Hay que darle al público lo que pide —añadió una voz desconocida.</p>\n<p class=\"pd\">—Por favor, déjenme ir —supliqué, derrotada.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.50) 0%, transparent 58%), linear-gradient(180deg,#484030 0%,#201818 100%)\">—Oh, no, nena —dijo mi falso padre, señalando unos bolsos absurdamente coloridos y extravagantes, propios de gente adinerada—. Miss Gogo ya compró eso y salió muy caro. Tenemos que pagarlo.</p>\n<p class=\"pb\">Miré la puerta, luego a mi madre, a mi falso padre y finalmente a mi padre.  Mi vida, era una elaborada mentira, y se desmoronaba ante mis ojos</p>\n<p class=\"pb\">Clavé la vista en la pared frente a mí, perdida en mis pensamientos. Todos me observaban con atención.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.55) 0%, transparent 60%), linear-gradient(180deg,#302818 0%,#100808 100%)\">De repente una sonrisa irónica se dibujó en mis labios. Un pensamiento me había atravesado la mente: quizá ahora que sé que no es real, ya no les sirva. Ni siquiera sé actuar.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_12\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 12</p>\n<h2 class=\"pt\">Efecto Glitch</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(120,160,220,.22) 0%, transparent 50%), linear-gradient(180deg,#f0ecdc 0%,#e8e2cc 100%)\">El sol brillaba en un cielo azul inmaculado. El aire fresco, puro y revitalizante, acariciaba, mi piel con ternura. La tranquilidad del pueblo lejos del bullicio y la contaminación de la ciudad, inspiraba paz. Efectivamente no estaba en Lima.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(80,120,200,.28) 0%, transparent 52%), linear-gradient(180deg,#e5dece 0%,#dcd5bb 100%)\">Un grupo de jóvenes caminaban riendo y hablando. De pronto, al final de la calle, algo llamó mi atención, un destello azul. Entrecerré los ojos para ver con claridad. ¡Era el mar! Un mar inmenso se extendía hasta donde la vista no alcanzaba ¿Cómo era eso posible? ¡No se puede ver el mar en un pueblo, y mucho menos en medio de la calle!</p>\n<p class=\"pb\">Escuché murmullos a mi alrededor. Los jóvenes se habían detenido, boquiabiertos. Algunos se llevaban las manos a la cabeza, incrédulos. Otros se tapaban la boca, conteniendo exclamaciones de asombro. Compartía su incredulidad. Lo que veíamos era imposible.</p>\n<p class=\"pb\">De repente un estruendo hizo temblar el suelo. Vi como sus rostros se deslumbraron aún más mientras rebuscaban sus bolsillos. Me giré hacia el origen del estruendo; una enorme ballena haciendo un brinco. Su cuerpo brillaba bajo el sol. Un espectáculo hermoso, pero a la vez profundamente perturbador.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(50,90,180,.35) 0%, transparent 55%), linear-gradient(180deg,#d5cdb5 0%,#c8c0a0 100%)\">Busqué el celular para grabar aquella imagen surrealista, pero no pude encontrarlo. No importaba de todos modos. Me quedé allí, paralizada, contemplando la escena. Ella era enorme, imponente, grandiosa. Me estremecí.</p>\n<p class=\"pb\">Cuando el cetáceo se sumergió, el mar comenzó a retroceder. Los jóvenes corrieron, sabiendo que una ola inmensa se aproximaba. El mar inundó la cuadra, engullendo las casas. Vi a una de las muchachas detenerse y gritar, presa del pánico, mientras veía una casa ser tragada por el agua.</p>\n<p class=\"pd\">—¡Mamá! ¡Papá!</p>\n<p class=\"pb\">Yo me había alejado lo suficiente. Aun así, el eco de sus gritos y la imagen de su rostro lleno de angustia quedaron grabados en mi memoria.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 40% 30%, rgba(80,130,80,.28) 0%, transparent 50%), linear-gradient(180deg,#c5bea2 0%,#b8b08c 100%)\">Después de eso, el mar volvió a la calma, desapareciendo como un espejismo y dejando un paisaje verde y hermoso. Caminé hacia el lugar, atraída por su quimérica belleza. Era como un cuadro pintado a mano por un gran artista. Me estremecí, sí otra vez.</p>\n<p class=\"pb\">Cuando volteé, vi a la joven que había gritado caminar hacia una casa. Era la misma casa a la que había mirado con preocupación al gritar, pensando en sus padres. Se acercó a la entrada y se detuvo en la puerta, dubitativa y nerviosa. Dese ahí observó el paisaje con una mezcla de asombro y preocupación. Pero lo que me dejó sin aliento fue su total inconsciencia de mi presencia. Me acerqué lo suficiente para que me notara, pero nada. Era como si fuera invisible. Como si no existiera ¿Qué estaba pasando?</p>\n<p class=\"pb\">Entró en la casa y yo la seguí, impulsada por una intuición inexplicable que me daba la certeza de que debía hacerlo. Mientras caminaba por los pasillos, se encontró con una mujer mayor que parecía visiblemente enojada.</p>\n<p class=\"pd\">—Almorzamos sin ustedes. ¿Por qué demoraron tanto? Aquí todo queda cerca.</p>\n<p class=\"pd\">—El mar se salió y tuvimos que esperar a que retrocediera —respondió la joven.</p>\n<p class=\"pb\">Al ver su expresión al terminar la frase, me di cuenta de que se había avergonzado de lo que dijo.</p>\n<p class=\"pd\">— ¿El mar se salió? ¡Ja! —repitió la mujer mayor con desdén, mientras caminaba—.</p>\n<p class=\"pb\">Las seguí. La muchacha caminaba detrás de la mujer, cabizbaja, mirando al piso y moviendo la cabeza como si estuviera discutiendo consigo misma. Quizás seguía pensando en lo que había visto.</p>\n<p class=\"pd\">—No entiendo por qué esto se llenó de sal —dijo la mayor, examinando un plato cubierto de cristales blancos.</p>\n<p class=\"pb\">En ese momento, me di cuenta de que estábamos en la cocina.</p>\n<p class=\"pd\">— Mamá, te lo juro, vi el mar allá afuera. Mi tía también debe haberlo visto.</p>\n<p class=\"pb\">La joven avanzaba por un pasadizo que parecía extrañamente familiar, como si ya hubiera estado allí antes. Cuando volví la mirada hacia ella, la vi detenerse bruscamente, su rostro reflejaba un pavor indescriptible. Siguiendo su mirada, me encontré con una escena espantosa: una mujer de mediana edad yacía en el suelo, cubierta de sangre, junto a una adolescente.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(160,20,20,.35) 0%, transparent 48%), linear-gradient(180deg,#a8a080 0%,#909068 100%)\">La menor sostenía una cuchara en la mano, recibiendo un líquido extraño, que goteaba de un agujero en la cabeza de la mujer mayor. Observé con horror cómo la adolescente llevaba la cuchara llena de aquel líquido a su boca. La escena era macabra, casi surrealista.</p>\n<p class=\"pb\">La joven pálida como una vela, retrocedió, pero no pudo evitar hacer ruido.  La adolescente al percatarse de su presencia se le lanzó encima como un animal salvaje.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(180,15,15,.42) 0%, transparent 45%), linear-gradient(180deg,#989070 0%,#787058 100%)\">La muchacha pudo agarrar dos cuchillos para defenderse. Le clavó dos veces en la cabeza, pero no pasaba nada, solo sangre chorreando por toda su cara. Así que trato de hacerlo en el pecho, en el corazón, en el cuello. El sonido del metal destruyendo la carne retumbaba en mi cabeza, juntos con los gritos de la lucha desesperada. Su impotencia la llevó a destruirle la garganta hasta que por fin quedó tirada en el piso.</p>\n<p class=\"pb\">La joven se veía las manos temblorosas, incrédula ante tanta brutalidad. Su aliento agitado me quemaba los pulmones.</p>\n<p class=\"pb\">De repente, la mujer mayor se levantó, reiniciando el ciclo de horror. La joven, ahora en la defensiva, se vio obligada a enfrentarse otra vez a la misma pesadilla, repitiendo los actos desesperados que la habían llevado a ese punto.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.40) 0%, transparent 55%), linear-gradient(180deg,#686050 0%,#404038 100%)\">Bajé la mirada; no quería ver, no podía ver. Sentía el cuerpo adormecido: el rostro, las manos, la cara, como si algo estuviera bloqueando mis emociones. El ambiente sofocaba mis sentidos.</p>\n<p class=\"pb\">Seguí un hilo de sangre con la mirada. Hasta que por fin paró el ruido.</p>\n<p class=\"pb\">Ella salió corriendo y yo fui tras ella. Nos cruzamos con su madre.</p>\n<p class=\"pd\">—Tenemos que irnos. No sé qué está pasando, pero tenemos que salir. —Su voz temblaba, al igual que sus manos llenas de sangre, que sostenían los cuchillos.</p>\n<p class=\"pb\">La madre la veía aterrorizada. Sin decir palabra, puso sus ojos en las manos de la joven.</p>\n<p class=\"pb\">Avancé unos pasos con precaución, buscando asegurarme de que no hubiera nadie más cerca, aunque sabía que era un gesto inútil; era inmaterial. Me sentía perturbada por la situación y deseaba poder hacer algo para ayudar, pero no sabía cómo. Al girarme, vi a la joven acercándose, seguida de su madre. Continué avanzando hasta que finalmente divisé la puerta principal.</p>\n<p class=\"pb\">Al llegar a la sala, noté un tanto extraña a la madre: tenía las manos en su espalda y se movía de una manera inquietante, tambaleando como un animal herido.</p>\n<p class=\"pb\">La joven volteó a verla y también se dio cuenta de eso. Caminó hacia atrás lentamente mientras la miraba.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(200,15,15,.48) 0%, transparent 42%), linear-gradient(180deg,#484038 0%,#201818 100%)\">—Lo siento, hija, me distraje.  Le dijo con una voz peculiar, mientras le enseñaba lo que traía en sus manos: una cuchara de plata.</p>\n<p class=\"pb\">La joven intentó correr, pero su madre la atrapó rápidamente. Noté que no quería usar los cuchillos, pero al final tuvo que hacerlo. Nuevamente sangre por todos lados. Hasta ese punto su ropa estaba completamente manchada de rojo, de sus manos goteaba el líquido espeso y reluciente.</p>\n<p class=\"pb\">Cuando la madre estuvo tirada en el piso sin movimiento, la joven soltó los cuchillos. Se llevó las manos escandalosamente temblorosas a la cara y estuvo así unos minutos. Luego se sentó, abrazó sus rodillas y empezó a llorar desconsoladamente. Un llanto ahogado y desolador, que le desgarraba el alma. Me senté a su lado, volteé a mirarla, pero seguía siendo invisible. Me sentí un glitch, pude verme así.</p>\n<p class=\"pb\">Con el rostro carmesí y los ojos como cascada se levantó con dificultad y caminó lentamente a la puerta principal. Había mucha gente afuera. Alguien estaba dando un performance o algo parecido. Caminó entre la multitud, desorientada. Su cuello mostraba arañazos recientes, y una cicatriz profunda surcaba el lado izquierdo de su frente. No supe en qué momento ocurrió, pudo pasar cuando yo miraba el suelo.</p>\n<p class=\"pb\">Su mirada se cruzó con la de un hombre que parecía más joven que ella. En su rostro se reflejaba una profunda confusión, que trascendía la sorpresa, lo cual era completamente comprensible dado el estado en el que se encontraba ella</p>\n<p class=\"pd\">—Algo horrible está pasando. —susurró la joven, luchando por salvar las palabras que parecían ahogarse en su garganta.</p>\n<p class=\"pb\">Él no articuló sonido alguno.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 50%, rgba(5,3,20,.50) 0%, transparent 55%), radial-gradient(ellipse at 70% 30%, rgba(80,40,180,.30) 0%, transparent 48%), linear-gradient(180deg,#302820 0%,#100810 100%)\">Un viento frío me golpeó en la cara y, de repente, me encontraba en otro lugar, glitcheando. Era un dormitorio y frente a mí había una cama. En esa cama yacía ella, la misma joven que había pasado por aquella terrible situación. Observé cómo acariciaba suavemente la tela de la cama y abrazaba la almohada, como si intentara tranquilizarse, como si hubiera despertado de una pesadilla.</p>\n<p class=\"pb\">La imagen de la adolescente mientras bebía aquel líquido volvió a mi mente, pero sacudí la cabeza para alejar esos recuerdos no deseados.</p>\n<p class=\"pb\">Ella se levantó y se dirigió hacia el baño para mirarse en el espejo. Tenía la cara destruida; se le notaba el cansancio. Regresó a su cama y cerró los ojos</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(50,20,120,.45) 0%, transparent 55%), linear-gradient(180deg,#201018 0%,#08040e 100%)\">Sentí otra vez el viento gélido en mi rostro y otra vez la desconcertante sensación de estar parpadeando fuera de realidad.</p>\n<p class=\"pb\">Aparecí en otro lugar, en una pequeña sala. La joven estaba allí, a punto de cruzar la puerta hacia la calle, cuando se detuvo en seco. Estaba descalza. Retrocedió con un gesto de sorpresa y entró a la casa. Observé cómo su madre se acercaba a ella, tranquila, como si no hubiera pasado nada.</p>\n<p class=\"pd\">—Aquí tengo zapatos. —Dijo, ofreciéndole los suyos.</p>\n<p class=\"pb\">La joven le agradeció, pero tomó otro par que estaba cerca. Cuando estuvo a punto de salir, su cuerpo se desplomó. Sentí como mi existencia se debilitaba también. Me desvanecí.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.62) 0%, transparent 62%), linear-gradient(180deg,#100808 0%,#030102 100%)\">Cuando abrí los ojos tenía la cabeza apoyada en la mesa. Observé cómo la madre de la joven sostenía una jeringa enorme. Supuse que iba a extraer sangre de mí, pero en cambio, la colocó contra mi sien. Sentí el líquido siendo aspirado, el mismo líquido turbio que la adolescente sacaba de la cabeza de aquella mujer. Estaba paralizada, incapaz de moverme. Cuando la jeringa estuvo llena, la mujer tomó un recipiente transparente y la vació dentro. Miré atónita cómo el líquido, similar a la avena licuada, llenaba el recipiente, y como gradualmente, cosas extrañas parecidas a restos comenzaron a emerger a la superficie, moviéndose de manera inquietante.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_13\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 13</p>\n<h2 class=\"pt\">Distopía en el Mall</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(180,170,120,.20) 0%, transparent 50%), linear-gradient(180deg,#f0e8d0 0%,#e8dec0 100%)\">Estaba en un centro comercial, debatiendo con un hombre que me resultaba vagamente familiar si debíamos comprar cerveza Budweiser o Cusqueña. Yo le proponía llevar ambas, pero él insistía en que ya teníamos suficiente alcohol en casa. No entiendo cómo podría relacionarme con alguien que piensa de esa manera, pero bueno, era un sueño.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(80,60,20,.28) 0%, transparent 50%), linear-gradient(180deg,#e0d4b0 0%,#d5c898 100%)\">De repente, vimos a la gente correr despavorida por los pasillos. Miré a mi alrededor para entender qué estaba pasando, pero no vi nada fuera de lo normal. Él me tomó de la mano y me guio hacia la salida, esquivando a las personas que corrían por todos lados. No sé en qué momento nos soltamos, pero pronto ya no lo veía. La multitud estaba histérica. Escuché gritos más fuertes y volteé en la dirección de donde provenían.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(5,3,20,.32) 0%, transparent 52%), linear-gradient(180deg,#d0c490 0%,#b8b078 100%)\">Vi a un grupo de jóvenes, hombres y mujeres, lanzándose sobre la gente como animales. Tenían la piel pálida y el cabello en tonos de gris claros y oscuros, todos con el mismo estilo y vestidos con un enterizo negro que los hacía parecer uniformados. Era extraño ver a personas tan ridículamente atractivas atacando a otros.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 20% 50%, rgba(5,3,20,.38) 0%, transparent 55%), linear-gradient(180deg,#b8b070 0%,#a0a058 100%)\">Corrí junto a un grupo para ponerme a salvo. Me escondí en una góndola enorme entre productos lácteos. Desde ahí, escuchaba los gritos de la gente. No entendía lo que sucedía; no había visto sangre, solo a personas guapas atrapando a los demás en el centro comercial.</p>\n<p class=\"pb\">Me quedé quieta, tratando de no hacer ruido. No sé cuánto tiempo estuve allí, pero en algún momento, ya no se escuchaba nada. Reuní valor y salí. Efectivamente, no había nadie. Caminé mirando por todos lados, escondiéndome en cada pasillo, incluso gateando por si acaso. De repente, me topé con una mujer. Nos miramos con miedo. Cuando me examinó bien, siguió guardando frutos secos y otros snacks en su mochila.</p>\n<p class=\"pd\">—¿Sabes qué fue todo eso? —me animé a preguntar.</p>\n<p class=\"pd\">—No lo sé, llevo días tratando de entender. Ahora están en competencia o ensayo, no lo sé, pero es mejor que te apures.</p>\n<p class=\"pb\">Ni siquiera me miró al hablarme.</p>\n<p class=\"pb\">Ese \"días\" me llenó de dudas, pero no pregunté más.</p>\n<p class=\"pd\">—¿Cuántos son ustedes? —preguntó, rompiendo el aplastante silencio.</p>\n<p class=\"pd\">—Estoy sola —respondí—. ¿Crees que pueda aprovechar para ir a mi casa ahora mismo?</p>\n<p class=\"pb\">Ella me miró como si hubiera dicho algo fuera de lugar. Me sentí avergonzada, aunque no entendí el porqué.</p>\n<p class=\"pd\">—Las calles están repletas de ellos —volvió a mirarme de pies a cabeza—. ¿Estuviste aquí todo el tiempo?</p>\n<p class=\"pd\">—Sí —respondí, aunque mi respuesta sonó más como una pregunta.</p>\n<p class=\"pd\">—¿Estuviste en este piso un mes? — volvió a preguntar con recelo.</p>\n<p class=\"pb\">Eso me estremeció. Miré a mi alrededor buscando una cámara oculta. Luego la miré fijamente, esperando que se le escapara algún gesto o sonrisa, pero su mirada se endureció. Esperaba una respuesta.</p>\n<p class=\"pd\">—Desde hoy en la tarde, no sé qué hora es. No tengo celular.</p>\n<p class=\"pd\">—Hace un mes que atacaron este lugar. Esto es raro. Bueno, suerte.</p>\n<p class=\"pb\">Sentí como la cara se me adormecía mientras la veía irse. Podría haberle preguntado algo más, pero me detuve.</p>\n<p class=\"pb\">Alguien me tocó el hombro, eso hizo que de un brinco hacia adelante. Era un hombre robusto de lentes y barba.</p>\n<p class=\"pd\">—Nosotros somos tres. Si quieres, puedes venir. Trae jugos.</p>\n<p class=\"pb\">Vi que se unía a la mujer, ambos llevaban mochilas, pude notar que discutían sobre algo.</p>\n<p class=\"pb\">Agarré todos los refrescos que entraron en mis brazos y los seguí.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(5,3,20,.40) 0%, transparent 55%), linear-gradient(180deg,#909058 0%,#787040 100%)\">—¿Lamen? — Pregunté con incredulidad. — Pensé que eran vampiros o algo así.</p>\n<p class=\"pd\">—Ajá, solo lamen. Te lamen la cara y en minutos eres guapo —dijo el hombre mientras sonreía.</p>\n<p class=\"pd\">— Piel pálida, cabellos grises y ojos verdes. Yo podría reventarme a muchos, pero hay grupos que son muy fuertes. Si te rehúsas, si te matan. — Paró para beber de su refresco.</p>\n<p class=\"pb\">Volteé a mirarla. Ella tenía una expresión de preocupación. Abrazaba a una niña de unos 10 años. La niña me sonreía. Le devolví la sonrisa.</p>\n<p class=\"pd\">— Tienen la piel como tú. Dices que llevas abajo un mes ¿cómo no te vieron? —Soltó la mujer.</p>\n<p class=\"pb\">Él me miró antes de volver la mirada hacia ella.</p>\n<p class=\"pd\">—Solo es joven, mujer. Un mes comiendo basura enfermarían a cualquiera.</p>\n<p class=\"pb\">Yo no respondí. No entendía nada. Me defendió a su manera e internamente agradecí el gesto.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(5,3,20,.45) 0%, transparent 58%), linear-gradient(180deg,#787040 0%,#484820 100%)\">Nos encontrábamos en el tercer piso del centro comercial, en una habitación que parecía ser usada como almacén. Me asomé a una pequeña ventana que estaba tapada, pero tenía pequeños agujeros para observar. Desde allí, se veía el patio de comidas, que ya no era un patio de comidas. Ahora era una gran sala donde aquellos seres llevaban a cabo competiciones.</p>\n<p class=\"pb\">Compiten entre sí sin mostrar piedad o compasión. Cuando se sumergen en agua helada, el ganador es el que sale vivo. Muchos mueren de hipotermia. En el boxeo los golpes son letales, no hay ningún tipo de reglas. Lo mismo pasa en la Lucha Libre. Los perdedores, que no mueren en los juegos, son asesinados por un hombre que lleva una bolsa de papel en la cabeza. Les dispara en la cien mientras todos aplauden. Eso lo hacen al cierre del día. Nunca se ve tristeza o sentimiento de derrota; aceptan su destino. Como si el plan fuera quedarse solo con los más resistentes, los más fuertes.</p>\n<p class=\"pb\">Eso me lo contó ella cuando pude ganarme su confianza.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(5,120,80,.28) 0%, transparent 50%), radial-gradient(ellipse at 50% 70%, rgba(5,3,20,.35) 0%, transparent 52%), linear-gradient(180deg,#484820 0%,#202820 100%)\">Fijé mi mirada en el espectáculo. Había muchos de ellos, riendo y conversando. Todos muy jóvenes y espantosamente apuestos. No veía a nadie con sobrepeso o arrugas. La duda me carcomía ¿Qué hacían con personas así? ¿Todos se transformaban?  No me atreví a preguntar.</p>\n<p class=\"pb\">Vi a cuatro atractivas mujeres paradas en el medio. Las estaban presentando, ellas sólo estaban ahí, siendo lindas. A pesar de que tenían el mismo estilo, sus facciones eran diferentes. Mi mirada se centró en la del medio. Me resultaba extrañamente familiar. Sentí que la conocía, que la había visto en algún lugar. Su sonrisa, su gran sonrisa me paralizó.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.55) 0%, transparent 58%), linear-gradient(180deg,#202820 0%,#080808 100%)\">—Aplausos para Lea, dijo el presentador.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.65) 0%, transparent 60%), linear-gradient(180deg,#101010 0%,#020202 100%)\">Un viento helado me golpeó el rostro, haciéndome retroceder varios pasos.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_14\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 14</p>\n<h2 class=\"pt\">Vaca in blue</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(120,160,80,.22) 0%, transparent 50%), linear-gradient(180deg,#f0ecd8 0%,#e8e2c8 100%)\">Pantalón negro, polo blanco básico y zapatillas blancas. Un estilo cómodo para un día en el campo, o al menos eso pensé. Pero mis planes cambiaron cuando un hombre apuesto tocó a mi puerta con una sorpresa: una bolsa color caramelo. Dentro de ella había una camisa azul marino, elegante y suave.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 40% 30%, rgba(80,120,180,.20) 0%, transparent 52%), linear-gradient(180deg,#e8e0c8 0%,#e0d8b8 100%)\">Me la probé de inmediato. El tejido se deslizó sobre mi piel, amoldándose a mi figura como si hubiera sido hecha a mi medida. Sentí que había sido hecha para mi. Los detalles de los botones, también azul marino, me encantaban. Decidí dejar mi cabello suelto, para complementar la elegancia de la camisa. Él sonrió al verme. Vi sus ojos de aprobación.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(100,150,80,.22) 0%, transparent 55%), linear-gradient(180deg,#e0d8b8 0%,#d8d0a8 100%)\">Con la camisa azul marino, mis botas negras y mi cabello ondeando al viento, salimos a caminar. Vivo en la ciudad; por ello, siempre me ha fascinado ver a las vacas pastar tranquilamente, así que cuando una apareció a lo lejos, no pude evitar seguirla con la mirada. La vaca se detuvo junto a otra, y luego otra, hasta formar una fila perfectamente alineada. Me quedé observándolas por varios minutos, maravillada por la escena, olvidando por completo que estaba acompañada.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(160,60,20,.32) 0%, transparent 48%), linear-gradient(180deg,#d0c898 0%,#b8b080 100%)\">Fue entonces cuando me di cuenta de que algo no estaba bien. Las vacas no eran normales. Sus cabezas eran deformes y grotescas. El horror me invadió. ¿Quién pudo haberles hecho eso? Tenían el rostro de un ser humano deformado, eso me congeló la sangre. El joven me tocó el hombro, sacándome de mi trance. Al volver a la realidad, las vacas ya corrían hacia nosotros, vi sus rostros anómalos cada vez más cerca. Una pena enorme se apoderó de mí mientras huíamos a toda velocidad.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(180,50,10,.40) 0%, transparent 45%), linear-gradient(180deg,#b0a870 0%,#a09058 100%)\">—Tenemos que saltar —me dijo. Estuvimos corriendo en línea recta. Cuando miré a mi derecha vi una especie de zanja de la que no me había percatado.</p>\n<p class=\"pd\">—Tenemos que saltar hacia ese lado —continuó, apuntando con su dedo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(200,40,5,.48) 0%, transparent 42%), linear-gradient(180deg,#988860 0%,#887848 100%)\">Tuve miedo, yo no podía saltar tan lejos, me caería, pero las vacas se habían amontonado y lo único que las detenía era un alambre. Él saltó y me estaba pidiendo con las manos que hiciera lo mismo desde el otro lado. Volteé a ver las vacas. Mi mirada se fijó en una. Su rostro era de una mujer vieja y afligida; su piel flácida y amarillenta, estaba surcada por arrugas profundas. Sus ojeras oscuras y hundidas acentuaban sus ojos tristes. Tenía una expresión de cansancio. Me miraba directamente, sentí como si quisiese decirme algo, una súplica muda de comprensión o consuelo.</p>\n<p class=\"pd\">—¡María! —gritó él. Su voz me hizo dar cuenta de que las vacas retrocedían, tomando impulso para saltar el alambre. Todas, excepto una.</p>\n<p class=\"pb\">Sin pensarlo, salté. Estuve a punto de caer, de no ser por él, que me sostuvo con sus fuertes brazos. Su mano apretó la mía y, sin mediar palabra, me arrastró en una carrera desenfrenada. El impulso de mirar atrás fue irresistible. Volví a toparme con los ojos afligidos de aquella vaca. La sensación de familiaridad me erizaba la piel. Mientras corríamos, su imagen me atormentaba. ¿Qué clase de experimento monstruoso había transformado a ese ser? ¿Qué le hicieron?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.38) 0%, transparent 55%), linear-gradient(180deg,#808060 0%,#606040 100%)\">Cuando por fin nos detuvimos y pude recuperar el aliento, me quedé mirando el vacío. Había sentido miedo, mucho miedo, pero algo más me angustiaba, me ahogaba hasta casi adormecer mi rostro. Una idea desesperada me asaltó: debía volver. Tenía que volver. Quizá ellas solo querían escapar, ¿cómo saberlo?</p>\n<p class=\"pb\">Sentí náuseas. ¿Qué otras cosas extrañas y perturbadoras habría allí? Las náuseas se intensificaron, un nudo en la garganta me impedía tragar mi propia saliva.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(100,140,180,.28) 0%, transparent 52%), linear-gradient(180deg,#e8e0c8 0%,#ddd5b0 100%)\">Desperté sobresaltada, con el corazón latiendo con fuerza. Otro sueño extraño— pensé—aún aturdida. Adormilada aún, busqué el celular. No quería volver a dormir. Tenía la imagen de aquella vaca en la cabeza. Lo primero que hice fue abrí Twitter. Un escalofrío me recorrió el cuerpo a ver mi en Inicio cuatro imágenes: yo frente al espejo, luciendo la camisa azul; la vaca deforme observándonos fijamente mientras huíamos; la vaca y yo mirándonos; y finalmente, las vacas en fila.  \"¿QUÉ ES ESTO?!\", decía el texto que acompañaba las fotos.</p>\n<p class=\"pb\">Los comentarios eran perturbadores: \"¡Amé!\", \"¿En qué plataformas se puede ver?\", \"¡La camisaaa!\", \"Chicas, ¿dónde venden ese tipo de camisa?\". Interactuaban como si fuera una película, una ficción creada para su entretenimiento.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(80,120,190,.30) 0%, transparent 52%), linear-gradient(180deg,#d8d0b0 0%,#c8c098 100%)\">Volví a la foto de la vaca, ampliándola con el zoom. Las imágenes de mi pesadilla volvieron a mí. Un nudo se formó en mi estómago.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(80,110,180,.32) 0%, transparent 52%), radial-gradient(ellipse at 30% 70%, rgba(160,50,20,.25) 0%, transparent 45%), linear-gradient(180deg,#c8c098 0%,#b0a880 100%)\">Dejé el celular a un lado y miré la habitación en busca de una cámara oculta o algo similar. Inesperadamente, vi la camisa azul marino, tirada sobre una silla. Volví a mirar la habitación detalladamente, tratando de comprender aquella situación tan … absurda.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_15\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 15</p>\n<h2 class=\"pt\">No cruces la puerta</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 40% 30%, rgba(180,160,100,.22) 0%, transparent 50%), linear-gradient(180deg,#f0e8d2 0%,#e8dec8 100%)\">Me encontraba en una casa enorme, de paredes blancas, que me resultaba familiar. Subía las escaleras sin ninguna preocupación. Todo se sentía ligero y tranquilo: la seguridad de un hogar. Al llegar al último piso, en la azotea, vi una puerta marrón perfectamente tallada. Los acabados me daban a entender que estaba hecha de materiales finos; no sé de madera ni de puertas, pero cuando algo es fino, se nota.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 60% 40%, rgba(140,100,40,.28) 0%, transparent 52%), linear-gradient(180deg,#e5dbc8 0%,#ddd0b0 100%)\">La presencia de aquella puerta me causó intriga, como si fuera un objeto que no debería estar ahí. Estaba pegada a una pared, pero se notaba que se podía abrir.  Me quedé estudiando la puerta por unos minutos, la curiosidad y el temor se apoderaron de mí al sentir un viento frío recorrer mi espalda.</p>\n<p class=\"pd\">— ¿Debería ver que hay detrás de esa puerta? ¿O mejor me voy? ¿Qué es lo peor que puede pasar? — pensaba, mientras caminaba lentamente hacia su dirección.</p>\n<p class=\"pb\">Esa sensación de que no deberías hacer algo, pero aun así lo haces, la sentí. Y no pude quedarme con la duda porque mi espíritu es curioso.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(120,90,30,.32) 0%, transparent 52%), linear-gradient(180deg,#d5c8a8 0%,#c8bc90 100%)\">Cuando volví en mí, ya estaba frente a la puerta. Seguí admirando sus detalles: el brillo de la madera, su color caoba profundo y, especialmente, los acabados artesanales que me provocaban una sensación de misterio. Puse las puntas de mis dedos sobre ella, sintiendo la textura en mis yemas, y bajé despacio, acariciando la superficie, hipnotizada. Me di cuenta de que no tenía perilla, así que empujé.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(80,130,200,.30) 0%, transparent 50%), linear-gradient(180deg,#c8bc90 0%,#b8ae78 100%)\">Me fui hacia adelante. Al levantar la mirada me topé con un escenario un poco perturbador: Podía ver el mar, pero todo se veía borroso; como si le hubieran reducido la definición a mis ojos, como las imágenes de los televisores antiguos que apenas entraban a la era del color, como si fuese un espejismo. Miré hacia todos los lados para ver si había alguien más, pero solo estaba yo. Atribuí la distorsión de la imagen al terrible calor que se sentía.</p>\n<p class=\"pb\">No sé por qué, pero se me ocurrió la maravillosa idea de caminar, el mar se veía relativamente cerca. Pasaron unos minutos y sentí que no había avanzado nada. Caminaba, pero la playa se veía igual de lejos. Con un mal presentimiento, me di la vuelta. No podía ver la puerta. Preocupada, caminé de regreso. Me había alejado demasiado. ¿Cómo funcionaba la distancia ahí?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(80,130,200,.35) 0%, transparent 52%), radial-gradient(ellipse at 50% 80%, rgba(5,3,20,.25) 0%, transparent 50%), linear-gradient(180deg,#b0a870 0%,#a09060 100%)\">Después de una caminata de aproximadamente 15 minutos, alcancé a ver una ruma de piedras. Allí fue cuando sentí un dolor en la garganta y ese bajón en el estómago que anunciaba qué la había jodido olímpicamente. Fui hacia el montón de piedras y las observé. Empecé a sudar, me dolía la mandíbula, las manos me temblaban y era incapaz de dar un paso más. No era por cansancio, sino por la idea de que la puerta había desaparecido, de que todo estaba perdido. Me quedé mirando las piedras fijamente, como esperando que se convirtieran en algo. Hasta que miré al lado derecho; unos metros más allá estaba ahí. ¡Era la puerta! Fui rápidamente hacia ella y la empujé con fuerza.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(5,3,20,.38) 0%, transparent 55%), linear-gradient(180deg,#989068 0%,#807858 100%)\">Nuevamente en casa. Corrí escaleras abajo con el corazón a punto de salirse del pecho, hasta que en un piso me topé con una mujer. Ella me quedó mirando estupefacta, y repentinamente, me abrazó. Pude ver que sus manos temblaban. Sentí su emoción al verme, pero su mirada era triste. Empezó a llorar desconsoladamente. Me tomó de los brazos y, sollozando, me dijo:</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(5,3,20,.45) 0%, transparent 58%), linear-gradient(180deg,#807858 0%,#504838 100%)\">— ¿Dónde estuviste? Te buscamos por tanto tiempo, tantos años.\n Mamá … — Se calló, somo si necesitara tomar aire. Yo la miraba sin atreverme a decir una sola palabra.</p>\n<p class=\"pd\">— Mamá no perdía las esperanzas de volver a verte, rezaba todos los días. Lloraba mientras hacía sus cosas. Salía a la calle con folletos. Iba a la televisión. Todo lo que pensaste que nunca haría, ¡lo hizo!  Se murió de tristeza. ¡Murió sin saber de ti!</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.55) 0%, transparent 62%), linear-gradient(180deg,#484030 0%,#201818 100%)\">El “¡Murió sin saber de ti!”  retumbó en mi cabeza dolorosamente. Sentí que me iba a desmayar. Las palabras peleaban en mi garganta, incapaces de salir, me lastimaban, me quemaban. Podía sentir el sudor frío en mi frente. Mis ojos eran cascadas.</p>\n<p class=\"pb\">Mi hermana menor tenía 19 años cuando crucé esa maldita puerta. La miré otra vez; era ella en otro cuerpo, con el rostro más maduro. Y yo … yo estaba igual al día en que me fui.</p>\n<p class=\"pd\">— So … Solo, me fui treinta minutos — dije al fin y pude sentir como si un cuchillo afilado me cortara la garganta.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.65) 0%, transparent 65%), linear-gradient(180deg,#201818 0%,#080404 100%)\">— Ya han pasado treinta años. Treinta años desde que te fuiste sin dejar rastro — replicó ella, con voz temblorosa, mientras tocaba mis manos, mi cara, mi cabello. Asegurándose de que era real.</p>\n<p class=\"pb\" data-atmos=\"linear-gradient(180deg,#080404 0%,#030202 100%)\">Todo mi alrededor desapareció. Estaba yo en la nada mientras escuchaba a susurros:</p>\n<p class=\"pd\">— Han pasado treinta años.</p>\n<p class=\"pd\">— Treinta años.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Bonus__Relato_16\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Bonus · Relato 16</p>\n<h2 class=\"pt\">Pesadilla: La Incredulidad</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 40% 20%, rgba(40,30,80,.20) 0%, transparent 50%), linear-gradient(180deg,#ede5c8 0%,#e5dbb8 100%)\">En la quietud de la sala, frente a la computadora, miraba una hoja en blanco para postergar el sueño. La semana había sido dura, mi cerebro estaba cansado, pero el temor de soñar me mantenía en vilo.</p>\n<p class=\"pb\">Una sensación extraña me recorrió el rostro, como si cientos de bichos invisibles caminaran sobre él. Me llevé la mano a la mejilla, pero no registré el golpe. Estaba adormecida.</p>\n<p class=\"pd\">—Necesito dormir o voy a enloquecer —murmuré, mirando el reloj que marcaba las 2:00 a.m. Solo faltaban dos horas. Aunque en la madrugada, el tiempo parecía estirarse interminablemente. La madrugada, mi némesis. Esa vez, los mareos y la punzada en la cabeza eran insoportables.</p>\n<p class=\"pb\">Un pensamiento emergió: Era hora de afrontar mis miedos. No podía seguir huyendo. Mi cara reflejaba desgaste. Estaba harta, profundamente harta.</p>\n<p class=\"pd\">—¡A la mierda el diablo y a la mierda todo!—dije en voz baja, pero con intensidad.</p>\n<p class=\"pb\">Resuelta, apagué la computadora y me dirigí a mi habitación, dispuesta a desafiar a lo que me desafiara. Pero al llegar a la puerta de la sala, una visión surreal me detuvo en seco: el pasillo que conducía a las habitaciones estaba lleno de siluetas que bailaban, iluminadas por luces multicolores, pero sin rastro de música. Dudé por un instante, pero avancé entre las sombras, abriéndome paso hacia mi habitación. Al caminar entre ellas, me di cuenta de que no eran personas, sino meras proyecciones. La confusión intensificaba mi dolor de cabeza, pero no podía detenerme a analizarlo. El pasillo parecía interminable.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 10%, rgba(30,20,60,.28) 0%, transparent 52%), linear-gradient(180deg,#dfd4a8 0%,#d0c898 100%)\">Finalmente, me encerré en mi cuarto. La visión de las sombras danzantes me dejó desconcertada, pero no asustada. ¿Una alucinación? ¿El resultado de dormir apenas dos horas al día? Ya no estaba segura de qué era real y qué era producto de mi mente agotada. Había llegado al punto en el que ese tipo de situaciones me sorprendían, pero no me atemorizaban. Lo que me daba un terrible miedo era dormir. Era tan absurdo.</p>\n<p class=\"pb\">Ya acostada en mi cama, muerta de cansancio no podía dormir, pensé que sería fácil, pero no lo fue. Lo simple se vuelve complicado cuando se forma una huella mental. Los pensamientos invadían mi mente.</p>\n<p class=\"pb\">Relájate, no te puede pasar nada. No vas a morir. No te va a romper la costilla, es solo un sueño. Sería ilógico. Sé   fuerte, aguanta y descubre quién es, para entender por qué sucede eso.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(20,10,50,.38) 0%, transparent 55%), linear-gradient(180deg,#c8bc88 0%,#b0a870 100%)\">Cerré los ojos. El ambiente se volvió denso y un aire frío recorrió mi espalda. Había comenzado, me había quedado dormida sin darme cuenta. No podía abrir los ojos, pero mis otros sentidos se agudizaron. Alguien entró corriendo a la habitación y se subió a mi cama. Una niña, o quizás un niño, pequeño y asustado, buscando refugio. El miedo se sentía en el aire, su cuerpo temblaba.</p>\n<p class=\"pb\">Estaba buscando refugio. ¿Yo, su refugio? Imposible. Yo, la cobarde del barrio, quizás del distrito, de la ciudad, del país... ¡del mundo! ¿Cómo podría proteger a alguien? Su respiración se aceleró. La temperatura cambió. Algo se acercaba. Lo que fuera, venía por él, por ella, por mí. Lo sentía cada vez más cerca, como un depredador acechando a su presa. Mi corazón iba a explotar.</p>\n<p class=\"pb\">Había planeado cómo defenderme, pero no había considerado esto. Alguien confiaba en mí. Si fallaba, no solo me afectaría a mí, sino también a esta pequeña alma que creía en mi protección. La desesperanza se apoderó de mí: Le temíamos a lo mismo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(10,5,40,.50) 0%, transparent 58%), linear-gradient(180deg,#988060 0%,#604830 100%)\">La presencia maligna ya estaba en mi cama. Aterrada, no podía moverme ni despegar los párpados. El niño o niña seguía aferrado a mí, temblando. Mi cuerpo se estremecía, a pesar del calor sofocante.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 40%, rgba(5,3,30,.58) 0%, transparent 55%), linear-gradient(180deg,#705040 0%,#302020 100%)\">Sentí un dedo acercarse a mi costilla derecha. Lo sabía, lo presentía. Entonces, un dolor agudo e insoportable comenzó a intensificarse con cada respiración. Intentar moverme solo empeoraba el tormento; cada movimiento fallido aumentaba la presión sobre mi costilla. Ya no podía respirar. Me estaba desvaneciendo.</p>\n<p class=\"pb\">Había fallado de nuevo, le había fallado a alguien más.</p>\n<p class=\"pb\">Desperté empapada en sudor, con el corazón desbocado. Me incorporé en la cama, la oscuridad ya se había disipado un poco. Una ola de frustración me inundó, dejando un sabor amargo en mi boca reseca. Me levanté tambaleando y me dirigí hacia la cocina. El pasillo, vacío y silencioso, oprimía mi pecho. Llené un vaso de agua y me senté en el frío suelo. Palpé las losetas, luego el vaso, buscando algo tangible, algo real. Estaba tratando de evitar cualquier pensamiento que tenga que ver con lo había pasado minutos antes. La sensación de fracaso me golpeaba el cuerpo.</p>\n<p class=\"pd\">—Si quieres llorar, llora. —me repetí con fuerza, pero mis ojos solo se cristalizaron. Ninguna lágrima se atrevió a caer.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(30,20,60,.42) 0%, transparent 55%), linear-gradient(180deg,#503838 0%,#302028 100%)\">Un entumecimiento familiar me invadió. La cara, siempre la cara… No quería volver al dormitorio. Perdí la noción del tiempo, pero las 6:00 am aún debían estar lejos.</p>\n<p class=\"pb\">Me arrastré hasta la sala, encendí la luz y me dejé caer en el sofá. El frío me calaba los huesos, así que me acurruqué intentando darme calor. Traté de contener la respiración. Entonces, los pensamientos abrieron paso:</p>\n<p class=\"pb\">¿Quién será la niña o niño? ¿Qué pasó en esta casa? ¿Qué es aquello que me toca? ¿Por qué la costilla? Tengo que aprender a aguantar la respiración, eso es lo que me desquicia.</p>\n<p class=\"pb\">Repentinamente, con el rabillo del ojo vi como una figura se materializó en la esquina del sofá, cerca de mis pies. Llevaba una especie de túnica o vestido beige, de una sola pieza. Me paralicé. Mi única defensa fue cerrar los ojos con fuerza.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,30,.55) 0%, transparent 58%), linear-gradient(180deg,#302028 0%,#100810 100%)\">De repente, aplaudieron dos veces frente a mi rostro, haciendo que abra los ojos del susto. Pude ver dos manos pálidas desaparecer frente a mí.</p>\n<p class=\"pb\">Mi corazón, un atentado. La adrenalina me impulsó a correr hacia la habitación, donde me lancé a la cama y me cubrí de pies a cabeza. La turbación se apoderó, un nudo de angustia oprimía mi garganta. ¿Qué se suponía que debía hacer?</p>\n<p class=\"pb\">La atmosfera se volvió opresiva otra vez. Resignada, esperé lo inevitable. La presencia se acercó, y sentí su dedo espectral rozando mi costilla derecha. El dolor era insoportable, pero esta vez, el aliento con cada gramo de voluntad que pude reunir, logré hacer un movimiento completo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.50) 0%, transparent 58%), linear-gradient(180deg,#100810 0%,#040204 100%)\">Un pequeño triunfo, por fin había logrado moverme. Una chispa de satisfacción se encendió en mi pecho.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Bonus__Relato_17\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Bonus · Relato 17</p>\n<h2 class=\"pt\">Dejen Dormir</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(40,30,80,.25) 0%, transparent 50%), linear-gradient(180deg,#ece4cc 0%,#e4dab8 100%)\">Un murmullo le arrancó el sueño, voces que parecían venir de ninguna parte. Una especie de cuchicheo silbante, un sonido realmente molesto. Pero al notar la madrugada y el silencio del resto de la casa, un escalofrío la recorrió. Fijó la mirada en el techo, aún invisible en la oscuridad, como si de alguna manera pudiera hallar las respuestas allí, como lo hace la gente cuando está rindiendo un examen y busca recordar algo. Anhelaba que las voces cesaran. No distinguía las palabras, ni siquiera el idioma, solo un sonido distorsionado.</p>\n<p class=\"pb\">Por un instante, el miedo la invadió: ¿y si las voces eran producto de su mente? Cerró los ojos y sacudió la cabeza, intentando alejar ese pensamiento que la arrastraba hacia los rincones más oscuros de su psique. A pesar de ello, mil ideas dispar
