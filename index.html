<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El arte de dormir terriblemente mal</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --pw: clamp(220px, 30vw, 420px);
  --ph: calc(var(--pw) * 1.46);
  --sw: 18px;
  --bw: calc(var(--pw) * 2 + var(--sw));
  --dark:    #06060e;
  --burg:    #4a0f0f;
  --burg2:   #2a0808;
  --sand:    #d4b896;
  --sand2:   #9e8a76;
  --faint:   #5c4e40;
  --coral:   #c94040;
  --mauve:   #b88080;
  --page-l:  #0e0810;
  --page-r:  #10080e;
  --text:    #d0c4b0;
  --text2:   #8a7a6a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:radial-gradient(ellipse at 40% 40%, #130808 0%, #06060e 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Crimson Pro',serif;cursor:none;user-select:none;
  min-height:100vh;
}

/* noise */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.03;
}

/* cursor */
#cd,#cr{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cd{width:5px;height:5px;background:var(--coral);border-radius:50%;transition:transform .1s}
#cr{width:24px;height:24px;border:1px solid rgba(201,64,64,.4);border-radius:50%;transition:width .25s,height .25s,border-color .25s}

/* ── SCENE ── */
.scene{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;
  perspective:4000px;
}

/* ── BOOK WRAP ── */
.book-wrap{
  position:relative;
  width:var(--bw);height:var(--ph);
  transform-style:preserve-3d;
  transition:transform .9s cubic-bezier(.4,0,.2,1);
  transform:rotateY(-12deg) rotateX(2deg);
  filter:drop-shadow(-30px 40px 60px rgba(0,0,0,.9));
}
.book-wrap.open{
  transform:rotateY(0deg) rotateX(0deg);
}

/* ── PAGES ── */
.page-left,.page-right{
  position:absolute;top:0;
  width:var(--pw);height:var(--ph);
  overflow:hidden;
}
.page-left{
  left:0;
  background:linear-gradient(135deg,#0d0810 0%,#120810 100%);
  box-shadow:inset -8px 0 20px rgba(0,0,0,.5);
}
.page-right{
  right:0;
  background:linear-gradient(225deg,#100810 0%,#0e0610 100%);
  box-shadow:inset 8px 0 20px rgba(0,0,0,.5);
}

/* ── SPINE ── */
.spine{
  position:absolute;left:var(--pw);top:0;
  width:var(--sw);height:var(--ph);
  background:linear-gradient(to right,#1a0505 0%,#3a0a0a 40%,#3a0a0a 60%,#1a0505 100%);
  z-index:5;
  box-shadow:0 0 20px rgba(0,0,0,.8),inset 0 0 8px rgba(0,0,0,.5);
}
.spine::before,.spine::after{
  content:"";position:absolute;left:50%;
  width:1px;height:100%;
  background:rgba(196,100,60,.15);
}
.spine::before{transform:translateX(-3px)}
.spine::after{transform:translateX(3px)}

/* 3D book sides when closed */
.book-side-bottom{
  position:absolute;bottom:0;left:0;right:0;
  height:var(--sw);
  background:linear-gradient(to bottom,#c4b090,#a09070);
  transform:rotateX(-90deg);
  transform-origin:bottom center;
  box-shadow:0 3px 10px rgba(0,0,0,.5);
}
.book-side-right{
  position:absolute;top:0;right:0;bottom:0;
  width:var(--sw);
  background:linear-gradient(to right,#c4b090,#9a8860);
  transform:rotateY(90deg);
  transform-origin:right center;
}

/* ── COVER ── */
.cover{
  position:absolute;inset:0;
  z-index:30;
  transform-origin:left center;
  transform-style:preserve-3d;
  transition:transform .8s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.cover.flipped{
  transform:rotateY(-180deg);
}
.cover-front,.cover-back{
  position:absolute;inset:0;
  backface-visibility:hidden;
}
.cover-back{
  transform:rotateY(180deg);
  background:linear-gradient(135deg,#0d0810 0%,#120810 100%);
}

/* Cover design */
.cover-front{
  display:grid;grid-template-columns:1fr 1fr;
  overflow:hidden;
}
.cover-half-l{
  background:linear-gradient(160deg,#5a1212 0%,#3d0b0b 50%,#250606 100%);
  position:relative;
}
.cover-half-r{
  background:linear-gradient(200deg,#0a080f 0%,#070710 60%,#04040c 100%);
  position:relative;
}
/* vertical seam glow */
.cover-half-r::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(201,64,64,.6) 30%,rgba(201,64,64,.6) 70%,transparent);
}

/* cover frame */
.cover-frame{
  position:absolute;inset:14px;
  border:1px solid rgba(212,184,150,.18);
  pointer-events:none;z-index:2;
}
.cover-frame::before{
  content:"";position:absolute;inset:5px;
  border:1px solid rgba(212,184,150,.08);
}

/* cover title area — spans full width via absolute */
.cover-content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:3;padding:2rem;
  text-align:center;
}
.cover-eyebrow{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(.45rem,.8vw,.65rem);
  letter-spacing:.38em;text-transform:uppercase;
  color:var(--mauve);margin-bottom:1.5rem;opacity:.8;
}
.cover-title{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(1.6rem,4vw,3.6rem);
  line-height:1.05;
  color:var(--sand);
  text-shadow:0 0 60px rgba(180,60,60,.4),0 2px 4px rgba(0,0,0,.8);
  margin-bottom:1.2rem;
}
.cover-rule{
  width:40px;height:1px;background:var(--coral);
  margin:.8rem auto;opacity:.8;
}
.cover-sub{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(.4rem,.6vw,.55rem);
  letter-spacing:.4em;text-transform:uppercase;
  color:var(--sand2);margin-bottom:1rem;
}
.cover-star{color:var(--coral);font-size:.9rem;animation:starPulse 4s ease-in-out infinite}
@keyframes starPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* SVG tangle on cover — positioned center-split */
.cover-tangle{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-44%);
  width:clamp(100px,18vw,200px);
  z-index:4;opacity:.65;
  pointer-events:none;
}

.cover-author{
  position:absolute;bottom:2rem;right:2rem;
  font-family:'Great Vibes',cursive;
  font-size:clamp(1rem,2.2vw,1.8rem);
  color:rgba(196,144,144,.75);
  z-index:5;
}

/* corner hint */
.corner-hint{
  position:absolute;bottom:0;right:0;
  width:60px;height:60px;z-index:35;
  cursor:pointer;
  overflow:hidden;
}
.corner-hint::before{
  content:"";position:absolute;
  bottom:0;right:0;
  width:0;height:0;
  border-style:solid;
  border-width:0 0 50px 50px;
  border-color:transparent transparent rgba(201,64,64,.25) transparent;
  transition:border-width .3s;
}
.corner-hint:hover::before{
  border-width:0 0 70px 70px;
  border-color:transparent transparent rgba(201,64,64,.45) transparent;
}
.corner-hint::after{
  content:"›";
  position:absolute;bottom:6px;right:8px;
  font-size:1rem;color:rgba(201,64,64,.6);
  font-family:'Crimson Pro',serif;
  transition:opacity .3s;
}

/* ── LEAF (flip element) ── */
.leaf{
  position:absolute;top:0;right:0;
  width:var(--pw);height:var(--ph);
  transform-origin:left center;
  transform-style:preserve-3d;
  z-index:20;display:none;
}
.leaf-front,.leaf-back{
  position:absolute;inset:0;
  backface-visibility:hidden;overflow:hidden;
}
.leaf-back{transform:rotateY(180deg)}

/* ── PAGE CONTENT ── */
.p{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  padding:clamp(1.2rem,3vw,2.8rem) clamp(1rem,2.5vw,2.4rem);
  position:relative;overflow:hidden;
}

/* page decorative border */
.p::before{
  content:"";position:absolute;
  inset:12px;
  border:1px solid rgba(212,184,150,.06);
  pointer-events:none;
}

/* page number */
.pnum{
  font-family:'IM Fell English',serif;
  font-size:.65rem;letter-spacing:.15em;
  color:var(--faint);text-align:center;
  position:absolute;bottom:1rem;
  width:100%;left:0;
}
.pnum-l{text-align:left;padding-left:1.5rem}
.pnum-r{text-align:right;padding-right:1.5rem}

/* chapter label */
.ch-label{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(.4rem,.6vw,.58rem);
  letter-spacing:.38em;text-transform:uppercase;
  color:var(--coral);margin-bottom:1.2rem;opacity:.8;
}

/* page title */
.pt{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(1.4rem,3vw,2.6rem);
  line-height:1.1;color:var(--sand);
  margin-bottom:1rem;
}
.pt-sm{font-size:clamp(1rem,2vw,1.7rem)}

/* body text */
.pb{
  font-family:'Crimson Pro',serif;
  font-size:clamp(.78rem,1.2vw,1rem);
  line-height:1.82;color:var(--text2);
  font-weight:300;
}
.pb em{color:var(--text);font-style:italic}
.pb strong{color:var(--sand);font-weight:400}

/* story list item */
.story-item{
  display:flex;align-items:baseline;gap:.7rem;
  padding:.5rem 0;
  border-bottom:1px solid rgba(212,184,150,.06);
  text-decoration:none;color:inherit;cursor:pointer;
  transition:border-color .3s;
}
.story-item:hover{border-color:rgba(201,64,64,.25)}
.story-item:hover .si-title{color:var(--coral)}
.si-num{
  font-family:'IM Fell English',serif;
  font-size:.75rem;color:var(--faint);
  min-width:2rem;
}
.si-title{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(.8rem,1.3vw,1.05rem);
  color:var(--sand);flex:1;
  transition:color .3s;
  line-height:1.3;
}
.si-tag{
  font-family:'DM Sans',sans-serif;
  font-size:.5rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--faint);
}

/* horizontal rule */
.hr{
  width:40px;height:1px;background:rgba(201,64,64,.3);
  margin:1rem 0;
}
.hr-center{margin:1rem auto}

/* quote block */
.qblock{
  border-left:2px solid rgba(201,64,64,.3);
  padding:.6rem 1rem .6rem 1.2rem;
  margin:1rem 0;
}
.qtext{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(.9rem,1.5vw,1.25rem);
  line-height:1.55;color:var(--sand);
}
.qcite{
  font-family:'DM Sans',sans-serif;
  font-size:.55rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--faint);
  margin-top:.4rem;
}

/* inside cover decorative */
.inside-cover{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.inside-cover::before{
  content:"";position:absolute;inset:14px;
  border:1px solid rgba(212,184,150,.08);
}
.inside-deco{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(3rem,8vw,7rem);
  color:rgba(201,64,64,.06);
  line-height:1;
  text-align:center;
}

/* title page special */
.title-page-inner{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;text-align:center;
  gap:.5rem;
}
.tp-title{
  font-family:'IM Fell English',serif;
  font-style:italic;
  font-size:clamp(1.2rem,2.8vw,2.4rem);
  line-height:1.1;color:var(--sand);
}
.tp-author{
  font-family:'Great Vibes',cursive;
  font-size:clamp(1.4rem,3vw,2.4rem);
  color:var(--mauve);margin-top:.5rem;
}
.tp-rule{width:30px;height:1px;background:var(--coral);margin:.8rem auto}
.tp-sub{
  font-family:'DM Sans',sans-serif;
  font-size:.55rem;letter-spacing:.35em;
  text-transform:uppercase;color:var(--faint);
}

/* subscribe page */
.sub-wrap{
  display:flex;flex-direction:column;
  gap:1rem;height:100%;justify-content:center;
}
.sub-input{
  background:transparent;
  border:none;border-bottom:1px solid rgba(212,184,150,.2);
  color:var(--text);font-family:'Crimson Pro',serif;
  font-size:clamp(.8rem,1.2vw,1rem);
  padding:.4rem 0;outline:none;width:100%;
  font-style:italic;
  transition:border-color .3s;
}
.sub-input::placeholder{color:var(--faint)}
.sub-input:focus{border-color:rgba(201,64,64,.5)}
.sub-btn{
  align-self:flex-start;
  background:transparent;border:1px solid var(--coral);
  color:var(--coral);
  font-family:'DM Sans',sans-serif;
  font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;
  padding:.5rem 1.2rem;cursor:pointer;
  transition:background .3s,color .3s;
}
.sub-btn:hover{background:var(--coral);color:#fff}

/* ── NAV ── */
.book-nav{
  position:absolute;
  bottom:-2.5rem;
  width:100%;
  display:flex;justify-content:space-between;align-items:center;
  z-index:40;
  opacity:0;transition:opacity .4s;
}
.book-wrap.open .book-nav{opacity:1}

.nav-btn{
  background:transparent;border:none;
  color:var(--faint);cursor:pointer;
  font-family:'IM Fell English',serif;
  font-size:1.1rem;letter-spacing:.1em;
  transition:color .3s;padding:.3rem .6rem;
}
.nav-btn:hover{color:var(--coral)}
.nav-btn:disabled{opacity:.2;cursor:default}

.spread-indicator{
  font-family:'DM Sans',sans-serif;
  font-size:.55rem;letter-spacing:.3em;
  text-transform:uppercase;color:var(--faint);
}

/* ── CLICK ZONES ── */
.click-prev,.click-next{
  position:absolute;top:0;
  width:30%;height:100%;
  z-index:25;cursor:pointer;
  display:none;
}
.click-prev{left:0}
.click-next{right:0}
.book-wrap.open .click-prev,
.book-wrap.open .click-next{display:block}

/* hover glow on click zones */
.click-next::after,.click-prev::after{
  content:"";position:absolute;
  top:50%;transform:translateY(-50%);
  width:30px;height:60px;
  background:rgba(201,64,64,.04);
  transition:opacity .3s;
  opacity:0;
  border-radius:2px;
}
.click-next::after{right:8px}
.click-prev::after{left:8px}
.click-next:hover::after,.click-prev:hover::after{opacity:1}

/* shadow on page flip */
.leaf-shadow{
  position:absolute;
  top:0;bottom:0;
  width:30px;
  background:linear-gradient(to right,rgba(0,0,0,.3),transparent);
  pointer-events:none;z-index:25;
  opacity:0;
  transition:opacity .3s;
}

@media(max-width:700px){
  :root{--pw:clamp(160px,45vw,280px)}
  .cover-tangle{width:clamp(70px,14vw,120px)}
}
</style>
</head>
<body>
<div id="cr"></div>
<div id="cd"></div>

<div class="scene">
  <div class="book-wrap" id="book">

    <!-- 3D book sides (visible when tilted) -->
    <div class="book-side-bottom"></div>
    <div class="book-side-right"></div>

    <!-- Left page -->
    <div class="page-left" id="pageLeft">
      <div class="inside-cover">
        <div class="inside-deco">✦</div>
      </div>
    </div>

    <!-- Right page -->
    <div class="page-right" id="pageRight"></div>

    <!-- Spine -->
    <div class="spine"></div>

    <!-- Flipping leaf -->
    <div class="leaf" id="leaf">
      <div class="leaf-front" id="leafFront"></div>
      <div class="leaf-back"  id="leafBack"></div>
    </div>

    <!-- Cover -->
    <div class="cover" id="cover">
      <div class="cover-front">
        <div class="cover-half-l"></div>
        <div class="cover-half-r"></div>
        <div class="cover-frame"></div>

        <!-- Tangle SVG centered on split -->
        <div class="cover-tangle">
          <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g stroke="#b88080" stroke-linecap="round" stroke-linejoin="round">
              <!-- Outer loose tangle -->
              <path stroke-width="1.1" opacity=".6"
                d="M100 28 C128 22 162 38 168 70 C174 102 152 128 132 138
                   C148 148 158 168 140 180 C122 192 98 178 84 162
                   C60 172 38 156 36 132 C34 108 52 88 68 80
                   C48 66 42 42 62 32 C78 24 92 30 100 28Z"/>
              <!-- Second layer -->
              <path stroke-width="1" opacity=".55"
                d="M100 42 C120 36 148 50 152 76 C156 102 136 120 118 128
                   C132 138 140 154 124 164 C108 174 88 164 76 150
                   C58 158 44 144 44 122 C44 100 60 84 74 78
                   C58 66 54 48 70 40 C84 33 94 40 100 42Z"/>
              <!-- Inner chaos loops -->
              <path stroke-width=".9" opacity=".5"
                d="M80 70 C100 58 128 64 138 84 C148 104 136 126 116 132
                   C128 144 126 162 108 164 C90 166 76 150 74 132
                   C56 130 46 112 54 96 C62 80 74 76 80 70Z"/>
              <!-- Random tendrils -->
              <path stroke-width=".8" opacity=".4"
                d="M70 55 C88 45 114 52 122 70 C108 60 88 62 78 78
                   C92 68 110 72 118 90 C100 78 78 82 68 98
                   C80 86 96 88 102 106 C86 96 68 100 62 118
                   C72 104 88 104 92 120"/>
              <path stroke-width=".8" opacity=".4"
                d="M130 58 C148 68 158 90 148 110 C136 98 142 78 128 70
                   C140 82 144 104 132 118 C122 104 128 84 116 76
                   C126 88 128 110 116 122"/>
              <!-- Stray wisps -->
              <path stroke-width=".7" opacity=".35"
                d="M60 88 C50 100 48 118 60 128 C52 116 54 100 64 92"/>
              <path stroke-width=".7" opacity=".35"
                d="M140 88 C150 100 152 118 140 128 C148 116 146 100 136 92"/>
              <path stroke-width=".7" opacity=".3"
                d="M92 36 C84 28 78 18 88 12 C96 8 104 14 100 24"/>
              <path stroke-width=".7" opacity=".3"
                d="M108 36 C116 28 122 18 112 12 C104 8 96 14 100 24"/>
              <!-- Star accent -->
              <text x="95" y="24" font-size="8" fill="#c94040" font-family="serif" opacity="0.9">✦</text>
            </g>
          </svg>
        </div>

        <div class="cover-content">
          <p class="cover-eyebrow">Horror onírico · Relatos experimentales</p>
          <h1 class="cover-title">El arte de dormir<br>terriblemente mal</h1>
          <div class="cover-rule"></div>
          <p class="cover-sub">Experimental &nbsp;<span class="cover-star">✦</span></p>
        </div>

        <div class="cover-author">Maria E. Castillo</div>
      </div>
      <div class="cover-back"></div>
      <!-- corner hint -->
      <div class="corner-hint" id="cornerHint"></div>
    </div>

    <!-- Click zones -->
    <div class="click-prev" id="clickPrev"></div>
    <div class="click-next" id="clickNext"></div>

    <!-- Nav -->
    <div class="book-nav" id="bookNav">
      <button class="nav-btn" id="navPrev" disabled>← atrás</button>
      <span class="spread-indicator" id="spreadInd"></span>
      <button class="nav-btn" id="navNext">adelante →</button>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────
// SPREADS DATA
// ─────────────────────────────────────────────
const spreads = [
  // Spread 0 — Inside cover + Title page
  {
    left: `<div class="inside-cover"><div class="inside-deco" style="font-size:clamp(4rem,10vw,9rem);color:rgba(201,64,64,.05)">ADTM</div></div>`,
    right: `<div class="p"><div class="title-page-inner">
      <p class="tp-sub" style="margin-bottom:1.2rem">Una colección de relatos oníricos</p>
      <h2 class="tp-title">El arte de dormir<br>terriblemente mal</h2>
      <div class="tp-rule"></div>
      <p class="tp-sub">Experimental</p>
      <p class="tp-author">Maria E. Castillo</p>
      <div class="tp-rule" style="margin-top:1.5rem"></div>
      <p class="pb" style="max-width:220px;margin-top:.8rem;text-align:center;font-size:.78rem">
        Esta es una colección de relatos oníricos, perturbadores e irónicos,<br>
        donde el terror susurra, baila, lame y besa.<br><br>
        <em>No la escribe una mente perturbada.</em><br>
        Es solo un subconsciente con complejo de productor.
      </p>
    </div>
    <div class="pnum pnum-r">I</div></div>`,
    label: 'Portadilla · I'
  },

  // Spread 1 — Prólogo
  {
    left: `<div class="p">
      <p class="ch-label" style="margin-bottom:3rem">Prólogo</p>
      <p class="pt" style="font-size:clamp(1.2rem,2.5vw,2rem);line-height:1.15">
        Prefiero pensar que los sueños son historias que buscan ser contadas.

// ─────────────────────────────────────────────
// BOOK ENGINE
// ─────────────────────────────────────────────
let currentSpread = -1; // -1 = cover
let isAnim = false;
const FLIP_DUR = 700;

const book     = document.getElementById('book');
const cover    = document.getElementById('cover');
const pageL    = document.getElementById('pageLeft');
const pageR    = document.getElementById('pageRight');
const leaf     = document.getElementById('leaf');
const leafF    = document.getElementById('leafFront');
const leafB    = document.getElementById('leafBack');
const navPrev  = document.getElementById('navPrev');
const navNext  = document.getElementById('navNext');
const spreadInd= document.getElementById('spreadInd');
const clickPrev= document.getElementById('clickPrev');
const clickNext= document.getElementById('clickNext');

function renderSpread(idx) {
  if (idx < 0 || idx >= spreads.length) return;
  pageL.innerHTML = spreads[idx].left;
  pageR.innerHTML = spreads[idx].right;
}

function updateUI() {
  navPrev.disabled = currentSpread <= 0;
  navNext.disabled = currentSpread >= spreads.length - 1;
  if (currentSpread >= 0) {
    spreadInd.textContent = spreads[currentSpread].label || '';
  }
}

// ── Open book from cover ──
function openCover() {
  if (isAnim) return;
  isAnim = true;
  book.classList.add('open');
  // load spread 0 underneath
  renderSpread(0);
  cover.classList.add('flipped');
  setTimeout(() => {
    cover.style.display = 'none';
    currentSpread = 0;
    updateUI();
    isAnim = false;
  }, FLIP_DUR + 50);
}

// ── Turn page forward ──
function nextPage() {
  if (isAnim || currentSpread < 0) { if (currentSpread < 0) openCover(); return; }
  if (currentSpread >= spreads.length - 1) return;

  isAnim = true;
  const next = currentSpread + 1;

  // leafFront = current right page content
  leafF.innerHTML = pageR.innerHTML;
  // leafBack = next spread's left page
  leafB.innerHTML = spreads[next].left;
  // preload next right under (hidden by leaf during animation)
  pageR.innerHTML = spreads[next].right;

  leaf.style.display = 'block';
  leaf.style.transition = 'none';
  leaf.style.transform = 'rotateY(0deg)';
  leaf.getBoundingClientRect(); // reflow

  leaf.style.transition = `transform ${FLIP_DUR}ms cubic-bezier(.645,.045,.355,1)`;
  leaf.style.transform = 'rotateY(-180deg)';

  setTimeout(() => {
    pageL.innerHTML = spreads[next].left;
    leaf.style.display = 'none';
    leaf.style.transform = '';
    leaf.style.transition = '';
    currentSpread = next;
    updateUI();
    isAnim = false;
  }, FLIP_DUR + 20);
}

// ── Turn page backward ──
function prevPage() {
  if (isAnim || currentSpread <= 0) return;
  isAnim = true;

  const prev = currentSpread - 1;

  // leafFront = prev right page (will be visible at end at 0deg)
  leafF.innerHTML = spreads[prev].right;
  // leafBack = current left page (visible during start at -180deg)
  leafB.innerHTML = pageL.innerHTML;

  // preload prev left underneath
  pageL.innerHTML = spreads[prev].left;

  leaf.style.display = 'block';
  // start at -180 (back face = current left visible, covering left half)
  leaf.style.transition = 'none';
  leaf.style.transform = 'rotateY(-180deg)';
  leaf.getBoundingClientRect(); // reflow

  leaf.style.transition = `transform ${FLIP_DUR}ms cubic-bezier(.645,.045,.355,1)`;
  leaf.style.transform = 'rotateY(0deg)';

  setTimeout(() => {
    pageR.innerHTML = spreads[prev].right;
    leaf.style.display = 'none';
    leaf.style.transform = '';
    leaf.style.transition = '';
    currentSpread = prev;
    updateUI();
    isAnim = false;
  }, FLIP_DUR + 20);
}

// ── Events ──
document.getElementById('cornerHint').addEventListener('click', openCover);
cover.addEventListener('click', openCover);
clickNext.addEventListener('click', nextPage);
clickPrev.addEventListener('click', prevPage);
navNext.addEventListener('click', nextPage);
navPrev.addEventListener('click', prevPage);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp'  ) prevPage();
  if (e.key === ' ') { e.preventDefault(); nextPage(); }
});

// ── Cursor ──
const cd = document.getElementById('cd');
const cr = document.getElementById('cr');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cd.style.left = mx+'px'; cd.style.top = my+'px';
});
(function loop(){
  rx += (mx-rx)*.12; ry += (my-ry)*.12;
  cr.style.left = rx+'px'; cr.style.top = ry+'px';
  requestAnimationFrame(loop);
})();
document.querySelectorAll('a,button,input,.click-next,.click-prev,.corner-hint,.cover').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cr.style.width='40px';cr.style.height='40px';cr.style.borderColor='rgba(201,64,64,.7)';});
  el.addEventListener('mouseleave',()=>{cr.style.width='24px';cr.style.height='24px';cr.style.borderColor='rgba(201,64,64,.4)';});
});

// Initial state hint: animate corner
setTimeout(() => {
  const hint = document.getElementById('cornerHint');
  hint.style.transition = 'all .3s';
}, 800);
</script>
