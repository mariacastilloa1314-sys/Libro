<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El arte de dormir terriblemente mal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cinzel:wght@400;600&family=Cinzel+Decorative&family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --pw:  clamp(220px,28vw,400px);
  --ph:  calc(var(--pw)*1.54);
  --sw:  clamp(14px,1.8vw,22px);
  --gold:       #b8956a;
  --gold-mid:   #8a6e48;
  --gold-dim:   #5a4530;
  --gold-faint: #2e2010;
  --ink:        #d0c4a8;
  --ink2:       #8a7a62;
  --ink3:       #52402e;
  --crimson:    #8a1e1e;
  --crimson2:   #c44040;
  --red-ink:    rgba(155,18,18,0.85);
  --paper:      #f4f0e2;
  --paper2:     #eee8d0;
  --sepia:      #1a2e6a;
  --sepia2:     #2a4688;
  --sepia3:     #6a82b8;
  --line-col:   rgba(50,80,180,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 25% 25%,#160a04 0%,transparent 55%),
    radial-gradient(ellipse at 75% 75%,#0c0810 0%,transparent 55%),
    #07050a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:none;user-select:none;min-height:100vh;
  font-family:'Crimson Pro',serif;
}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.03;}
#cd,#cr{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cd{width:4px;height:4px;background:var(--gold);border-radius:50%}
#cr{width:22px;height:22px;border:1px solid rgba(184,149,106,.35);border-radius:50%;transition:width .25s,height .25s,border-color .25s}
.scene{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(.6rem,1.5vh,1.2rem);width:100%;height:100%;}

/* ═══════════════════════════════════════
   DIARY COVER — thick book texture
═══════════════════════════════════════ */
.book-closed{
  position:relative;width:var(--pw);height:var(--ph);cursor:pointer;
  filter:drop-shadow(-6px 16px 48px rgba(0,0,0,.8)) drop-shadow(2px 4px 12px rgba(0,0,0,.5));
}
/* thick page stack — multiple layers */
.book-closed::before{
  content:"";position:absolute;
  top:2px;bottom:2px;right:-11px;width:11px;
  background:repeating-linear-gradient(
    to right,
    #ddd0b0 0px, #e8dcc0 3px,
    #ccc0a0 3px, #ddd0b0 5px,
    #e0d4b8 5px, #ddd0b0 7px,
    #cac0a0 7px, #ddd0b0 9px,
    #e8dcc0 9px, #ccc0a0 11px
  );
  border-radius:0 3px 3px 0;
  box-shadow:inset -1px 0 3px rgba(0,0,0,.2), 1px 0 4px rgba(0,0,0,.3);
}
.book-closed::after{
  content:"";position:absolute;
  top:5px;bottom:5px;right:-15px;width:4px;
  background:linear-gradient(to right,#b8aa88,#c8bc9a);
  border-radius:0 2px 2px 0;opacity:.8;
}

/* Cover body */
.cover-body{
  position:absolute;inset:0;
  border-radius:2px 3px 3px 2px;
  overflow:hidden;
  /* Old leather texture — pebbled grain like a real journal cover */
  background:
    /* worn highlight spots (like your photo — lighter patches where leather wore) */
    radial-gradient(ellipse at 62% 38%, rgba(140,70,30,.22) 0%, transparent 28%),
    radial-gradient(ellipse at 30% 62%, rgba(120,55,20,.18) 0%, transparent 22%),
    radial-gradient(ellipse at 80% 15%, rgba(110,50,18,.14) 0%, transparent 18%),
    radial-gradient(ellipse at 15% 80%, rgba(130,60,22,.16) 0%, transparent 20%),
    /* pebbled grain simulation via fine repeating lines at multiple angles */
    repeating-linear-gradient(17deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,.028) 2px, rgba(0,0,0,.028) 3px),
    repeating-linear-gradient(73deg,
      transparent 0px, transparent 2px,
      rgba(0,0,0,.022) 2px, rgba(0,0,0,.022) 3px),
    repeating-linear-gradient(134deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,.016) 3px, rgba(0,0,0,.016) 4px),
    /* base leather tones — rich dark brown, warmer than before */
    radial-gradient(ellipse at 20% 15%, rgba(110,42,10,.55) 0%, transparent 40%),
    radial-gradient(ellipse at 78% 82%, rgba(80,28,6,.48) 0%, transparent 42%),
    radial-gradient(ellipse at 50% 50%, rgba(60,18,4,.20) 0%, transparent 68%),
    linear-gradient(158deg,
      #3d1408 0%, #2e0e06 12%, #260a04 25%,
      #321006 38%, #280c04 52%,
      #3a1208 65%, #2c0e06 78%,
      #3e1409 90%, #2a0c05 100%
    );
  box-shadow:
    inset 4px 0 12px rgba(0,0,0,.65),
    inset -1px 0 5px rgba(0,0,0,.35),
    inset 0 4px 12px rgba(0,0,0,.45),
    inset 0 -4px 10px rgba(0,0,0,.40);
}
/* Leather noise texture layer */
.cover-body::before{
  content:"";position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='leath'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='5' seed='12' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0.3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23leath)'/%3E%3C/svg%3E");
  opacity:.14;mix-blend-mode:overlay;border-radius:2px;
}
/* Worn edges — edges lighter (leather cracked + faded) */
.cover-body::after{
  content:"";position:absolute;inset:0;
  background:
    /* top edge worn */
    linear-gradient(to bottom, rgba(160,80,30,.18) 0%, transparent 8%),
    /* bottom edge worn */
    linear-gradient(to top, rgba(160,80,30,.16) 0%, transparent 8%),
    /* corner highlights */
    radial-gradient(ellipse at 1% 1%, rgba(180,90,35,.22) 0%, transparent 22%),
    radial-gradient(ellipse at 99% 1%, rgba(170,80,30,.18) 0%, transparent 18%),
    radial-gradient(ellipse at 1% 99%, rgba(175,85,32,.20) 0%, transparent 20%),
    radial-gradient(ellipse at 99% 99%, rgba(165,78,28,.15) 0%, transparent 16%);
  border-radius:2px;
}

.cover-spine{
  position:absolute;top:0;left:0;bottom:0;width:var(--sw);z-index:5;
  background:linear-gradient(to right,#0e0402 0%,#1e0806 30%,#180604 65%,#0e0402 100%);
  border-right:1px solid rgba(80,30,10,.4);
}
/* Stitching along right edge of spine */
.cover-stitch{
  position:absolute;top:0;right:0;bottom:0;width:clamp(10px,1.8vw,16px);z-index:6;
  background:
    repeating-linear-gradient(to bottom,
      transparent 0px, transparent 6px,
      rgba(180,120,60,.22) 6px, rgba(180,120,60,.22) 7px,
      transparent 7px, transparent 10px,
      rgba(180,120,60,.18) 10px, rgba(180,120,60,.18) 11px,
      transparent 11px, transparent 14px
    );
}

/* Elastic band */
.cover-elastic{
  position:absolute;top:50%;right:-15px;
  transform:translateY(-50%);
  width:calc(100% + 15px);
  height:clamp(9px,1.5vw,13px);
  background:linear-gradient(to bottom,
    rgba(14,4,4,.92) 0%,rgba(28,8,8,.96) 45%,
    rgba(22,6,6,.92) 55%,rgba(12,3,3,.88) 100%);
  z-index:6;border-radius:1px;
  box-shadow:0 2px 4px rgba(0,0,0,.55),0 -1px 2px rgba(0,0,0,.35);
}
.cover-elastic::before,.cover-elastic::after{
  content:"";position:absolute;left:0;right:0;height:1px;
}
.cover-elastic::before{top:1px;background:rgba(255,255,255,.035);}
.cover-elastic::after{bottom:1px;background:rgba(0,0,0,.25);}

/* Ribbon bookmark */
.cover-ribbon{
  position:absolute;bottom:-20px;right:clamp(22px,4vw,34px);
  width:clamp(8px,1.2vw,11px);height:clamp(32px,5.5vw,48px);
  background:linear-gradient(to bottom,#9a2020,#6e1414);
  z-index:3;border-radius:0 0 3px 3px;
  box-shadow:1px 2px 5px rgba(0,0,0,.45);
}
.cover-ribbon::after{
  content:"";position:absolute;bottom:0;left:0;right:0;transform:translateY(100%);
  border-left:calc(clamp(8px,1.2vw,11px)/2) solid #9a2020;
  border-right:calc(clamp(8px,1.2vw,11px)/2) solid #9a2020;
  border-top:clamp(5px,.8vw,7px) solid transparent;
}

/* Title label — hand-glued paper */
.cover-label{
  position:absolute;
  left:calc(var(--sw) + clamp(12px,2.5vw,20px));
  right:clamp(10px,2vw,18px);
  top:50%;transform:translateY(-53%) rotate(-1.5deg);
  background:
    linear-gradient(175deg,rgba(244,238,218,.11) 0%,rgba(235,226,200,.07) 100%);
  border:1px solid rgba(184,149,106,.12);
  padding:clamp(10px,2vw,18px) clamp(8px,1.8vw,16px);
  z-index:7;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:.3rem;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
}
.label-eyebrow{font-family:'Caveat',cursive;font-size:clamp(.6rem,1.1vw,.82rem);letter-spacing:.12em;color:rgba(190,158,100,.5);}
.label-rule{width:clamp(18px,2.5vw,28px);height:1px;background:rgba(184,149,106,.25);margin:.1rem auto;}
.label-title{font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1rem,2.2vw,1.82rem);line-height:1.15;color:rgba(215,188,138,.82);text-shadow:0 1px 4px rgba(0,0,0,.5);}
.label-sub{font-family:'Caveat',cursive;font-size:clamp(.52rem,.95vw,.72rem);letter-spacing:.18em;color:rgba(170,135,85,.42);}
.cover-author{position:absolute;bottom:clamp(.9rem,2.2vw,1.7rem);left:0;right:0;text-align:center;z-index:7;}
.cover-author-name{font-family:'Caveat',cursive;font-weight:600;font-size:clamp(.82rem,1.5vw,1.2rem);color:rgba(175,140,90,.55);letter-spacing:.04em;}
.open-hint{position:absolute;bottom:0;right:0;width:52px;height:52px;cursor:pointer;z-index:10;}
.open-hint::before{content:"";position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 42px 42px;border-color:transparent transparent rgba(184,149,106,.13) transparent;transition:all .35s;}
.open-hint:hover::before{border-width:0 0 56px 56px;border-color:transparent transparent rgba(184,149,106,.26) transparent;}

/* ═══════════════════════════════════════
   OPEN BOOK
═══════════════════════════════════════ */
.book-open{
  display:none;position:relative;flex-direction:row;
  width:calc(var(--pw)*2 + var(--sw));height:var(--ph);
  filter:drop-shadow(-6px 16px 52px rgba(0,0,0,.82)) drop-shadow(2px 4px 16px rgba(0,0,0,.5));
}
.pg{width:var(--pw);height:var(--ph);position:relative;overflow:hidden;flex-shrink:0;}
.pg-l{
  background:linear-gradient(to right,#120c08,#0d0a06);
  box-shadow:inset -8px 0 20px rgba(0,0,0,.55);
}
/* Page curve shadow — simulates book center curvature */
.pg-l::after{
  content:"";position:absolute;top:0;right:0;width:32px;height:100%;
  background:linear-gradient(to right,transparent,rgba(0,0,0,.22));
  pointer-events:none;z-index:2;
}
.pg-r::before{
  content:"";position:absolute;top:0;left:0;width:32px;height:100%;
  background:linear-gradient(to left,transparent,rgba(0,0,0,.18));
  pointer-events:none;z-index:2;
}
.pg-r{background:linear-gradient(to left,#120c08,#0d0a06);box-shadow:inset 8px 0 20px rgba(0,0,0,.55);}
.pg-r::after{
  content:"";position:absolute;top:2px;bottom:2px;right:-11px;width:11px;
  background:repeating-linear-gradient(to right,#ddd0b0 0px,#e8dcc0 3px,#ccc0a0 3px,#ddd0b0 5px,#e0d4b8 5px,#ccc0a0 7px,#ddd0b0 7px,#e8dcc0 9px,#cac0a0 9px,#ddd0b0 11px);
  border-radius:0 3px 3px 0;
}
.pg::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 95% 5%,rgba(40,28,14,.28) 0%,transparent 45%),
    radial-gradient(ellipse at 5% 95%,rgba(30,18,8,.22) 0%,transparent 45%);
  pointer-events:none;z-index:0;}
.book-spine{
  width:var(--sw);height:var(--ph);flex-shrink:0;
  background:linear-gradient(to right,#0a0302 0%,#1c0606 28%,#260a0a 50%,#180606 72%,#0a0302 100%);
  box-shadow:inset 2px 0 6px rgba(0,0,0,.55),inset -2px 0 6px rgba(0,0,0,.55);z-index:5;
}

/* ═══════════════════════════════════════
   JOURNAL / DIARY PAGES
═══════════════════════════════════════ */
.p-journal{
  width:100%;height:100%;position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse at 10% 8%,rgba(230,210,160,.32) 0%,transparent 38%),
    radial-gradient(ellipse at 90% 92%,rgba(215,195,145,.2) 0%,transparent 32%),
    linear-gradient(178deg,#f6f1e5 0%,#f1e9d1 30%,#ede5ca 60%,#e9e0c2 100%);
}
/* Override dark pg background for journal spreads */
/* ── JOURNAL SPREAD: full paper, zero dark ── */
.journal-spread .pg-l,
.journal-spread .pg-r,
.journal-spread .pg {
  background: #ede5ca !important;
  box-shadow: none !important;
}
.journal-spread .pg-l::before,
.journal-spread .pg-l::after,
.journal-spread .pg-r::before,
.journal-spread .pg-r::after,
.journal-spread .pg::before,
.journal-spread .pg::after {
  display: none !important;
  background: none !important;
  content: none !important;
}
.journal-spread .book-spine {
  background: linear-gradient(to right,#d2c99a 0%,#ddd3a8 40%,#d2c99a 100%) !important;
  box-shadow: none !important;
}
/* Make p-journal fill completely — no clip artifacts */
.journal-spread .p-journal {
  clip-path: none !important;
  border-radius: 1px;
}
.pg-paper-fill{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 12% 10%, rgba(230,210,155,.35) 0%, transparent 42%),
    radial-gradient(ellipse at 88% 90%, rgba(210,190,135,.22) 0%, transparent 38%),
    #ede5ca;
  pointer-events:none;
}
.paper-grain{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.68' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity:.07;mix-blend-mode:multiply;
}
.paper-stain{position:absolute;pointer-events:none;z-index:1;opacity:.5;}
.s3{width:clamp(28px,5vw,50px);height:clamp(22px,4vw,38px);top:32%;right:6%;
  background:radial-gradient(ellipse,rgba(120,80,30,.09) 0%,transparent 60%);
  transform:rotate(5deg);border-radius:50%;}

/* Organic page edge with clip-path */
.pg-l .p-journal{
  clip-path:polygon(
    0% 1%, 96% 0%, 97.5% 8%, 98.5% 22%, 99% 38%,
    99.2% 55%, 98.8% 72%, 97.5% 88%, 96% 100%, 0% 99%
  );
}
.pg-r .p-journal{
  clip-path:polygon(
    4% 0%, 100% 1%, 100% 99%, 4% 100%,
    2.5% 88%, 1.2% 72%, 0.8% 55%, 1% 38%,
    1.5% 22%, 2.5% 8%
  );
}

/* Ruled lines */
.journal-lines{
  position:absolute;inset:0;pointer-events:none;z-index:2;
  background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 25px,var(--line-col) 26px,var(--line-col) 26px);
  background-size:100% 26px;
}
.journal-lines::before{
  content:"";position:absolute;left:clamp(28px,6vw,44px);top:0;bottom:0;width:1px;
  background:rgba(155,45,45,.18);
}

/* DOODLE page */
.p-doodle{position:relative;}
.doodle-svg{
  position:absolute;inset:0;width:100%;height:100%;overflow:visible;
}
/* Pencil/sketch texture filter */
.sketch-filter{
  filter: url(#pencilTexture);
}

/* ── ANIMATIONS ── */
/* Each element floats independently */
/* Float animations — each class floats in place, no drifting */
.fi1{animation:f1 5.2s ease-in-out infinite;}
.fi2{animation:f2 6.8s ease-in-out 0.6s infinite;}
.fi3{animation:f3 5.8s ease-in-out 1.2s infinite;}
.fi4{animation:f4 7.4s ease-in-out 0.3s infinite;}
.fi5{animation:f5 6.2s ease-in-out 1.8s infinite;}
.fi6{animation:f6 8s ease-in-out 0.9s infinite;}
.title-pulse{animation:titPulse 5s ease-in-out infinite;}

/* clapper arm opens and closes around its hinge (top-left corner) */
.clap-arm{
  transform-origin: 4px 10px;
  transform-box: fill-box;
  animation: clapOpen 3.5s ease-in-out 1s infinite;
}

@keyframes f1{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-7px) rotate(.6deg)}}
@keyframes f2{0%,100%{transform:translateY(0) rotate(0deg)}45%{transform:translateY(-9px) rotate(-.7deg)}}
@keyframes f3{0%,100%{transform:translateY(0)}40%{transform:translateY(-6px) rotate(.5deg)}}
@keyframes f4{0%,100%{transform:translateY(0) rotate(0deg)}55%{transform:translateY(-8px) rotate(.8deg)}}
@keyframes f5{0%,100%{transform:translateY(0)}35%{transform:translateY(-5px) rotate(-.4deg)}}
@keyframes f6{0%,100%{transform:translateY(0) rotate(0deg)}60%{transform:translateY(-10px) rotate(.6deg)}}
@keyframes titPulse{0%,100%{opacity:.9}50%{opacity:1}}

/* clapper: closed -> open -> pause -> close */
/* zombie shamble */
@keyframes zombieWalk{
  0%,100%{transform:translateX(0) rotate(0deg)}
  25%{transform:translateX(6px) rotate(.8deg)}
  50%{transform:translateX(0px) rotate(0deg)}
  75%{transform:translateX(-4px) rotate(-.5deg)}
}
.zombie-walk{animation:zombieWalk 2.8s ease-in-out infinite;}

@keyframes clapOpen{
  0%{transform:rotate(0deg)}
  20%{transform:rotate(-38deg)}
  55%{transform:rotate(-38deg)}
  75%{transform:rotate(0deg)}
  100%{transform:rotate(0deg)}
}

/* Lined page content */
.lined-content{
  position:relative;z-index:3;width:100%;height:100%;
  padding:clamp(1.2rem,3vw,2rem) clamp(1rem,2.5vw,1.8rem);
  padding-left:clamp(36px,7.5vw,52px);
  display:flex;flex-direction:column;gap:.45rem;overflow:hidden;
}
.j-title{
  font-family:'Caveat',cursive;font-weight:700;
  font-size:clamp(1.8rem,4vw,2.8rem);
  color:var(--sepia);
  transform:rotate(-1.6deg);display:inline-block;
  margin-bottom:.3rem;line-height:1.1;
}
.j-title-red{
  font-family:'IM Fell English',serif;font-style:italic;
  color:rgba(148,12,12,0.88);
  font-size:clamp(2rem,4.5vw,3.2rem);
  transform:rotate(-1.2deg);
  /* ink bleed/stain: layered text-shadow simulates wet ink spreading */
  text-shadow:
    0 0 8px rgba(148,12,12,0.35),
    1px 1px 3px rgba(148,12,12,0.25),
    -1px 0px 6px rgba(148,12,12,0.20),
    0 2px 8px rgba(148,12,12,0.18),
    2px -1px 4px rgba(148,12,12,0.15);
  filter: blur(0.3px);
}
.j-body{
  font-family:'Caveat',cursive;
  font-size:clamp(.9rem,1.75vw,1.12rem);
  line-height:1.7;color:var(--sepia);
}
.j-body em{font-style:italic;color:var(--sepia2);}
.j-closing{color:var(--sepia2);font-style:italic;}
/* Index on journal paper */
.j-idx-title{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:clamp(1.8rem,4vw,2.8rem);
  color:rgba(148,12,12,0.88);transform:rotate(-1deg);display:inline-block;
  margin-bottom:.6rem;line-height:1.1;
  text-shadow:0 0 8px rgba(148,12,12,0.30),1px 1px 3px rgba(148,12,12,0.20),-1px 0px 6px rgba(148,12,12,0.18);
  filter:blur(0.3px);
}
.j-idx{display:flex;flex-direction:column;gap:.1rem;}
.j-idx-item{display:flex;align-items:baseline;gap:.5rem;padding:.18rem 0;border-bottom:none;}
.j-idx-n{font-family:'Caveat',cursive;font-size:clamp(.78rem,1.4vw,.95rem);color:rgba(148,12,12,0.75);min-width:2.8rem;font-weight:700;}
.j-idx-t{font-family:'Caveat',cursive;font-size:clamp(.88rem,1.6vw,1.05rem);color:var(--sepia);flex:1;line-height:1.3;transition:color .25s;}
.j-idx-item{cursor:pointer;}

.j-sig-name{font-family:'Caveat',cursive;font-size:clamp(.9rem,1.7vw,1.15rem);color:var(--sepia2);transform:rotate(-.7deg);display:inline-block;}

/* ═══════════════════════════════════════

═══════════════════════════════════════ */

.pt-sm{font-size:clamp(.88rem,1.65vw,1.3rem);}

.hr{width:32px;height:1px;background:linear-gradient(to right,transparent,var(--crimson),transparent);margin:.7rem 0;opacity:.45;}
.qblock{border-left:2px solid rgba(201,64,64,.25);padding:.45rem .8rem .45rem .9rem;margin:.45rem 0;}

.idx-t{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(.8rem,1.35vw,1.02rem);color:var(--ink);flex:1;line-height:1.25;transition:color .3s;}
.idx-more{padding:.45rem 0;border-bottom:none;justify-content:flex-end;}
.idx-more-txt{font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.28em;color:var(--ink3);text-transform:uppercase;}
.pnum{position:absolute;bottom:clamp(.55rem,1.2vw,1rem);left:0;right:0;font-family:'Cinzel',serif;font-size:clamp(.36rem,.56vw,.5rem);letter-spacing:.28em;text-transform:uppercase;color:var(--ink3);text-align:center;opacity:.6;}

/* ═══════════════════════════════════════
   FLIP LEAF
═══════════════════════════════════════ */
.leaf{
  position:absolute;top:0;left:var(--pw);width:var(--pw);height:var(--ph);
  transform-origin:left center;transform-style:preserve-3d;
  z-index:20;display:none;pointer-events:none;
}
.leaf-face,.leaf-back{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;}
.leaf-back{transform:rotateY(180deg)}
.leaf-face::after,.leaf-back::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.45) 0%,transparent 22%,transparent 78%,rgba(0,0,0,.18) 100%);
  pointer-events:none;z-index:10;
}

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
.nav-row{display:flex;align-items:center;gap:clamp(.8rem,2.5vw,2rem);z-index:10;opacity:0;transition:opacity .5s;}
.nav-row.show{opacity:1}
.nav-btn{background:transparent;border:none;font-family:'Cinzel',serif;font-size:clamp(.5rem,.8vw,.68rem);letter-spacing:.28em;text-transform:uppercase;color:rgba(148,12,12,0.70);cursor:pointer;padding:.3rem .4rem;transition:color .3s;font-weight:600;}
.nav-btn:hover:not(:disabled){color:rgba(148,12,12,1)}.nav-btn:disabled{opacity:.18;cursor:default;}
.nav-label{font-family:'Cinzel',serif;font-size:clamp(.34rem,.55vw,.48rem);letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);opacity:.55;text-align:center;min-width:90px;}
.nav-home{background:transparent;border:none;font-family:'Cinzel',serif;font-size:clamp(.38rem,.62vw,.54rem);letter-spacing:.22em;text-transform:uppercase;color:rgba(148,12,12,0.55);cursor:pointer;padding:.3rem .6rem;transition:color .3s;opacity:0;pointer-events:none;}
.nav-home.show{opacity:1;pointer-events:auto;}
.nav-home:hover{color:rgba(148,12,12,1);}
.zone{position:absolute;top:0;bottom:0;width:38%;z-index:15;cursor:pointer;display:none;}
.zone-l{left:0}.zone-r{right:0}
.book-open .zone{display:block}

/* ═══════════════════════════════════════
   MOBILE
═══════════════════════════════════════ */
@media(max-width:700px){
  :root{--pw:clamp(240px,88vw,390px);--ph:calc(var(--pw)*1.54);--sw:12px;}
  .book-open.spread{width:var(--pw);}
  .pg-l,.book-spine{display:none;}
  .pg-r::after{display:none;}.pg-r{box-shadow:none;}
  .leaf{left:0;width:var(--pw);}
  .pg-r .p-journal{clip-path:none;}
  .pg-l .p-journal{clip-path:none;}
  .pb{font-size:clamp(.95rem,3.8vw,1.12rem);line-height:1.88;}
  .pt{font-size:clamp(1.15rem,4.8vw,1.6rem);}
  .j-body{font-size:clamp(1rem,4vw,1.2rem);}
  .j-title{font-size:clamp(2rem,7vw,3rem);}
  .idx-t{font-size:clamp(.94rem,3.8vw,1.1rem);}
  .idx-item{padding:.7rem 0;}
  .ch-label{font-size:clamp(.46rem,1.9vw,.62rem);}
}

/* ══════════════════════════════════════════════════
   STORY PAGES — CINEMATIC ATMOSPHERIC READER
══════════════════════════════════════════════════ */
.p-story {
  position: relative;
  width: 100%; height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  scrollbar-width: thin;
  scrollbar-color: rgba(148,12,12,.20) transparent;
}
.p-story::-webkit-scrollbar { width: 3px; }
.p-story::-webkit-scrollbar-thumb { background: rgba(148,12,12,.22); border-radius: 2px; }

/* Layer 0: base paper — always underneath */
.story-base-paper {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 12% 10%, rgba(230,210,155,.38) 0%, transparent 42%),
    radial-gradient(ellipse at 88% 90%, rgba(210,190,135,.25) 0%, transparent 38%),
    #ede5ca;
}

/* Layer 1: Atmospheric wash — crossfades, cinematic */
.story-atmos-layer {
  position: absolute; inset: 0; z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1.8s cubic-bezier(.4,0,.2,1),
              background 0.1s;
  mix-blend-mode: multiply;
}
.story-atmos-layer.atmos-visible {
  opacity: 1;
}

/* Layer 2: Vignette — deepens with darkness */
.story-vignette {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(10,5,3,.14) 100%);
  transition: opacity 2.5s ease;
  opacity: 1;
}
.p-story.atmos-deep .story-vignette { opacity: 1; }

/* Layer 3: Ruled lines — always visible */
.story-lines {
  position: absolute; inset: 0; pointer-events: none; z-index: 3;
  background-image:
    linear-gradient(to right, transparent 36px, rgba(155,45,45,.12) 36px, rgba(155,45,45,.12) 37px, transparent 37px),
    repeating-linear-gradient(to bottom,
      transparent 0px, transparent 25px,
      rgba(50,80,180,.08) 25px, rgba(50,80,180,.08) 26px);
  background-attachment: local;
}

/* Layer 4: Paper grain */
.p-story::after {
  content: "";
  position: absolute; inset: 0; pointer-events: none; z-index: 4;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.68' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity: .055; mix-blend-mode: multiply;
  pointer-events: none;
}

/* Layer 5: Content */
.story-scroll {
  position: relative; z-index: 5;
  padding: clamp(.6rem,2vw,1.2rem) clamp(.8rem,2.5vw,1.6rem) clamp(2rem,5vw,3.5rem);
  min-height: 100%;
}

/* ── CINEMATIC INK TRANSITIONS ── */
/* Default: blue ink */
.story-scroll .pb,
.story-scroll .pd {
  font-family: 'Crimson Pro', serif;
  font-size: clamp(.78rem,1.5vw,1.05rem);
  line-height: 1.84;
  color: rgba(28,44,100,.90);
  margin-bottom: .58em;
  text-align: justify;
  transition: color 2.2s cubic-bezier(.4,0,.2,1),
              text-shadow 2.2s ease;
}
.story-scroll .pd {
  padding-left: clamp(.5rem,1.4vw,.9rem);
  border-left: 2px solid rgba(148,12,12,.20);
  font-style: italic;
  color: rgba(22,36,88,.85);
}
/* Warm dim: dusk atmosphere */
.p-story.atmos-warm .story-scroll .pb,
.p-story.atmos-warm .story-scroll .pd {
  color: rgba(90,55,18,.88);
}
/* Dark: deep night — ink becomes amber */
.p-story.atmos-dark .story-scroll .pb,
.p-story.atmos-dark .story-scroll .pd {
  color: rgba(195,155,75,.90);
  text-shadow: 0 0 12px rgba(180,130,40,.12);
}
/* Horror: crimson tinge */
.p-story.atmos-horror .story-scroll .pb,
.p-story.atmos-horror .story-scroll .pd {
  color: rgba(185,135,60,.88);
  text-shadow: 0 0 18px rgba(160,20,5,.10);
}

/* Chapter label */
.story-scroll .ch-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(.42rem,.72vw,.62rem);
  letter-spacing: .3em;
  color: rgba(148,12,12,.60);
  text-transform: uppercase;
  margin-bottom: .5em;
  opacity: .88;
  transition: color 2s ease;
}
/* Story title */
.story-scroll .pt {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(1.05rem,2.0vw,1.6rem);
  color: rgba(148,12,12,.88);
  text-shadow: 0 0 8px rgba(148,12,12,.22), 1px 1px 4px rgba(148,12,12,.15);
  line-height: 1.2;
  margin-bottom: .3em;
  filter: blur(.15px);
  transition: text-shadow 2s ease, color 2s ease;
}
.p-story.atmos-dark .story-scroll .pt {
  color: rgba(200,100,60,.90);
  text-shadow: 0 0 14px rgba(180,60,10,.28), 1px 1px 5px rgba(160,40,5,.20);
}
.story-scroll .hr {
  width: clamp(28px,7vw,55px);
  height: 1px;
  background: linear-gradient(to right, rgba(148,12,12,.50), transparent);
  margin-bottom: .85em;
}

/* ── SCENE BREAK — horizontal dingbat ── */
.scene-break {
  text-align: center;
  font-family: 'Caveat', cursive;
  color: rgba(148,12,12,.30);
  font-size: .9rem;
  margin: .3em 0;
  letter-spacing: .5em;
}

/* ── ATMOSPHERE TRANSITION INDICATOR ── */
/* Subtle glow behind paragraph when atmosphere shifts */
@keyframes atmosPulse {
  0% { box-shadow: 0 0 0 rgba(148,12,12,0); }
  40% { box-shadow: 0 0 20px rgba(148,12,12,.06); }
  100% { box-shadow: 0 0 0 rgba(148,12,12,0); }
}
.atmos-trigger { animation: atmosPulse 2.5s ease; }

.p-story {
  position: relative;
  width: 100%; height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
/* Paper + lines overlay — always on top of atmosphere */
.story-lines {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background-image:
    /* left red margin line */
    linear-gradient(to right, transparent 36px, rgba(155,45,45,.14) 36px, rgba(155,45,45,.14) 37px, transparent 37px),
    /* horizontal ruled lines */
    repeating-linear-gradient(to bottom,
      transparent 0px, transparent 25px,
      rgba(50,80,180,.09) 25px, rgba(50,80,180,.09) 26px);
  background-attachment: local;
}
/* The atmospheric layer — absolute, fills page, transitions on bg change */
.story-atmos-layer {
  position: absolute; inset: 0; z-index: 0;
  pointer-events: none;
  /* Default: warm paper */
  background:
    radial-gradient(ellipse at 12% 10%, rgba(230,210,155,.35) 0%, transparent 42%),
    radial-gradient(ellipse at 88% 90%, rgba(210,190,135,.22) 0%, transparent 38%),
    #ede5ca;
  transition: background 2.0s cubic-bezier(.4,0,.2,1);
  mix-blend-mode: normal;
}
/* Paper grain on top of atmosphere */
.p-story::after {
  content: "";
  position: absolute; inset: 0; pointer-events: none; z-index: 2;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.68' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
  opacity: .06; mix-blend-mode: multiply;
}
/* Story content scrolls over atmosphere */
.story-scroll {
  position: relative; z-index: 3;
  padding: clamp(.6rem,2vw,1.2rem) clamp(.8rem,2.5vw,1.6rem) clamp(1rem,3vw,2rem);
}
/* Chapter label */
.story-scroll .ch-label {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(.45rem,.75vw,.68rem);
  letter-spacing: .28em;
  color: rgba(148,12,12,.65);
  text-transform: uppercase;
  margin-bottom: .5em;
  opacity: .85;
}
/* Story title */
.story-scroll .pt {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(1.1rem,2.2vw,1.7rem);
  color: rgba(148,12,12,.88);
  text-shadow: 0 0 8px rgba(148,12,12,.25), 1px 1px 3px rgba(148,12,12,.18);
  line-height: 1.2;
  margin-bottom: .3em;
  filter: blur(0.2px);
}
.story-scroll .hr {
  width: clamp(30px, 8vw, 60px);
  height: 1px;
  background: linear-gradient(to right, rgba(148,12,12,.55), transparent);
  margin-bottom: .8em;
}
/* Paragraphs — blue ink on paper */
.story-scroll .pb, .story-scroll .pd {
  font-family: 'Crimson Pro', serif;
  font-size: clamp(.78rem,1.5vw,1.05rem);
  line-height: 1.82;
  color: rgba(28,44,100,.90);
  margin-bottom: .55em;
  text-align: justify;
  transition: color 1.2s ease;
}
.story-scroll .pd {
  padding-left: clamp(.6rem, 1.5vw, 1rem);
  border-left: 2px solid rgba(148,12,12,.20);
  color: rgba(22,38,90,.85);
  font-style: italic;
}
/* Dark atmosphere: ink shifts slightly warmer */
.p-story.atmos-dark .pb,
.p-story.atmos-dark .pd {
  color: rgba(200,170,100,.88);
}
.p-story.atmos-horror .pb,
.p-story.atmos-horror .pd {
  color: rgba(210,160,100,.82);
}
/* Scroll indicator at bottom */
.story-scroll-hint {
  text-align: center;
  font-family: 'Caveat', cursive;
  font-size: clamp(.55rem,.9vw,.75rem);
  color: rgba(148,12,12,.35);
  padding-top: .5rem;
  letter-spacing: .1em;
  animation: hintFade 2s ease-in-out infinite alternate;
}
@keyframes hintFade { 0%{opacity:.3} 100%{opacity:.7} }

/* ── Real doodle illustration ── */
.p-doodle-real {
  display: flex;
  align-items: stretch;
  justify-content: stretch;
}
.doodle-real-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  border-radius: 1px;
}

/* ══════════════════════════════════════
   MUSIC PLAYER — floating cinematic bar
══════════════════════════════════════ */
.music-player {
  position: absolute;
  bottom: clamp(6px, 1.2vw, 12px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  align-items: center;
  gap: clamp(5px, 1vw, 9px);
  padding: clamp(4px,.8vw,7px) clamp(8px,1.5vw,14px);
  border-radius: 50px;
  /* frosted glass on paper */
  background: rgba(237, 229, 202, 0.82);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(148,12,12,.18);
  box-shadow: 0 2px 18px rgba(0,0,0,.10), 0 1px 4px rgba(148,12,12,.08);
  /* hidden by default, fades in */
  opacity: 0;
  pointer-events: none;
  transition: opacity .8s ease, transform .8s ease;
  transform: translateX(-50%) translateY(14px);
  white-space: nowrap;
  max-width: 90%;
}
.music-player.mp-visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.mp-icon {
  font-size: clamp(.7rem,1.2vw,1rem);
  color: rgba(148,12,12,.75);
  flex-shrink: 0;
  line-height: 1;
}
.mp-title {
  font-family: 'Caveat', cursive;
  font-size: clamp(.6rem,1.1vw,.85rem);
  color: rgba(40,20,8,.72);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mp-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: rgba(148,12,12,.80);
  font-size: clamp(.65rem,1.1vw,.88rem);
  padding: 2px 4px;
  border-radius: 4px;
  transition: color .2s, background .2s;
  line-height: 1;
  flex-shrink: 0;
}
.mp-btn:hover { color: rgba(148,12,12,1); background: rgba(148,12,12,.08); }

/* Waveform animation when playing */
.mp-wave {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: clamp(10px,1.6vw,14px);
  flex-shrink: 0;
}
.mp-wave span {
  display: block;
  width: clamp(2px,.4vw,3px);
  background: rgba(148,12,12,.60);
  border-radius: 2px;
  transform-origin: bottom;
  animation: waveAnim 1.1s ease-in-out infinite alternate;
}
.mp-wave span:nth-child(1){ height: 35%; animation-delay: 0s; }
.mp-wave span:nth-child(2){ height: 80%; animation-delay: .18s; }
.mp-wave span:nth-child(3){ height: 55%; animation-delay: .35s; }
.mp-wave span:nth-child(4){ height: 90%; animation-delay: .12s; }
.mp-wave span:nth-child(5){ height: 45%; animation-delay: .28s; }
@keyframes waveAnim {
  from { transform: scaleY(1); }
  to   { transform: scaleY(.25); }
}
.mp-wave.mp-paused span { animation-play-state: paused; }

/* Volume slider */
.mp-vol {
  -webkit-appearance: none;
  appearance: none;
  width: clamp(28px,4vw,44px);
  height: 3px;
  border-radius: 2px;
  background: rgba(148,12,12,.25);
  outline: none;
  cursor: pointer;
  flex-shrink: 0;
}
.mp-vol::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: rgba(148,12,12,.75);
  cursor: pointer;
}

/* Dark atmosphere adaptation */
.p-story.atmos-dark .music-player,
.p-story.atmos-horror .music-player {
  background: rgba(25,15,8,.78);
  border-color: rgba(148,12,12,.30);
}
.p-story.atmos-dark .mp-title,
.p-story.atmos-horror .mp-title {
  color: rgba(200,160,90,.85);
}
.p-story.atmos-dark .mp-icon,
.p-story.atmos-dark .mp-btn,
.p-story.atmos-horror .mp-icon,
.p-story.atmos-horror .mp-btn {
  color: rgba(200,100,60,.80);
}
.p-story.atmos-dark .mp-wave span,
.p-story.atmos-horror .mp-wave span {
  background: rgba(200,100,60,.65);
}
.p-story.atmos-dark .mp-vol,
.p-story.atmos-horror .mp-vol {
  background: rgba(200,100,60,.22);
}

/* Hidden YouTube iframe container */
#yt-container {
  position: fixed;
  width: 1px; height: 1px;
  top: -9999px; left: -9999px;
  opacity: 0; pointer-events: none;
  overflow: hidden;
}

/* ════════════════════════════════════════
   MUSIC PLAYER  — subtle literary style
════════════════════════════════════════ */
#music-widget {
  position: fixed;
  bottom: clamp(10px, 2.5vw, 18px);
  right: clamp(10px, 2.5vw, 18px);
  z-index: 9999;
  display: none;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  pointer-events: none;
}
#music-widget.mw-show { display: flex; }

/* Track label */
#music-track-label {
  font-family: 'Caveat', cursive;
  font-size: clamp(.55rem, 1vw, .75rem);
  color: rgba(148,12,12,.65);
  background: rgba(240,232,208,.90);
  padding: 2px 7px;
  border-radius: 10px;
  letter-spacing: .04em;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity .4s, transform .4s;
  pointer-events: none;
  white-space: nowrap;
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
}
#music-widget.mw-playing #music-track-label {
  opacity: 1;
  transform: translateY(0);
}

/* Play/pause button */
#music-btn {
  width: clamp(32px, 5vw, 42px);
  height: clamp(32px, 5vw, 42px);
  border-radius: 50%;
  background: rgba(240,232,208,.92);
  border: 1.5px solid rgba(148,12,12,.25);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(.9rem, 1.6vw, 1.2rem);
  color: rgba(148,12,12,.75);
  transition: background .3s, border-color .3s, transform .2s, box-shadow .3s;
  pointer-events: auto;
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
  position: relative;
  overflow: hidden;
}
#music-btn:hover {
  background: rgba(240,232,208,1);
  border-color: rgba(148,12,12,.50);
  transform: scale(1.08);
  box-shadow: 0 4px 18px rgba(148,12,12,.15);
}
#music-btn:active { transform: scale(.95); }

/* Vinyl spin ring when playing */
#music-btn::before {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  border: 1.5px solid rgba(148,12,12,.18);
  border-top-color: rgba(148,12,12,.55);
  opacity: 0;
  transition: opacity .5s;
}
#music-widget.mw-playing #music-btn::before {
  opacity: 1;
  animation: vinylSpin 2.2s linear infinite;
}
@keyframes vinylSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Equalizer bars — pulse when playing */
.eq-bars {
  display: flex;
  align-items: flex-end;
  gap: 1.5px;
  height: 12px;
}
.eq-bar {
  width: 2.5px;
  background: rgba(148,12,12,.70);
  border-radius: 2px;
  animation: none;
  height: 3px;
}
#music-widget.mw-playing .eq-bar:nth-child(1) { animation: eq1 .6s ease-in-out infinite alternate; }
#music-widget.mw-playing .eq-bar:nth-child(2) { animation: eq2 .8s ease-in-out infinite alternate; }
#music-widget.mw-playing .eq-bar:nth-child(3) { animation: eq1 .5s ease-in-out infinite alternate; }
#music-widget.mw-playing .eq-bar:nth-child(4) { animation: eq2 .7s ease-in-out infinite alternate; }
@keyframes eq1 { from{height:3px} to{height:11px} }
@keyframes eq2 { from{height:5px} to{height:9px} }

/* Autoplay notice */
#music-autoplay-notice {
  position: fixed;
  bottom: clamp(55px,10vw,75px);
  right: clamp(10px,2.5vw,18px);
  background: rgba(240,232,208,.96);
  border: 1.5px solid rgba(148,12,12,.22);
  border-radius: 10px;
  padding: 7px 12px;
  font-family: 'Caveat', cursive;
  font-size: clamp(.7rem,1.2vw,.85rem);
  color: rgba(148,12,12,.80);
  z-index: 9998;
  display: none;
  max-width: 200px;
  box-shadow: 0 4px 18px rgba(0,0,0,.10);
  cursor: pointer;
  transition: opacity .4s;
}
#music-autoplay-notice.show { display: block; }
#music-autoplay-notice:hover { background: rgba(245,238,215,1); }
</style>

zYNNgMK+b/Yg50bgd32cmEjl8NKQYfcTAs323zETSra1dD80EM0ihhVB2NDRsiqruqWDyuodTnfFMjbV13sD+KJPLhdyafi7O30fmZUrGKI3mc0sGsuB3gJGK4i0lkRClbVGGddgfk8dHaxFB9d0T3lrh8ojaEknqV+54tkuAJ8WWYquFhRzXRi4z+WMyXnQhSXO6yux+/CuRswdgisVQi1upzmxixR3N/U0RS9ll+fIlRATQHDcb9+SAz6jmGs3b+gH3jytSKhmWq/PGaUnAmCg+8BqUvagEZEIFTZ4mdETR0vaSImouf9CIONldtDoxTjAP4ZeCgeoPuAVH+frX2u/Jpx6JD/Rw7bGUyYnR5t7TUxg81pw2gR8yfaibeuDH02qU4x4UXBLLeJxARzwmYVGO1eSYdflWEixQKT++dbu4RFlJHCu45BtOsTlAAA\" class=\"doodle-real-img\" alt=\"Anoche soñé...\" loading=\"eager\"/>\n</div>", "<div class=\"pg-paper-fill\"></div>\n<div class=\"p-journal p-lined\">\n  <div class=\"paper-grain\"></div>\n  <div class=\"paper-stain s3\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"lined-content\">\n    <h2 class=\"j-title j-title-red\">Prólogo</h2>\n    <p class=\"j-body\">Alguna vez leí que todos los sueños tienen significado, pero yo creo que son mensajes codificados que mi subconsciente usa para arruinarme el día. Cada vez que me despertaba intranquila por alguno, abría inmediatamente Google y buscaba cosas como: <em>\"soñar con ver ballenas volando\"</em>.</p>\n    <p class=\"j-body\">Los resultados eran alentadores: <em>\"grandes proyectos se avecinan\"</em>, <em>\"épocas de creatividad\"</em>, <em>\"prosperidad\"</em>, etc. Genial, pensaba, eso es genial.</p>\n    <p class=\"j-body\">Aunque, en mis sueños, las ballenas eran extremadamente terroríficas y yo estaba en pleno mar, atrapada en una caja de cristal mientras ellas intentaban romperla. Exactamente eso no se encuentra en Google, detalles que no creo haya considerado quien decidió que soñar con ballenas voladoras es de buen augurio.</p>\n    <p class=\"j-body\">Mi oráculo moderno (Google) no me da las respuestas que necesito. Prefiero pensar que los sueños son historias que buscan ser contadas.</p>\n    <span class=\"pnum j-pnum\">ii</span>\n  </div>\n</div>", "<div class=\"pg-paper-fill\"></div>\n<div class=\"p-journal p-lined\">\n  <div class=\"paper-grain\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"lined-content\">\n    <p class=\"j-body\">Por ello, decidí plasmar parte de mi mundo onírico en relatos cortos. Quizás al escribirlos pueda entender por qué mi mente profunda insiste en mostrarme ballenas voladoras y cajas de cristal que se resquebrajan.</p>\n    <p class=\"j-body\">Y de paso, contribuir al arte y la ficción porque la ficción me ha salvado la vida en más de una ocasión y, si lo piensas bien, probablemente también haya salvado la tuya… y la de tu madre <em>(imagina un mundo sin novelas mexicanas: qué triste)</em></p>\n    <p class=\"j-body j-closing\">Así que, si te gustan las historias cortas, perturbadoras y sin gracia, bienvenido(a).</p>\n    <div class=\"j-sig-block\">\n      <p class=\"j-sig-name\">Maria E. Castillo</p>\n      <svg viewBox=\"0 0 160 56\" fill=\"none\" class=\"j-sig-svg j-sig-rubric\">\n        <!-- Heart-M signature: heart flows into cursive stroke -->\n        <!-- Left arch of heart -->\n        <path d=\"M18 18 C14 8 4 8 4 18 C4 28 18 36 18 36\" stroke=\"rgba(148,12,12,0.80)\" stroke-width=\"2.2\" fill=\"none\" stroke-linecap=\"round\"/>\n        <!-- Right arch of heart / becomes the M downstroke -->\n        <path d=\"M18 18 C22 8 32 8 32 18 C32 28 18 36 18 36\" stroke=\"rgba(148,12,12,0.80)\" stroke-width=\"2.2\" fill=\"none\" stroke-linecap=\"round\"/>\n        <!-- Long descending tail — the signature flourish -->\n        <path d=\"M18 36 C18 40 16 46 12 52\" stroke=\"rgba(148,12,12,0.65)\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\"/>\n        <!-- Cursive \"aria\" flowing right from heart -->\n        <path d=\"M32 20 C38 14 44 16 46 22 C48 28 44 34 40 34 C44 34 52 30 54 24 C56 18 60 16 64 20 C68 24 66 32 62 34 C66 32 72 28 74 22 C76 14 82 12 86 18 C90 22 90 30 86 34\" stroke=\"rgba(148,12,12,0.72)\" stroke-width=\"1.8\" fill=\"none\" stroke-linecap=\"round\"/>\n        <!-- Extra tail swoosh under the name -->\n        <path d=\"M86 34 C96 40 108 38 114 30 C118 24 116 18 110 18\" stroke=\"rgba(148,12,12,0.45)\" stroke-width=\"1.5\" fill=\"none\" stroke-linecap=\"round\"/>\n      </svg>\n    </div>\n    <span class=\"pnum j-pnum\">iii</span>\n  </div>\n</div>", "<div class=\"pg-paper-fill\"></div>\n<div class=\"p-journal p-lined\">\n  <div class=\"paper-grain\"></div>\n  <div class=\"journal-lines\"></div>\n  <div class=\"lined-content idx-compact\">\n    <h2 class=\"j-title j-idx-title\">Los sueños</h2>\n    <div class=\"j-idx\">\n      <div class=\"j-idx-item\" data-target=\"5\"><span class=\"j-idx-n\">01 —</span><span class=\"j-idx-t\">¿Y si yo soy la mala del cuento?</span></div>\n      <div class=\"j-idx-item\" data-target=\"7\"><span class=\"j-idx-n\">02 —</span><span class=\"j-idx-t\">El gato</span></div>\n      <div class=\"j-idx-item\" data-target=\"8\"><span class=\"j-idx-n\">03 —</span><span class=\"j-idx-t\">Ayúdame a matarlo</span></div>\n      <div class=\"j-idx-item\" data-target=\"9\"><span class=\"j-idx-n\">04 —</span><span class=\"j-idx-t\">Noche críptica en Sepia</span></div>\n      <div class=\"j-idx-item\" data-target=\"10\"><span class=\"j-idx-n\">05 —</span><span class=\"j-idx-t\">¿Desperté?</span></div>\n      <div class=\"j-idx-item\" data-target=\"11\"><span class=\"j-idx-n\">06 —</span><span class=\"j-idx-t\">Microchip</span></div>\n      <div class=\"j-idx-item\" data-target=\"12\"><span class=\"j-idx-n\">07 —</span><span class=\"j-idx-t\">Mi Miss Hyde</span></div>\n      <div class=\"j-idx-item\" data-target=\"13\"><span class=\"j-idx-n\">08 —</span><span class=\"j-idx-t\">No quiero ser bella</span></div>\n      <div class=\"j-idx-item\" data-target=\"14\"><span class=\"j-idx-n\">09 —</span><span class=\"j-idx-t\">Adiós, Morfeo</span></div>\n      <div class=\"j-idx-item\" data-target=\"15\"><span class=\"j-idx-n\">10 —</span><span class=\"j-idx-t\">¿Hay algún zombi en la sala?</span></div>\n      <div class=\"j-idx-item\" data-target=\"16\"><span class=\"j-idx-n\">11 —</span><span class=\"j-idx-t\">Luces, cámara, terror</span></div>\n      <div class=\"j-idx-item\" data-target=\"17\"><span class=\"j-idx-n\">12 —</span><span class=\"j-idx-t\">Efecto Glitch</span></div>\n      <div class=\"j-idx-item\" data-target=\"18\"><span class=\"j-idx-n\">13 —</span><span class=\"j-idx-t\">Distopía en el Mall</span></div>\n      <div class=\"j-idx-item\" data-target=\"19\"><span class=\"j-idx-n\">14 —</span><span class=\"j-idx-t\">Vaca in blue</span></div>\n      <div class=\"j-idx-item\" data-target=\"20\"><span class=\"j-idx-n\">15 —</span><span class=\"j-idx-t\">No cruces la puerta</span></div>\n      <div class=\"j-idx-item\" data-target=\"21\"><span class=\"j-idx-n\">B —</span><span class=\"j-idx-t\" style=\"font-style:italic\">Bonus Experimental</span></div>\n    </div>\n    <span class=\"pnum j-pnum\">iv</span>\n  </div>\n</div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_01\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 01</p>\n<h2 class=\"pt\">¿Y si yo soy la mala del cuento?</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 60%, rgba(180,130,60,.28) 0%, transparent 55%), linear-gradient(180deg,#f6f1e5 0%,#ede5ca 100%)\">Descendí las escaleras hacia el taller de mi padre. El silencio era intrigante; nunca había silencio cuando papá estaba allí. Al llegar, encontré a mi madre, mi padre y mis dos hermanos, inmóviles. No hablaban, solo se miraban entre sí con los ojos desmesuradamente abiertos. Durante los casi dos minutos que los observé, no parpadearon ni una sola vez. La situación era espeluznante.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 80% 20%, rgba(80,60,110,.30) 0%, transparent 50%), linear-gradient(180deg,#eee6d0 0%,#e5dbc0 100%)\">Miré hacia la calle y vi a un hombre con gabardina y sombrero gris. Llevaba una jeringa. En mi mente lo bauticé como 'El Inyectador'. Este hombre inyectaba a la gente con una sustancia desconocida. Las personas inoculadas empezaban a comportarse de manera extraña, como mi familia: ojos abiertos de par en par, no hablaban, solo se miraban entre ellos y caminaban como si algo o alguien los manejara a control remoto, robotizados.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 10%, rgba(60,40,90,.35) 0%, transparent 55%), linear-gradient(180deg,#e8dfc4 0%,#ddd4b0 100%)\">Mi cerebro dejó de mandar en mi cuerpo. Al intentar retroceder, me golpeé con un pedazo de madera. Mis ojos volvieron rápidamente hacia ellos. Me observaban con una mirada vacía, como si no me reconocieran. El Inyectador avanzaba hacia la casa, con sus ojos clavados en mí. Me quedé congelada. Mi familia se había transformado en algo y ese hombre venía directo hacia mí. Un pánico helador me paralizó. Pero de repente, el pensamiento de mis hermanas sacudió mi mente.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 0%, rgba(40,20,70,.40) 0%, transparent 50%), linear-gradient(180deg,#dfd6b8 0%,#d0c8a0 100%)\">Salí corriendo por la puerta trasera hasta llegar a la calle. Durante mi apresurado trayecto, vi cómo la luna descendía del cielo; era enorme, de un gris fantasmal y aterradoramente hermosa, solo la mitad de ella permaneció a la vista. El cielo tenía un color negro azulado, un contraste demasiado bello para una situación tan perturbadora. De fondo, se escuchaban unos... ¿sonidos de trompetas? El hombre de la jeringa continuaba su macabra tarea, mientras las trompetas resonaban sin cesar, sus ecos se mezclaban con los gritos desesperados de aquellos que aún no habían sido inyectados. La música infernal parecía provenir de la tierra y del cielo a la vez.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 30%, rgba(100,60,20,.22) 0%, transparent 45%), linear-gradient(180deg,#e5dbb8 0%,#d8ceaa 100%)\">Mi cabello me azotaba el rostro, el viento erizaba mi piel y hacía temblar mis piernas.\nIntenté pasar desapercibida mientras me dirigía a la casa de la vecina en busca de mis hermanas, con la mente enfocada únicamente en salvarlas. Pero mis pies se detuvieron abruptamente, paralizados por la escena apocalíptica que se desarrollaba. Estaba yo, inmóvil mirando el estrambótico fin del mundo. Volví en mí, volví a correr.</p>\n<p class=\"pb\">Finalmente llegué al lugar. Varios niños saltaban y jugaban alegremente, entre ellos mis hermanas. Me acerqué a ellas y les dije que teníamos que irnos. Comenzaron a hacer preguntas: \"¿Por qué? ¿A dónde vamos?\"</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(160,60,30,.28) 0%, transparent 55%), linear-gradient(180deg,#e0d0a5 0%,#cfc08a 100%)\">—Ya fue. Si no nos vamos, nos convertirán —dije, tratando de recuperar el aire.</p>\n<p class=\"pb\">Aparté la mirada solo unos segundos, lo suficiente para que mi hermana pequeña corriera hacia nuestro padre. La escena me golpeó en el estómago: ellos, tomados de la mano con los ojos escandalosamente abiertos, y a su lado, el Inyectador, mostrándome su maldita jeringa, con su maldito rostro inexpresivo, vacío de cualquier rastro de emoción. Al ver a mi hermana pequeña convertida en … algo, se me estremeció el cuerpo. No pude salvarla.</p>\n<p class=\"pb\">Me giré. Tomé a la mayor de la mano y corrimos, esquivando gente, saltando obstáculos, escondiéndonos. Pero mi mano sudaba tanto que terminamos soltándonos. Avancé unos metros más, impulsada por la inercia, hasta que el silencio me obligó a girarme. La vi caer.</p>\n<p class=\"pd\">—¡Mierda! ¡No puede ser!</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 0%, rgba(180,50,20,.38) 0%, transparent 45%), radial-gradient(ellipse at 80% 100%, rgba(120,30,10,.30) 0%, transparent 50%), linear-gradient(180deg,#d8c090 0%,#c0a870 100%)\">Detrás de ella avanzaba una multitud. El tiempo parecía detenerse mientras luchaba por levantarse. De repente, el cielo se tiñó de tonos naranjas y rojizos, creando el arrebol más hermoso que jamás había presenciado. Pero aquella belleza se desvaneció abruptamente con un sonido estrepitoso. El cielo se partió en dos; la cruda realidad me golpeó de nuevo. Las trompetas continuaban sonando, compitiendo con los latidos frenéticos de mi corazón. Tucutún, tucutún, tucutún. Y ella no se levantaba.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 5%, rgba(200,60,10,.45) 0%, transparent 40%), radial-gradient(ellipse at 20% 80%, rgba(100,20,5,.35) 0%, transparent 50%), linear-gradient(180deg,#c8a870 0%,#a88850 100%)\">—¡Levántate, por favor, levántate! —le gritaba mientras movía los brazos desesperadamente. El tumulto estaba ahí cerquita, detrás de ella.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 0%, rgba(220,40,5,.55) 0%, transparent 38%), radial-gradient(ellipse at 50% 100%, rgba(20,5,30,.50) 0%, transparent 60%), linear-gradient(180deg,#c09060 0%,#503020 100%)\">Entre la masa de gente distinguí al Inyectador, abriéndose paso, apartando gente, o tal vez ordenándolos. ¿Acaso está flotando? ¿Esas son... alas? ¡Estaba subiendo al cielo! Lo mismo le empezó a pasar a otras personas. No podía creer lo que estaba viendo. Bajé la mirada hacia mi hermana y ella, con ambas rodillas en el piso, me veía también, aterrada.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 10%, rgba(200,50,10,.48) 0%, transparent 40%), linear-gradient(180deg,#b08050 0%,#604030 100%)\">Al voltear, un escalofrío me recorrió la espalda; detrás de mí estaba el diablo. No podría contarte cómo llegué a tal conclusión, pero lo supe de inmediato: era el señor de las tinieblas. Un hombre enorme de piel roja. Su rostro permanecía oculto, pero recuerdo su enorme torso muy bien trabajado en los gimnasios del infierno.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(10,5,20,.60) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(180,40,5,.50) 0%, transparent 55%), linear-gradient(180deg,#907050 0%,#201010 100%)\">Mis ojos, llenos de angustia, buscaron desesperadamente a mi hermana. La escena seguía igual: la gente se elevaba hacia el resplandor del cielo abierto, mientras ella permanecía arrodillada e inmóvil en el suelo, presa del mismo terror que me consumía. Su mirada seguía fija en el infierno que se desplegaba a mi lado, un panorama rojo donde el fuego caía como pequeños meteoritos. El diablo seguía detrás de mí, y a nuestro alrededor, gente espantosamente fit pasaba indiferente.</p>\n<p class=\"pb\">De repente, la tierra se partió bajo mis pies, abriendo un abismo entre nosotras. El aire se volvió espeso, intensificando la sensación de asfixia que ya sentía en mi garganta. Mis ojos se cristalizaron, pero las lágrimas se negaban a caer. Algo me quemaba por dentro, quizá el llanto atrapado en mi interior.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(10,5,20,.70) 0%, transparent 60%), linear-gradient(180deg,#302020 0%,#100808 100%)\">Un alud de pensamientos revolcó mi mente: ¿Había perdido a mi familia? ¿O ellos se habían librado de mí?</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_02\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 02</p>\n<h2 class=\"pt\">El gato</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 80% 20%, rgba(20,15,50,.30) 0%, transparent 50%), linear-gradient(180deg,#f0e8d0 0%,#e5dac0 100%)\">Un crujido inesperado me arrancó el sueño, aquel ruido venía desde afuera de la calle, de la noche. Acaricié el pelaje sedoso del gato negro acurrucado en mi regazo, mientras miraba por la ventana entreabierta para darme calma, pero él se me escurrió de las manos para sentarse a mi lado. El cielo estaba nublado y gris, podía sentir el aire frío entrando y tocando mi cara. Todo se volvió silencio, ese silencio que indica que está ocurriendo algo, algo inminente y desconocido. Sentí como si estuviera conteniendo la respiración involuntariamente.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 70% 10%, rgba(160,20,20,.35) 0%, transparent 45%), linear-gradient(180deg,#e0d4b5 0%,#d0c4a0 100%)\">Un sonido, esta vez más fuerte y acompañado de un resplandor rojo, me sobresaltó. El gato saltó a mis piernas, con sus ojos fijos en la ventana. El mundo exterior era un lienzo rojo, un espectáculo aterrador que me dejó sin aliento. El aire me quemaba la nariz. No podía apartar la mirada de la ventana.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(140,15,15,.40) 0%, transparent 48%), linear-gradient(180deg,#d5c8a0 0%,#c0b080 100%)\">De repente pude ver la sombra de una especie de caballo pasar. El gato aulló y se lanzó por la ventana. Fui rápidamente a ver lo que sucedía: El felino a toda velocidad se subió encima del caballo, quien caminaba de una manera muy elegante y silenciosa.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 0%, rgba(10,5,30,.38) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(150,15,15,.30) 0%, transparent 45%), linear-gradient(180deg,#c8b888 0%,#a09060 100%)\">Olvidando que estaba descalza, en pijama y que un lienzo rojo era presagio de caos, salí decidida a recuperar a mi gato. Corrí desenfrenada por dos largas cuadras hasta que los vi al otro lado de la calle. No era un caballo real. Era su sombra, su espectro: una silueta sin cuerpo ni mirada. Mi gato se restregaba contra él, hipnotizado, tratando en vano de llamar su atención. La sombra permanecía inmóvil, con su silueta apuntando hacia mí.</p>\n<p class=\"pb\">Movió la cabeza. No sé por qué entendí que era una invitación. No sé por qué la acepté.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,25,.42) 0%, transparent 55%), linear-gradient(180deg,#b0a070 0%,#807040 100%)\">Los carros pasaban a toda velocidad, dejando solo estelas de color, al igual que la gente que se difuminaba en mi visión. Esperé. Algo en mí sabía que cuando el tráfico se detuviera, tendría que cruzar, y que cruzaría. No había mucho que pensar al respecto.</p>\n<p class=\"pb\">Cuando el tráfico se detuvo, avancé.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 80%, rgba(180,10,10,.48) 0%, transparent 45%), radial-gradient(ellipse at 50% 0%, rgba(5,3,25,.50) 0%, transparent 55%), linear-gradient(180deg,#908050 0%,#302010 100%)\">Cuando estaba cerca, el felino saltó emocionado en mi dirección, haciéndome perder el equilibrio y caer sobre el asfalto. Traté de levantarme, dolorida, pero un Zzzzzzi me paralizó. Al girar a mi derecha, vi cómo un enorme camión con faros amarillos deslumbrantes que me cegaban, venía a toda velocidad. No pude actuar; todo pasó demasiado rápido. Solo atiné a cerrar los ojos, resignándome a recibir el impacto.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,25,.60) 0%, transparent 55%), linear-gradient(180deg,#403020 0%,#100808 100%)\">Un empujón violento me lanzó hacia adelante. Abrí los ojos, desorientada. Estaba sentada en la oscuridad, frente a una joven de cabello largo, que me miraba con los ojos muy abiertos y brillantes.  Se le notaba un poco aturdida.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(20,5,5,.65) 0%, transparent 55%), linear-gradient(180deg,#302015 0%,#080404 100%)\">—¿Así… así morí? —me preguntó con voz entrecortada.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,25,.70) 0%, transparent 60%), linear-gradient(180deg,#201510 0%,#040202 100%)\">La dueña del gato era ella.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_03\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 03</p>\n<h2 class=\"pt\">Ayúdame a matarlo</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(220,220,210,.15) 0%, transparent 55%), linear-gradient(180deg,#f4eedf 0%,#ede5cb 100%)\">Estaba en una sala de espera.  Un niño empezó a llorar muy fuerte; su llanto y sus gritos resonaban en mi cabeza. Miré a la mujer que lo sostenía. Pálida, ojerosa, despeinada. Supuse que era su madre.</p>\n<p class=\"pd\">—¡Aaaah, señora!  ¿Por qué no calla a ese mocoso? ¡Por Dios! ¡Ya lleva más de 20 minutos llorando!</p>\n<p class=\"pb\">No reconocí esa voz, pero era mía. Las miradas de repudio se posaron en mí.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(180,160,100,.20) 0%, transparent 55%), linear-gradient(180deg,#eee6d0 0%,#e5dbc0 100%)\">La vergüenza me inundó. Soy un desastre —pensé. ¿Pero acaso era la única que no aguantaba ese ruido espantoso?</p>\n<p class=\"pb\">Perdí la noción del tiempo por un momento, hasta que el llanto del niño me devolvió a la realidad. Al mirar a la madre, noté que también me observaba fijamente. Mientras buscaba algo en su bolso, sus ojos seguían clavados en los míos. ¿Qué buscaba con tanta intensidad?  Mis piernas comenzaron a temblar involuntariamente, y el sudor goteaba por mi frente. El llanto, cada vez más agudo, ya no parecía provenir de un niño, sino de una bestia atormentada. ¿Acaso era posible que semejante sonido saliera de un cuerpo tan pequeño?</p>\n<p class=\"pb\">Una sensación de malestar se apoderó de mí; necesitaba escapar de ese lugar. Me levanté con dificultad y me dirigí hacia la salida. De repente... silencio. Me detuve en seco y giré la cabeza, buscando el origen de aquel cambio repentino. La madre y el niño habían desaparecido. Mis ojos barrieron la sala, pero no encontré rastro de ellos. Con el corazón latiendo a mil por hora, abrí la puerta y salí al pasillo. Unos pasos más allá, los vi.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(180,100,30,.22) 0%, transparent 50%), linear-gradient(180deg,#e8dfc0 0%,#ddd5a8 100%)\">La mujer se acercó a mí con el niño en brazos, con su mirada fija en la mía. Me quedé inmóvil, sin saber cómo reaccionar, no sabía dónde meter las manos y menos la cara. Se detuvo a pocos centímetros, observándome en silencio.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 30%, rgba(160,60,20,.30) 0%, transparent 48%), linear-gradient(180deg,#e0d4a8 0%,#d0c090 100%)\">Cuando dejé de mirar a todos lados vi al niño y sentí náuseas; su cara estaba en carne viva, las costras supuraban pus. Solo su ojo izquierdo era visible; el derecho estaba completamente destruido.</p>\n<p class=\"pb\">Un hilo de sangre recorría su frente y algo blanco y mucoso salía de su nariz. Supuse que el niño debía tener un año y meses. Bajé la mirada.</p>\n<p class=\"pd\">— Perdóneme, señora, no fue mi intención, lo lamento mucho. Yo no sabía que su niño ...</p>\n<p class=\"pb\">¡NO! —me interrumpió— esto no es un niño. Esta cosa horrenda no es un niño ¿Acaso no lo ves? ¡Míralo!\nNo levanté la mirada. Sentía punzadas en el estómago y un nudo terrible en la garganta.  Respiré profundamente reuniendo valor para mirarlos.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(130,20,20,.35) 0%, transparent 45%), linear-gradient(180deg,#d0c088 0%,#b0a060 100%)\">La mujer seguía mirándome fijamente con sus ojos rojos mientras sus lágrimas caían, inundando su barbilla. Sentí la boca seca. Miré el cuello y los brazos del niño: tenían un color hermoso, el color de piel de los bebés, la suavidad que debería tener su rostro también. Sentí tanta pena... Ni siquiera puedo explicarlo ahora.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(140,20,20,.42) 0%, transparent 40%), linear-gradient(180deg,#c8b870 0%,#a09040 100%)\">—Ayúdame a matarlo.</p>\n<p class=\"pd\">—¿Qué?</p>\n<p class=\"pd\">—Tienes que ayudarme ¿Cómo se puede vivir así? ¿Tú vivirías así? ¡Mira …! ¡Míralo!</p>\n<p class=\"pb\">Finalizó con la voz quebrada.</p>\n<p class=\"pb\">Eso resonó en mi cabeza como una bala. No podía ser real.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(160,30,30,.38) 0%, transparent 48%), linear-gradient(180deg,#c0a860 0%,#806030 100%)\">Cerré los ojos y volví a respirar profundo.</p>\n<p class=\"pb\">Uno, dos, tres. Volví a abrirlos con la esperanza de que ya no estén más, pero seguían ahí. La mujer me miraba con compasión y el niño empezó a jugar con mi cabello.</p>\n<p class=\"pb\">No podía articular palabras. Cuando pude salir de ese estado con voz temblorosa dije:</p>\n<p class=\"pd\">—No entiendo esto, lo que dije estuvo fuera de lugar, lo lamento, pero ¿Qué quiere de mí?</p>\n<p class=\"pd\">—Quiero que me ayudes a matarlo.</p>\n<p class=\"pd\">—Disculpe, pero debe haber maneras de poder ayudarlo. Alguna cirugía, puede pedir ayuda. Podemos hacer una campaña, por favor ...</p>\n<p class=\"pb\">Agarré la mano del nene mientras hablaba, pero al contacto sentí como si me hubiera salpicado aceite hirviendo, el ardor era insoportable. La sangre subió a mi cara. Solté su mano como pude.</p>\n<p class=\"pb\">Ella empezó a hablar.</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(10,5,30,.38) 0%, transparent 50%), linear-gradient(180deg,#a09060 0%,#504020 100%)\">—Ahora está en silencio, pero nunca deja de llorar ¡Necesito paz!  ¡Él también necesita paz! Debemos matarlo. ¡Nadie entiende, debemos matarlo! ¡AYÚDAME A MATARLO!</p>\n<p class=\"pb\">Su voz retumbaba con eco en mi cabeza. Estaba consternada.</p>\n<p class=\"pb\">Mis ojos se encontraron con los del niño. Su único ojo sano me observaba con una intensidad inusual.</p>\n<p class=\"pb\">Lentamente, abrió su pequeña boca y empezó a hablar casi en susurro:</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.50) 0%, transparent 55%), linear-gradient(180deg,#706040 0%,#201510 100%)\">—Soy sus miedos más ocultos, sus ganas de morir, las ganas que tiene de hacerle daño a otros, sus mentiras, sus prejuicios, todo lo negro de su alma soy.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.55) 0%, transparent 60%), linear-gradient(180deg,#504030 0%,#100808 100%)\">La voz, áspera y ronca como la de un anciano fumador, resonó en mis oídos con una gravedad inesperada. Sentí alivio. Caí en la cuenta de que aquel niño no era real.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_04\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"music-player\" id=\"mp-midnight\">\n  <div class=\"mp-wave\" id=\"mpw-midnight\">\n    <span></span><span></span><span></span><span></span><span></span>\n  </div>\n  <span class=\"mp-icon\">♪</span>\n  <span class=\"mp-title\">Midnight City · M83</span>\n  <button class=\"mp-btn\" id=\"mpbtn-midnight\" title=\"Play/Pause\">▶</button>\n  <input class=\"mp-vol\" id=\"mpvol-midnight\" type=\"range\" min=\"0\" max=\"100\" value=\"62\" title=\"Volumen\">\n</div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 04</p>\n<h2 class=\"pt\">Noche críptica en Sepia</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 40% 20%, rgba(180,140,60,.28) 0%, transparent 50%), linear-gradient(180deg,#ede3c5 0%,#e0d4a8 100%)\">Hacía tanto frío que mi chaqueta negra se sentía helada. Mi cara, pálida, se reflejaba en el vidrio de una ventana, y en ese reflejo reconocí a alguien que ya no era. Veía solo manos botellas, dedos, cigarros, humo … gente sin rostro, mientras sonaba \"Midnight City\" de fondo, una canción que solía escuchar en noches menos complicadas, cuando el futuro parecía prometedor.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 10%, rgba(80,60,120,.32) 0%, transparent 50%), linear-gradient(180deg,#dfd4a5 0%,#d0c888 100%)\">De repente, un estruendo sacudió el lugar, produciéndome un pánico indescriptible. Salí a la calle sin pensarlo dos veces. Las luces de los postes emanaban una luz tenue amarilla, envolviendo a la noche en un filtro sepia. Era como si el mundo o al menos mi mundo estuviera teñido de una nostalgia amarga. Mi intuición me decía que tenía que caminar hacia algún lado, pero mi mente estaba llena de porquería inoperante. Traté de recordar cómo había llegado allí, pero me sentía atrapada en ese instante. Me llegó a la mente una imagen de mi padre tocando el guitarra sentado en la vereda de la casa, bañado por la luz del atardecer. Ese recuerdo solo intensificó mi sensación de pérdida.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 60% 30%, rgba(120,80,140,.35) 0%, transparent 52%), linear-gradient(180deg,#d8cc90 0%,#c8bc78 100%)\">La idea de que tenía que huir me acechó otra vez. Caminé sin rumbo fijo, impulsada por la inercia de escapar. De pronto, una sombra me atrapó por la espalda con una botella en mano. Me zafé como pude y seguí caminando. Aquello volvió hacia mí y me abrazó con mucha fuerza. Entonces, lo entendí: era él1. Tuve la impresión de que mi cabeza se agigantaba y que todo pasaba demasiado lento, acelerando mi respiración. Al apartarnos empezó a decirme algo, vi como su boca se abría, pero en mi mente solo retumbaba un zumbido.\n —¿Qué diablos dice? ¿Qué quiere de mí? — me preguntaba desesperadamente, mientras él me tomaba de los brazos y me sacudía, clavándome sus dedos en la piel. Vi su cara de preocupación. El mensaje se volvió tan claro que resonó en mis huesos: reacciona.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(200,150,30,.40) 0%, transparent 52%), linear-gradient(180deg,#d0c078 0%,#c0a860 100%)\">Repentinamente, una descarga eléctrica me recorrió de pies a cabeza, originada en el estómago y expandiéndose por cada parte de mi ser. Cuando recuperé la consciencia, me encontré sosteniendo un fragmento de botella rota; él yacía inconsciente en el piso. Vi gotear de mis manos un líquido espeso que reconocí como sangre, a pesar de su brillo dorado bajo la luz amarillenta. El suelo también estaba manchado de sangre, su cabeza herida era la única evidencia de algo que no podía entender. No había color rojo que me alterara, la sangre dorada le daba una belleza perturbadora a la escena, mis pensamientos también eran dorados hasta que escuché mi nombre</p>\n<p class=\"pd\" data-atmos=\"radial-gradient(ellipse at 30% 40%, rgba(200,150,30,.45) 0%, transparent 50%), linear-gradient(180deg,#c8b868 0%,#b0a050 100%)\">— ¡¿María?! —</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 60%, rgba(60,40,90,.40) 0%, transparent 55%), linear-gradient(180deg,#b0a050 0%,#908040 100%)\">Solté el vidrio que tenía en las manos mientras daba la vuelta para ver quién susurraba mi nombre. El susurro suave y apenas perceptible flotaba en el aire, desvaneciéndose lentamente antes de regresar, entrelazándose con el tintineo de la botella al romperse.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 50%, rgba(200,160,0,.50) 0%, transparent 48%), radial-gradient(ellipse at 70% 80%, rgba(40,20,60,.40) 0%, transparent 52%), linear-gradient(180deg,#a09038 0%,#706020 100%)\">No vi nada. Él ya no estaba en el piso, ni en ninguna parte. Un silencio denso se apoderó del lugar. Las náuseas me invadieron. Todo se volvió extremadamente oscuro. El suelo se estremeció, abriéndose bajo mis pies. Cerré los ojos por instinto, sintiendo una caída interminable. Cuando los abrí, quedé desconcertada: el piso estaba ahí, sólido, y él seguía hablándome. Su voz resonaba en el vacío.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(40,20,60,.55) 0%, transparent 58%), linear-gradient(180deg,#605020 0%,#201808 100%)\">Fui hacia la vereda y me senté en el piso; él me siguió. La sangre dorada manchaba su cabeza y mis manos. Su abrazo no me trajo calma, sino que intensificó mi sensación de vacío. Recordé la misma escena, el mismo abrazo, cuando todo era blanco y solo existíamos él y yo. Si ahora todo es dorado, ¿por qué no es mejor?  La confusión me invadió; sentí que me desvanecía en su refugio, como si me estuviera evaporando, mientras me perdía en la nebulosa de una noche críptica en sepia.</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_05\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 05</p>\n<h2 class=\"pt\">¿Desperté?</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(180,180,160,.18) 0%, transparent 50%), linear-gradient(180deg,#f2ede0 0%,#ede6d2 100%)\">No sé en qué momento me quedé dormida, pero me despertó el horrible sonido de la alarma. 6:40 am. La pospuse, cinco minutos no pueden hacerle daño a nadie. Cerré los ojos con la esperanza de que el tiempo se detuviera.</p>\n<p class=\"pb\">Volvió a sonar y esta vez fue exageradamente ruidosa.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 20%, rgba(150,150,140,.22) 0%, transparent 50%), linear-gradient(180deg,#eae4d0 0%,#e0d8c0 100%)\">Me levanté sin ganas, casi arrastrándome. Abrí la puerta del baño; estaba más oscuro   de lo normal, así que decidí prender la luz antes de entrar. Instinto de supervivencia.  La luz parpadeaba intermitentemente, pero al menos podía ver lo que había dentro.  El espejo estaba roto, la tubería del lavabo también. El agua salpicaba de formas extrañas, como si quisiera alcanzarme. De repente percibí que solo podía ver de frente; no tenía visión periférica.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(120,120,110,.28) 0%, transparent 52%), linear-gradient(180deg,#e2dcc8 0%,#d5cdae 100%)\">La idea de que el fallo de la bombilla me impedía ver con claridad no me convencía. Me froté los ojos con fuerza, esperando un cambio, pero fue inútil. Parpadeé repetidamente, confundida. Intenté mirar de reojo hacia la cortina de la ducha a mi derecha, pero no había nada, solo un vacío negro que parecía tragarse el mundo a ambos lados de mi cabeza. Repetí el intento con el ojo izquierdo, buscando la familiaridad de la pared de losetas y el interruptor de luz, pero solo encontré la misma oscuridad impenetrable. Un escalofrío de miedo recorrió mi espalda. ¿Por qué no podía ver a los lados? ¿Qué estaba ocurriendo?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(80,80,75,.35) 0%, transparent 55%), linear-gradient(180deg,#d8d0b8 0%,#c8c0a0 100%)\">Sentí como si unas paredes invisibles se hubieran alzado a ambos lados de mis ojos, dejándome atrapada en un túnel de visión estrecho y aterrador. La desesperación comenzó a crecer en mi interior, acelerando mi respiración.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 60%, rgba(60,60,55,.40) 0%, transparent 58%), linear-gradient(180deg,#c8c0a0 0%,#b8b090 100%)\">Al girar completamente la cabeza, pude ver con normalidad. A la derecha, la cortina de la ducha, la pared de losetas, el champú y el jabón; a la izquierda, el interruptor en la pared de losetas. Pero al intentar mirar de reojo, la oscuridad me envolvía nuevamente; no veía absolutamente nada. El pánico se apoderó de mí, como un frío helado que me atravesaba el pecho. ¿Estaba perdiendo la vista?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(40,40,38,.45) 0%, transparent 55%), linear-gradient(180deg,#b5ae92 0%,#a09878 100%)\">Me contemplé en el espejo desde la puerta, incapaz de avanzar. Mi rostro desencajado se reflejaba en el fragmento más grande que quedaba del cristal. El corazón me latía desbocado, al compás de cada parpadeo de luz, al ver mis pupilas dilatadas como pozos oscuros. Esa no era yo. O al menos, me veía, pero no me reconocía.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(20,20,18,.55) 0%, transparent 60%), linear-gradient(180deg,#9890 70 0%,#706858 100%)\">La idea de haberme perdido en algún lugar, de que solo mi cuerpo inmóvil permanecía frente al espejo empezó a ganar terreno en mi mente. El terror se apoderó de mí.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,5,5,.62) 0%, transparent 62%), linear-gradient(180deg,#605848 0%,#302820 100%)\">Sentí en ese instante en que el tiempo se detuvo, mientras observaba mi reflejo y esa mirada... esa mirada que no era mía.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,5,5,.70) 0%, transparent 65%), linear-gradient(180deg,#302820 0%,#080604 100%)\">Fue entonces cuando sentí que me disolvía. Me observaba desvanecerme, impotente ante la fuerza que me arrastraba hacia abajo.</p>\n<p class=\"pb\" data-atmos=\"linear-gradient(180deg,#080604 0%,#030202 100%)\">¿Desperté?</p>\n</div></div>", "<div class=\"p-story\">\n<div class=\"story-atmos-layer\" id=\"sa_Relato_06\"></div>\n<div class=\"story-lines\"></div>\n<div class=\"story-scroll\">\n<p class=\"ch-label\">Relato 06</p>\n<h2 class=\"pt\">Microchip</h2>\n<div class=\"hr\"></div>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(200,200,195,.20) 0%, transparent 50%), linear-gradient(180deg,#f0ead8 0%,#e8e0cc 100%)\">Estaba sentada frente a un espejo muy grande. A mi lado izquierdo había una mesa de metal color gris que se veía extremadamente limpia. Sobre ella pude observar un par de guantes blancos de látex, pinzas, un bisturí y tijeras. La sala era amplia; tenía paredes blancas, relucientes. El piso también era blanco, al igual que la luz, todo muy bien iluminado. La puerta abierta de par en par me permitió ver que en la otra habitación había tres personas vestidas de blanco. Eran dos hombres y una mujer. Llevaban pantalón, polo y saco. Ellos rodeaban una mesa, como si estuvieran preparando algo. Yo volví al espejo, a mi reflejo. Me di cuenta de que también estaba vestida como ellos, pero no traía el saco, solo el polo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 60% 20%, rgba(180,175,165,.25) 0%, transparent 52%), linear-gradient(180deg,#e5ded0 0%,#dcd4c0 100%)\">Pude ver que una de las personas se dirigió hacia mi habitación con una bandeja blanca. Era una mujer de cabello oscuro y lacio que le llegaba hasta los hombros. Llevaba lentes con marco transparente. Cuando estuvo frente a mí, me regaló una leve sonrisa. Bajó la bandeja para que pudiera verla. Vi un microchip de color dorado, se parecía al de los celulares modernos, muy pequeño. También había un alicate pequeño de cutícula.</p>\n<p class=\"pb\">Ella dio la vuelta y colocó los elementos sobre la mesa. Sin pronunciar una palabra, abandonó la habitación para unirse al resto en la otra sala.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 30% 40%, rgba(160,20,20,.22) 0%, transparent 48%), linear-gradient(180deg,#d8d0b8 0%,#ccbfa8 100%)\">Un impulso llegó a mí, sabía lo que tenía que hacer. Tomé el alicate con la mano derecha y empecé a quitarme la uña del dedo índice izquierdo. Saqué la uña completa y la puse sobre la mesa junto con el alicate. Me quedé observando cómo esa pequeña parte ya sin uña, curiosamente, no se llenó de sangre. Tomé el chip, lo puse a milímetros de mi dedo sin uña, para confirmar que podía quedarse ahí. Dejé el chip sobre la mesa.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(180,10,10,.32) 0%, transparent 45%), linear-gradient(180deg,#ccc0a8 0%,#b8aa90 100%)\">Repentinamente, tuve otra idea: el microchip debía ir directamente en mi cerebro. Tomé el bisturí sin vacilar y con total frialdad empecé a despojarme de las capas que protegían mi cabeza. Primero, me quité el cuero cabelludo, dejando al descubierto mi cráneo. Con la misma precisión removí la piel de mi cara.. La exactitud que tenían mis manos era admirable, ni siquiera me temblaba el pulso. Parecía un robot, no pensaba, solo ejecutaba. Continué removiendo los nervios, una estructura blanca y una especie de red que sostenía mis ojos. Finalmente, llegué a la masa blanda y extraña que era mi cerebro.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(140,10,10,.40) 0%
