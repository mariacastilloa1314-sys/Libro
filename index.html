atadas empezaron a brotar en su cabeza.</p>\n<p class=\"pb\">¿Qué es peor? ¿Estar loca o ser acechada por lo sobrenatural? ¿Fantasmas o extraterrestres? ¿Demonios o Espíritus? ¿Exorcismo u hospital psiquiátrico? ¿Bajo astral o emociones ultra negativas? ¿Posesión, abducción o una cita con el psiquiatra? ¿Canalización o fallo en los neurotransmisores? ¿Algo en esta vida tiene lógica? ¿Según quién?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(60,40,100,.30) 0%, transparent 52%), linear-gradient(180deg,#dfd4a8 0%,#d0c898 100%)\">Los extraterrestres me aterran. No por su cabeza grande, sus ojos como aceitunas ni por su color. ¡Agh!, Hollywood me ha dañado el cerebro. Se supone que son más evolucionados, pero ¿y si su evolución tecnológica no ha ido de la mano de una evolución social? Como nosotros. Hemos avanzado tecnológicamente, pero moralmente nos hemos quedado atascados. La ética, los valores, las buenas costumbres... se perdieron en el camino hacia los autos voladores. La gente sigue muriendo, matando de formas grotescas. Sufren niños, animales, sufre la tierra misma. ¿Por qué el ser humano es tan violento y destructivo? Eso es terrorífico, seres con mucha tecnología y poder. ¡Basta!, deja de pensar. ¿Será verdad que abducen vacas? ¿Una raza hindú avanzada? ¿Cuidarán ellos de los árboles, el agua, los océanos? ¿Respetarán a sus comunidades o también se habrán desarrollado despreciando a los suyos? ¿Cómo era tu lema, Sábato? ¿\"Hay que resistir\"?</p>\n<p class=\"pb\">No puede ser, aquí vamos otra vez. ¿Qué es lo peor que puede hacer un alma en pena? Son inmateriales, bueno, te hacen pensar que no. Malditos. O maldita sea la mente oscura y creativa. ¿Qué querrán? ¿Por qué tan violentos? ¿Por qué no crean su propia sociedad, sus propias reglas y nos dejan en paz? En el caso de que existan, claro... es solo una idea... win, win.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(40,30,80,.38) 0%, transparent 55%), linear-gradient(180deg,#c8bc88 0%,#b8ac78 100%)\">Un cambio repentino de temperatura interrumpió sus pensamientos. La frazada comenzó a deslizarse lentamente hacia abajo, indicándole que algo se acercaba. Sintió el viento frío azotar su espalda y la atmósfera se volvió pesada, cargada de una energía familiar. Todo era reconocible; ya sabía qué hacer. Contuvo el aliento, sus manos temblorosas adoptaron la posición defensiva que había practicado innumerables veces. Se sentía como un pistolero en un duelo al amanecer, su corazón retumbaba, pero no había tiempo para el miedo, solo para la acción. Estaba lista.</p>\n<p class=\"pb\">De repente, sintió unas manos deslizarse por sus piernas; apenas rozando su piel. La sensación era una mezcla de calor, frío y peso. Las manos ascendieron hacia su vientre. No había anticipado eso; esperaba solo un toque en la costilla “¡Corte! Eso no estaba en el guion”. Sabía que debía contener la respiración y moverse para alejar su costilla de la presión. Pero ¿manos?</p>\n<p class=\"pb\">“¿Qué puedo hacer ahora? Manos tratando de tocar mi cuerpo y yo … ¡puedo moverme!”</p>\n<p class=\"pb\">Salió del shock y empezó a luchar desesperadamente contra las manos que intentaban hacerle cosquillas. Odiaba las cosquillas. Tenía un trauma con eso, eran parte de sus pesadillas, un problema no resuelto que la desquiciaba. Peleaba con todas sus fuerzas, usando manos y pies para evitar que la tocaran. De repente, las vio: unas manos enormes y arrugadas, con uñas puntiagudas como ramas, se posaron en su vientre y comenzaron a moverse bruscamente, como si teclearan un mensaje frenético. Era el sonido de un teclado, resonando en su propio cuerpo. Podía sentir cada dedo, cada pulsación. Su corazón estaba a punto de explotar, pero logró sentarse.</p>\n<p class=\"pb\">Las manos desaparecieron —¿Qué fue eso? — Se preguntó, temblando de frío, mientras se envolvía en la frazada, acurrucándose con recelo. Quería mantenerse alerta, pero sus párpados le pesaban. No se atrevía a moverse a otro lugar, presentía que podría encontrar algo más. “Si lo imaginas, existe”, había escuchado esa frase demasiadas veces. Irónicamente, su cama se había convertido en su mejor escondite. Luchaba contra el sueño, pero volvió a sentir cómo jalaban lentamente su frazada. Los pensamientos la secuestraron:</p>\n<p class=\"pb\">“¿Qué carajo me pasa? ¿A qué le tengo miedo? ¿Estas cosas no pueden matarme... o sí? No, no debo pensar en eso, les estoy dando poder. Basta. Apaga la mente, apaga la mente.”</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(50,35,90,.42) 0%, transparent 52%), linear-gradient(180deg,#a89868 0%,#908058 100%)\">Volvió a sentir unas manos en sus piernas, pero esta vez era diferente. La mano derecha avanzaba hasta su caja toráxica. Ella estaba dispuesta a detenerla, pero una sensación escalofriante la invadió: su cuerpo parecía disolverse, volverse etéreo. Era como si una parte de ella se desprendiera …</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 40% 30%, rgba(180,160,200,.30) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(5,3,20,.35) 0%, transparent 52%), linear-gradient(180deg,#a09080 0%,#706070 100%)\">De repente, se encontró en un lugar desconocido. Delante de ella, un hombre vestido con una túnica negra se destacaba, y unos pasos más allá, un grupo de personas vestidas de la misma manera formaban un círculo alrededor de algo o alguien. A su lado, un pequeño grupo de niños vestidos de blanco la miró fugazmente, lanzándole una sonrisa antes de volver a entrelazar sus manos y fijar la vista en el suelo.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 30%, rgba(200,200,220,.25) 0%, transparent 50%), radial-gradient(ellipse at 50% 60%, rgba(5,3,20,.38) 0%, transparent 55%), linear-gradient(180deg,#8a8080 0%,#585860 100%)\">La luna bañaba el paisaje con una luz fantasmal, destacando solo las personas. Una espesa niebla grisácea difuminaba los contornos, ocultando los límites del campo abierto. El silencio era absoluto.</p>\n<p class=\"pd\">—Ella puede hacerlo— las palabras del hombre de espaldas cortaron el silencio abruptamente.</p>\n<p class=\"pb\">Todas las cabezas giraron hacia él, luego hacia ella, que permanecía inmóvil unos pasos detrás. Algo estaba pasando. Hablaban, cuchicheaban, pero él no se movió ni la miró.</p>\n<p class=\"pb\">La sensación de estar fuera de su cuerpo la invadía. El sentirse tan ligera, pero ser incapaz de dar un paso, la aturdía.</p>\n<p class=\"pd\">—Si no me muevo, no existo —pensaba, aunque de alguna manera, presentía que su llegada allí era importante.</p>\n<p class=\"pd\">—Se acaba el tiempo —escuchó decir a alguien más. Las palabras la estremecieron. No lograba entender lo que decían los demás; parecían discutir. La intuición, o tal vez el eco de sus propias dudas, le gritaban que debía actuar.</p>\n<p class=\"pb\">¿Pero cómo? ¿Qué tengo que hacer? Me acosté a las 11:00 p.m. ¿Seguirá siendo miércoles o ya será madrugada? Si esto se demora, llegaré tarde y hecha un desastre al trabajo. No puedo creer que esté pensando en esto en medio de un ritual satánico. Qué fuerte esto de ser humano, ¿eh?</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 40%, rgba(200,200,220,.28) 0%, transparent 52%), radial-gradient(ellipse at 50% 80%, rgba(5,3,20,.45) 0%, transparent 55%), linear-gradient(180deg,#686068 0%,#282830 100%)\">De repente, una mujer emergió desde lo más espeso de la neblina. Se abalanzó sobre el hombre que seguía de espaldas y lo aprisionó contra una pared. Sus labios se encontraron con los de él en un beso que no transmitía pasión, sino una furia fría y calculadora. Sin embargo, los ojos, intensos y desafiantes de aquella mujer, no se apartaban de la joven que observaba la escena, paralizada.</p>\n<p class=\"pb\">La chica bajó la cabeza, abrumada por la intensidad de esa mirada y la extrañeza de la situación. La absurdez era algo inherente en su vida, pero esto... esto superaba cualquier lógica.</p>\n<p class=\"pb\">Algo la empujó con fuerza. Un viento, una fuerza invisible. De repente, estaba acostada en su cama, con la frazada en sus pies. Buscó el celular desesperadamente: eran las 4:44. Solo había sido un mal sueño, un tonto sueño.</p>\n<p class=\"pb\">Dejó caer el celular sobre la mesita de noche e intentó cerrar los ojos, obligándose a relajarse. El reloj seguía su marcha, indiferente a su inquietud. La noche no se detendría, el día llegaría, y ella necesitaba descansar. Tenía que trabajar, tenía que vivir. Las estúpidas pesadillas no pagaban las cuentas.</p>\n<p class=\"pb\">Pero el sueño se resistía. Cada vez que cerraba los ojos, el eco distorsionado de ese infernal \"Zzzzzzi\" resonaba en sus oídos, taladrándole el cerebro. Quedaba una hora y cuarenta y cinco minutos, que podría usar para dormir.</p>\n<p class=\"pb\">Cerró los ojos e intentó no darle importancia. Después de todo, tendría once horas para pensar en ello o, tal vez, para ignorarlo. Sí, solo había sido un sueño. Sí, se había asustado, pero no era para tanto. La vida real solía ser más dura a veces. Por ejemplo, en algún rincón del mundo, una vida estaba llegando a su fin.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.62) 0%, transparent 60%), linear-gradient(180deg,#181820 0%,#040406 100%)\">(Pensamiento del narrador) Claramente, ese es un pensamiento suyo. Lo estoy diciendo yo porque ya se durmió.</p>\n<p class=\"pb\" data-atmos=\"radial-gradient(ellipse at 50% 50%, rgba(5,3,20,.70) 0%, transparent 62%), linear-gradient(180deg,#080808 0%,#020202 100%)\">Shhh.</p>\n</div></div>", "<div class=\"p\"><p class=\"ch-label\">Suscribirse</p><h2 class=\"pt\" style=\"margin-bottom:.8rem\">No te pierdas lo que viene</h2><div class=\"hr\"></div><p class=\"pb\" style=\"margin-bottom:1.5rem\">Nuevas historias, cortos y cosas perturbadoras, directo a tu correo.</p><div class=\"sub-wrap\"><label class=\"sub-label\">Tu correo</label><input type=\"email\" class=\"sub-input\" placeholder=\"tu@correo.com\"/><button class=\"sub-btn\">Suscribirse</button></div><span class=\"pnum\">xxii</span></div>", "<div class=\"p\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center\"><svg width=\"44\" height=\"52\" viewBox=\"0 0 200 240\" fill=\"none\"><g stroke=\"#7a6040\" stroke-linecap=\"round\" opacity=\".4\"><path stroke-width=\".9\" d=\"M100 28 C128 22 162 38 168 70 C174 102 152 128 132 138 C148 148 158 168 140 180 C122 192 98 178 84 162 C60 172 38 156 36 132 C34 108 52 88 68 80 C48 66 42 42 62 32 C78 24 92 30 100 28Z\"/></g></svg><p style=\"font-family:'Caveat',cursive;font-size:clamp(1.2rem,2.5vw,1.8rem);color:var(--gold)\">Maria E. Castillo</p><p style=\"font-size:.6em;color:var(--ink3);letter-spacing:.2em;font-family:'Cinzel',serif\">LIMA · MMXXV</p><div style=\"width:26px;height:1px;background:var(--gold-faint);margin:.4rem auto\"></div><p style=\"font-size:.58em;color:var(--ink3)\">© 2025 — Todos los sueños reservados</p></div>"];
const JOURNAL_PAGES=3, FLIP=640, FADE=380;
let cur=-2, busy=false;
const mob=()=>window.innerWidth<=700;
const $ = id => document.getElementById(id);
const bookClosed=$('bookClosed'), bookOpen=$('bookOpen');
const pageL=$('pageL'), pageR=$('pageR');
const leaf=$('leaf'), leafFace=$('leafFace'), leafBack=$('leafBack');
const navRow=$('navRow'), navPrev=$('navPrev'), navNext=$('navNext'), navLabel=$('navLabel'), navHome=$('navHome');
const zoneL=$('zoneL'), zoneR=$('zoneR');

function reZ(){pageR.appendChild(zoneL);pageR.appendChild(zoneR);}
function renderPages(idx){
  // Stop music when changing pages (will restart if needed below)
  const prevPageHasMusic = (cur === 7 || cur === 13) || (cur === 6 || cur === 12);
  if(prevPageHasMusic) stopAllMusic();

  const m=mob();
  pageL.innerHTML=(!m&&idx>=0&&idx<PAGES.length)?PAGES[idx]:'';
  const ri=m?idx:idx+1;
  pageR.innerHTML=(ri>=0&&ri<PAGES.length)?PAGES[ri]:'';
  reZ();
  const isJ = idx < 4;
  if(window.onMusicPageChange) window.onMusicPageChange(mob()?idx:idx);
  bookOpen.classList.toggle('journal-spread', isJ);

  // ── Music activation ──
  const leftIdx  = mob() ? idx : idx;
  const rightIdx = mob() ? idx : idx + 1;

  // Relato 04 (Noche críptica) = page index 7
  if(leftIdx === 7 || rightIdx === 7) {
    setTimeout(() => {
      bindMusicControls('midnight');
      showMusicPlayer('midnight');
      startTrack('midnight', 62);
    }, 600);
  } else {
    hideMusicPlayer('midnight');
  }

  // Relato 10 (Zombi) = page index 13
  if(leftIdx === 13 || rightIdx === 13) {
    setTimeout(() => {
      bindMusicControls('floor');
    }, 400);
    // Music starts when lyrics paragraph enters view (via IntersectionObserver below)
  } else {
    hideMusicPlayer('floor');
  }

  // ── Index item clicks ──
  document.querySelectorAll('.j-idx-item[data-target]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=parseInt(el.dataset.target);
      if(!isNaN(t)&&!busy){
        const dest=mob()?t:t%2===0?t:t-1;
        cur=Math.max(0,Math.min(dest,maxCur()));
        renderPages(cur);updateNav();
      }
    });
  });

  // ── CINEMATIC ATMOSPHERE ENGINE ──
  document.querySelectorAll('.p-story').forEach(storyEl => {
    // Ensure base paper div exists
    if(!storyEl.querySelector('.story-base-paper')){
      const base=document.createElement('div');
      base.className='story-base-paper';
      storyEl.prepend(base);
    }
    // Ensure vignette exists
    if(!storyEl.querySelector('.story-vignette')){
      const vig=document.createElement('div');
      vig.className='story-vignette';
      storyEl.prepend(vig);
    }

    const layer = storyEl.querySelector('.story-atmos-layer');
    if(!layer) return;
    const atmParagraphs = storyEl.querySelectorAll('[data-atmos]');
    if(!atmParagraphs.length) return;

    let currentAtmos = null;
    let atmosTimer = null;

    function applyAtmos(bg, triggerEl) {
      if(bg === currentAtmos) return;
      currentAtmos = bg;

      // Cross-fade: hide old, set new bg, show
      layer.classList.remove('atmos-visible');

      clearTimeout(atmosTimer);
      atmosTimer = setTimeout(() => {
        layer.style.background = bg;
        layer.classList.add('atmos-visible');
        if(triggerEl) {
          triggerEl.classList.add('atmos-trigger');
          setTimeout(()=>triggerEl.classList.remove('atmos-trigger'), 2600);
        }
      }, 120);

      // Classify darkness for ink color
      // Check the last linear-gradient stop for darkness
      const darkMatch = bg.match(/linear-gradient\([^)]+,(#[0-9a-f]{3,6})\s*\d*%\)/i);
      let dark = false, warm = false, horror = false;
      if(darkMatch){
        const hex=darkMatch[1].replace('#','');
        const r=parseInt(hex.substring(0,2)||hex[0]+hex[0],16);
        const g=parseInt(hex.substring(2,4)||hex[1]+hex[1],16);
        const b=parseInt(hex.substring(4,6)||hex[2]+hex[2],16);
        const lum=(r+g+b)/3;
        dark = lum < 45;
        warm = lum >= 45 && lum < 120 && r > g;
        horror = dark && (bg.includes('rgba(148,12') || bg.includes('rgba(180,') || bg.includes('rgba(200,'));
      }
      storyEl.classList.toggle('atmos-dark', dark);
      storyEl.classList.toggle('atmos-warm', warm && !dark);
      storyEl.classList.toggle('atmos-horror', horror);
      storyEl.classList.toggle('atmos-deep', dark);
    }

    // Set initial atmosphere
    applyAtmos(atmParagraphs[0].dataset.atmos, null);

    const observer = new IntersectionObserver((entries) => {
      // Find the most-visible triggering entry
      let best = null, bestRatio = 0;
      entries.forEach(entry => {
        if(entry.isIntersecting && entry.intersectionRatio > bestRatio){
          bestRatio = entry.intersectionRatio;
          best = entry;
        }
      });
      if(best) applyAtmos(best.target.dataset.atmos, best.target);
    }, {
      root: storyEl,
      threshold: [0.1, 0.3, 0.5],
      rootMargin: '-8% 0px -25% 0px'
    });

    atmParagraphs.forEach(p => observer.observe(p));

    // ── Take Me on the Floor trigger ──
    // Start music when lyrics paragraph enters view in Relato 10
    const lyricsTrigger = storyEl.querySelector('[data-lyrics-trigger]');
    if(lyricsTrigger) {
      const lyricsObs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if(e.isIntersecting) {
            showMusicPlayer('floor');
            startTrack('floor', 70);
            lyricsObs.disconnect();
          }
        });
      }, { root: storyEl, threshold: 0.3, rootMargin: '-5% 0px -20% 0px' });
      lyricsObs.observe(lyricsTrigger);
    }
  });
}
function isJournalFlip(from,to){
  return from<JOURNAL_PAGES+1||to<JOURNAL_PAGES+1;
}
function maxCur(){return PAGES.length-(mob()?1:2);}
function step(){return mob()?1:2;}
function updateNav(){
  navPrev.disabled=(cur<=-1);
  navNext.disabled=(cur>=maxCur());
  navLabel.textContent=cur>=0?(((mob()?cur:cur+1)+1)+' / '+PAGES.length):'';
  navHome.classList.toggle('show', cur>=0);
}
function showCover(){
  stopAllMusic();
  bookOpen.style.display='none';
  bookClosed.style.display='';
  bookClosed.style.opacity='0';
  bookClosed.style.transform='scale(.96)';
  navRow.classList.remove('show');
  requestAnimationFrame(()=>{
    bookClosed.style.transition='opacity .45s,transform .45s';
    bookClosed.style.opacity='1';bookClosed.style.transform='scale(1)';
  });
  cur=-2;
}
function openBook(){
  if(busy||cur>=0)return;
  busy=true;cur=0;
  bookClosed.style.transition='opacity .42s,transform .42s';
  bookClosed.style.opacity='0';bookClosed.style.transform='scale(.96)';
  setTimeout(()=>{
    bookClosed.style.display='none';bookClosed.style.transition='';
    bookOpen.style.display='flex';renderPages(cur);navRow.classList.add('show');updateNav();busy=false;
  },430);
}
function doFlip(isNext){
  const m=mob();
  const next=isNext?cur+step():Math.max(0,cur-step());
  const useFlip=isJournalFlip(cur,next);
  const dur=useFlip?FLIP:FADE;
  if(isNext){
    leafFace.innerHTML=m?PAGES[cur]:(cur+1<PAGES.length?PAGES[cur+1]:'');
    leafBack.innerHTML=m?PAGES[next]:(next<PAGES.length?PAGES[next]:'');
    const ri=m?next:next+1;
    pageR.innerHTML=ri<PAGES.length?PAGES[ri]:'';
    if(!m)pageL.innerHTML=next<PAGES.length?PAGES[next]:'';
    reZ();
    if(useFlip){
      leaf.style.display='block';leaf.style.transition='none';leaf.style.transform='rotateY(0deg)';
      leaf.getBoundingClientRect();
      leaf.style.transition=`transform ${dur}ms cubic-bezier(.645,.045,.355,1)`;
      leaf.style.transform='rotateY(-180deg)';
    }
  } else {
    const ri=m?next:next+1;
    leafFace.innerHTML=ri<PAGES.length?PAGES[ri]:'';
    leafBack.innerHTML=m?PAGES[cur]:(cur<PAGES.length?PAGES[cur]:'');
    if(!m)pageL.innerHTML=next<PAGES.length?PAGES[next]:'';
    if(useFlip){
      leaf.style.display='block';leaf.style.transition='none';leaf.style.transform='rotateY(-180deg)';
      leaf.getBoundingClientRect();
      leaf.style.transition=`transform ${dur}ms cubic-bezier(.645,.045,.355,1)`;
      leaf.style.transform='rotateY(0deg)';
    }
  }
  setTimeout(()=>{
    leaf.style.display='none';leaf.style.transform='';
    cur=next;renderPages(cur);updateNav();busy=false;
  },dur+20);
}
function flipNext(){if(busy||cur<0||cur>=maxCur())return;busy=true;doFlip(true);}
function flipPrev(){
  if(busy)return;
  if(cur<=0){if(cur===0)showCover();return;}
  busy=true;doFlip(false);
}
$('openHint').addEventListener('click',openBook);
bookClosed.addEventListener('click',openBook);
navNext.addEventListener('click',flipNext);navPrev.addEventListener('click',flipPrev);
navHome.addEventListener('click',()=>{if(!busy){showCover();}});
zoneR.addEventListener('click',flipNext);zoneL.addEventListener('click',flipPrev);
document.addEventListener('keydown',e=>{
  if(cur<0){if(e.key==='Enter'||e.key===' ')openBook();return;}
  if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();flipNext();}
  if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();flipPrev();}
});
let tx=0;
let ty0=0,tScrolling=false;
t.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty0=e.touches[0].clientY;tScrolling=false;},{passive:true});
t.addEventListener('touchmove',e=>{
  const dx=Math.abs(e.touches[0].clientX-tx),dy=Math.abs(e.touches[0].clientY-ty0);
  const story=e.target.closest('.p-story');
  if(story && dy>dx && dy>8) tScrolling=true;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(tScrolling){tScrolling=false;return;}
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>44){dx<0?flipNext():flipPrev();}
},{passive:true});
window.addEventListener('resize',()=>{if(cur>=0)renderPages(cur);});
const cd=$('cd'),cr=$('cr');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cd.style.left=mx+'px';cd.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,input,.open-hint,.book-closed,.zone').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cr.style.width='34px';cr.style.height='34px';cr.style.borderColor='rgba(184,149,106,.65)';});
  el.addEventListener('mouseleave',()=>{cr.style.width='22px';cr.style.height='22px';cr.style.borderColor='rgba(184,149,106,.35)';});
});
</script>
<div id="yt-container"><div id="yt-midnight"></div><div id="yt-floor"></div></div>

<!-- ═══ MUSIC SYSTEM ═══ -->
<div id="yt-midnight" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;pointer-events:none;"></div>
<div id="yt-zombies" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;pointer-events:none;"></div>

<div id="music-widget">
  <div id="music-track-label">♪ </div>
  <button id="music-btn" title="Música">
    <div class="eq-bars">
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>
  </button>
</div>
<div id="music-autoplay-notice">♪ Toca para activar la música</div>

<script>
/* ═══════════════════════════════════════════════════
   MUSIC ENGINE
   Relato 4  → Midnight City (M83)   — plays from start
   Relato 10 → Take Me on the Floor  — starts at first lyric
═══════════════════════════════════════════════════ */
const MUSIC_PAGES = {
  7:  { ytId: 'dX3k_QDnzHE', title: 'Midnight City — M83',          autoStart: true,  container: 'yt-midnight' },
  13: { ytId: 'OoAOPUO3QTo', title: 'Take Me on the Floor — The Veronicas', autoStart: false, container: 'yt-zombies' }
};

let ytApiReady = false;
let players = {};       // { pageIdx: YT.Player }
let currentMusicPage = null;
let isPlaying = false;
let userInteracted = false;
let fadeTicker = null;

const mWidget  = document.getElementById('music-widget');
const mBtn     = document.getElementById('music-btn');
const mLabel   = document.getElementById('music-track-label');
const mNotice  = document.getElementById('music-autoplay-notice');

// Track user interaction (needed for autoplay policy)
document.addEventListener('click', () => { userInteracted = true; }, { once: true });
document.addEventListener('keydown', () => { userInteracted = true; }, { once: true });
document.addEventListener('touchstart', () => { userInteracted = true; }, { once: true, passive: true });

// Load YouTube IFrame API
(function loadYT() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

window.onYouTubeIframeAPIReady = function () {
  ytApiReady = true;
  Object.entries(MUSIC_PAGES).forEach(([pgIdx, cfg]) => {
    players[pgIdx] = new YT.Player(cfg.container, {
      height: '1', width: '1',
      videoId: cfg.ytId,
      playerVars: {
        autoplay: 0, controls: 0, disablekb: 1,
        fs: 0, iv_load_policy: 3, modestbranding: 1,
        rel: 0, origin: location.origin
      },
      events: {
        onReady: (e) => {
          e.target.setVolume(0);
          // Pre-buffer
          e.target.mute();
          e.target.playVideo();
          setTimeout(() => { e.target.pauseVideo(); e.target.unMute(); e.target.setVolume(0); }, 1200);
        },
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.ENDED) {
            // Loop Midnight City; stop Take Me on the Floor
            if (parseInt(Object.keys(players).find(k => players[k] === e.target)) === 7) {
              e.target.seekTo(0); e.target.playVideo();
            }
          }
        }
      }
    });
  });
};

function fadeVolume(player, fromVol, toVol, durationMs, onDone) {
  clearInterval(fadeTicker);
  const steps = 30;
  const interval = durationMs / steps;
  let step = 0;
  fadeTicker = setInterval(() => {
    step++;
    const vol = fromVol + (toVol - fromVol) * (step / steps);
    try { player.setVolume(Math.round(Math.max(0, Math.min(100, vol)))) } catch(e) {}
    if (step >= steps) {
      clearInterval(fadeTicker);
      try { if (toVol === 0) player.pauseVideo(); } catch(e) {}
      if (onDone) onDone();
    }
  }, interval);
}

function startMusic(pageIdx, delay = 0) {
  const cfg = MUSIC_PAGES[pageIdx];
  if (!cfg || !ytApiReady) return;
  const player = players[pageIdx];
  if (!player || typeof player.playVideo !== 'function') return;

  currentMusicPage = pageIdx;
  mLabel.textContent = '♪ ' + cfg.title;
  mWidget.classList.add('mw-show');

  function doPlay() {
    try {
      player.setVolume(0);
      player.unMute();
      player.playVideo();
      fadeVolume(player, 0, 75, 2800);
      isPlaying = true;
      mWidget.classList.add('mw-playing');
      mBtn.title = 'Pausar música';
      mNotice.classList.remove('show');
    } catch(e) {}
  }

  if (delay > 0) {
    setTimeout(() => {
      if (userInteracted) doPlay();
      else tryAutoplay(pageIdx, doPlay);
    }, delay);
  } else {
    if (userInteracted) doPlay();
    else tryAutoplay(pageIdx, doPlay);
  }
}

function tryAutoplay(pageIdx, doPlay) {
  // Show notice to trigger interaction
  mNotice.classList.add('show');
  mNotice.onclick = () => { mNotice.classList.remove('show'); userInteracted = true; doPlay(); };
  // Also try anyway (some browsers allow)
  setTimeout(() => {
    try {
      players[pageIdx].setVolume(0);
      players[pageIdx].unMute();
      players[pageIdx].playVideo();
      // If it works, fade in
      setTimeout(() => {
        try {
          const state = players[pageIdx].getPlayerState();
          if (state === YT.PlayerState.PLAYING) {
            mNotice.classList.remove('show');
            fadeVolume(players[pageIdx], 0, 75, 2800);
            isPlaying = true;
            mWidget.classList.add('mw-playing');
          }
        } catch(e) {}
      }, 800);
    } catch(e) {}
  }, 200);
}

function stopMusic(pageIdx, fadeDur = 2200) {
  if (pageIdx == null || !players[pageIdx]) return;
  const player = players[pageIdx];
  try {
    const vol = player.getVolume();
    fadeVolume(player, vol, 0, fadeDur, () => { try { player.pauseVideo(); } catch(e){} });
  } catch(e) {}
  isPlaying = false;
  mWidget.classList.remove('mw-playing');
  if (currentMusicPage === pageIdx) {
    currentMusicPage = null;
    setTimeout(() => mWidget.classList.remove('mw-show'), fadeDur + 200);
  }
}

// Toggle play/pause
mBtn.addEventListener('click', () => {
  userInteracted = true;
  if (!currentMusicPage && !isPlaying) return;
  const pg = currentMusicPage;
  if (!pg || !players[pg]) return;
  try {
    const state = players[pg].getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
      players[pg].pauseVideo();
      isPlaying = false;
      mWidget.classList.remove('mw-playing');
      mBtn.title = 'Reproducir música';
    } else {
      players[pg].playVideo();
      isPlaying = true;
      mWidget.classList.add('mw-playing');
      mBtn.title = 'Pausar música';
    }
  } catch(e) {}
});

// Called by renderPages when page changes
window.onMusicPageChange = function(pageIdx) {
  const prevPage = currentMusicPage;

  // Stop previous if different
  if (prevPage !== null && prevPage !== pageIdx) {
    stopMusic(prevPage, 1800);
  }

  if (MUSIC_PAGES[pageIdx]) {
    const cfg = MUSIC_PAGES[pageIdx];
    if (cfg.autoStart) {
      // Relato 4: start immediately
      startMusic(pageIdx, 600);
    } else {
      // Relato 10: start at first lyric paragraph via IntersectionObserver
      // The observer will call window.triggerZombieMusic()
      mWidget.classList.add('mw-show');
      mLabel.textContent = '♪ ' + cfg.title;
      // Prepare player (seek to 0)
      try { if(players[pageIdx]) players[pageIdx].seekTo(0); } catch(e) {}
    }
  } else {
    // Non-music page — hide widget
    if (prevPage === null) {
      mWidget.classList.remove('mw-show');
    }
  }
};

window.triggerZombieMusic = function() {
  if (currentMusicPage === 13 && isPlaying) return; // already playing
  startMusic(13, 0);
};
</script>
