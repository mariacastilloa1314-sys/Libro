<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>El arte de dormir terriblemente mal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cinzel:wght@400;600&family=Cinzel+Decorative&family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --pw:  clamp(220px,28vw,400px);
  --ph:  calc(var(--pw)*1.54);
  --sw:  clamp(14px,1.8vw,22px);
  --gold:       #b8956a;
  --gold-mid:   #8a6e48;
  --gold-dim:   #5a4530;
  --gold-faint: #2e2010;
  --ink:        #d0c4a8;
  --ink2:       #8a7a62;
  --ink3:       #52402e;
  --crimson:    #8a1e1e;
  --crimson2:   #c44040;
  --red-ink:    rgba(155,18,18,0.85);
  --paper:      #f4f0e2;
  --paper2:     #eee8d0;
  --sepia:      #1a2e6a;
  --sepia2:     #2a4688;
  --sepia3:     #6a82b8;
  --line-col:   rgba(50,80,180,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 25% 25%,#160a04 0%,transparent 55%),
    radial-gradient(ellipse at 75% 75%,#0c0810 0%,transparent 55%),
    #07050a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;min-height:100vh;
  font-family:'Crimson Pro',serif;
}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.03;}

/* Estilos de los widgets de música */
.mp-widget { position: absolute; top: clamp(35px, 6vh, 45px); right: clamp(15px, 3vw, 25px); z-index: 100; display: flex; align-items: center; gap: 8px; background: rgba(244, 240, 226, 0.92); border: 1px solid rgba(184, 149, 106, 0.3); padding: 5px 10px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.25); transition: opacity 0.6s ease; }
.mp-info { font-family: 'Caveat', cursive; font-size: clamp(0.75rem, 1.2vw, 0.95rem); color: var(--sepia2); white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
.mp-btn { background: none; border: none; cursor: pointer; color: rgba(148,12,12,.80); font-size: clamp(.65rem,1.1vw,.88rem); padding: 2px 4px; border-radius: 4px; transition: color .2s, background .2s; line-height: 1; flex-shrink: 0; }
.mp-btn:hover { color: rgba(148,12,12,1); background: rgba(148,12,12,.08); }
.mp-vol { -webkit-appearance: none; appearance: none; width: clamp(28px,4vw,44px); height: 3px; border-radius: 2px; background: rgba(148,12,12,.25); outline: none; cursor: pointer; flex-shrink: 0; }
.mp-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 9px; height: 9px; border-radius: 50%; background: var(--crimson); }

/* Resto de estilos base omitidos por brevedad pero incluidos en el archivo final */
.scene{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(.6rem,1.5vh,1.2rem);width:100%;height:100%;}
.book-closed{position:relative;width:var(--pw);height:var(--ph);cursor:pointer;filter:drop-shadow(-6px 16px 48px rgba(0,0,0,.8));}
.cover-body{position:absolute;inset:0;border-radius:2px 3px 3px 2px;overflow:hidden;background:linear-gradient(158deg,#3d1408 0%, #260a04 100%);}
.book-open{display:none;position:relative;flex-direction:row;width:calc(var(--pw)*2 + var(--sw));height:var(--ph);filter:drop-shadow(-6px 16px 52px rgba(0,0,0,.82));}
.pg{width:var(--pw);height:var(--ph);position:relative;overflow:hidden;flex-shrink:0;}
.p-story{width:100%;height:100%;background:#0d0a06;color:var(--ink);display:flex;flex-direction:column;}
.story-scroll{flex:1;overflow-y:auto;padding:2rem;scrollbar-width:none;}
.story-scroll::-webkit-scrollbar{display:none;}
.pb{margin-bottom:1.2rem;line-height:1.7;font-weight:300;}
.ch-label{color:var(--crimson2);font-family:Cinzel;font-size:0.6rem;letter-spacing:0.3em;margin-bottom:0.5rem;}
.pt{color:var(--gold);font-family:'IM Fell English';font-size:1.5rem;margin-bottom:1rem;}
</style>
</head>
<body>

<div class="scene">
  <div class="book-closed" id="bookClosed" onclick="openBook()">
    <div class="cover-body"></div>
    <div class="cover-label">
      <div class="label-title">El arte de dormir terriblemente mal</div>
    </div>
  </div>

  <div class="book-open" id="bookOpen">
    <div class="pg pg-l" id="pageL"></div>
    <div class="book-spine"></div>
    <div class="pg pg-r" id="pageR"></div>
  </div>
</div>

<script>
/* PAGES ARRAY - Contiene el contenido de cada página. 
  Página 13 (Índice 13) es el Relato 10.
*/
const PAGES = [
  /* ... páginas 0-12 omitidas aquí para el ejemplo, pero deben estar en tu archivo ... */
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 0
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 1
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 2
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 3
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 4
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 5
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 6
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 7 (Relato 04)
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 8
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 9
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 10
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 11
  "<div class='p-story'><div class='story-scroll'>...</div></div>", // 12
  
  // RELATO 10: ZOMBIES (Índice 13)
  `<div class="p-story">
    <div id="yt-zombies" style="display:none"></div>
    <div class="mp-widget" id="mp-floor" style="opacity:0; pointer-events:none">
       <span class="mp-info">Take Me on the Floor · The Veronicas</span>
       <button class="mp-btn" id="mpbtn-floor">▶</button>
       <input class="mp-vol" id="mpvol-floor" type="range" min="0" max="100" value="70">
    </div>
    <div class="story-scroll">
      <p class="ch-label">Relato 10</p>
      <h2 class="pt">Apocalipsis de lo absurdo</h2>
      <p class="pb">Lo último que recuerdo es el sonido de un claxon...</p>
      <p class="pb">Caminaban con una lentitud desesperante, pero con una determinación implacable.</p>
      
      <p class="pb" data-lyrics-trigger style="color:var(--gold); font-style:italic; margin-top:2rem;">
        “I was lonely now you make me feel alive...”
      </p>
      
      <p class="pb">La música parecía venir de todas partes, como si el mismo aire estuviera cantando mientras el mundo se terminaba.</p>
    </div>
  </div>`
];

const MUSIC_PAGES = {
  7: { ytId: 'dX3k_QDnzHE', title: 'Midnight City — M83', autoStart: true, container: 'yt-midnight' },
  13: { ytId: 'OoAOPUO3QTo', title: 'Take Me on the Floor — The Veronicas', autoStart: false, container: 'yt-zombies' }
};

let players = {};
let userInteracted = false;

document.addEventListener('click', () => { userInteracted = true; }, { once: true });

// Inicialización de la API de YouTube
(function loadYT() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

window.onYouTubeIframeAPIReady = function () {
  Object.entries(MUSIC_PAGES).forEach(([pgIdx, cfg]) => {
    players[pgIdx] = new YT.Player(cfg.container, {
      videoId: cfg.ytId,
      playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'rel': 0 },
      events: { 'onReady': (e) => { e.target.setVolume(70); } }
    });
  });
};

function startMusic(pageIdx) {
  const player = players[pageIdx];
  if (player && typeof player.playVideo === 'function') {
    player.playVideo();
  }
}

function showMusicPlayer(id) {
  const el = document.getElementById('mp-' + id);
  if (el) { el.style.opacity = '1'; el.style.pointerEvents = 'auto'; }
}

function initMusicTriggers() {
  document.querySelectorAll('.p-story').forEach(storyEl => {
    const scrollContainer = storyEl.querySelector('.story-scroll') || storyEl;
    const lyricsTrigger = storyEl.querySelector('[data-lyrics-trigger]');
    
    if (lyricsTrigger) {
      const lyricsObs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            console.log("Iniciando música de zombies...");
            showMusicPlayer('floor');
            startMusic(13); // Relato 10
            lyricsObs.disconnect();
          }
        });
      }, { root: scrollContainer, threshold: 0.5 });
      lyricsObs.observe(lyricsTrigger);
    }
  });
}

function openBook() {
  document.getElementById('bookClosed').style.display = 'none';
  document.getElementById('bookOpen').style.display = 'flex';
  renderPages(0);
}

function renderPages(idx) {
  document.getElementById('pageL').innerHTML = PAGES[idx] || '';
  document.getElementById('pageR').innerHTML = PAGES[idx + 1] || '';
  setTimeout(initMusicTriggers, 200);
}
</script>
</body>
</html>
